*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d12;color:#fff;font-family:"DM Sans",sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#13171f;border:1px solid rgba(255,255,255,0.13);border-radius:14px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
/* form fields */
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:rgba(255,255,255,0.38);font-family:"DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);border-radius:6px;color:#fff;font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;font-family:"DM Sans",sans-serif}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,255,255,0.32)}
.field select option{background:#13171f;color:#fff}
/* buttons */
.btn{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:"DM Sans",sans-serif}
.btn-gold{background:#C9A84C;color:#0a0d12}.btn-gold:hover{background:#d4b660}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6)}.btn-ghost:hover{border-color:rgba(255,255,255,0.35);color:#fff}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,0.35);color:#ef4444}.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-green{background:#22c55e;color:#0a0d12}.btn-green:hover{background:#16a34a}
/* dirty indicator */
.dirty-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f59e0b;margin-left:5px;flex-shrink:0}
/* inline admin controls */
.admin-row{display:flex;align-items:center;gap:6px}
.icon-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:rgba(255,255,255,0.4);font-size:11px;padding:3px 7px;cursor:pointer;transition:all .15s;font-family:"DM Mono",monospace;white-space:nowrap}
.icon-btn:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.icon-btn.danger:hover{border-color:#ef4444;color:#ef4444}
.add-row{display:flex;align-items:center;gap:6px;padding:7px 15px;border-top:1px solid rgba(255,255,255,0.045)}
.add-btn{background:transparent;border:1px dashed rgba(255,255,255,0.18);border-radius:6px;color:rgba(255,255,255,0.38);font-size:11px;padding:4px 12px;cursor:pointer;transition:all .15s;font-family:"DM Mono",monospace}
.add-btn:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.75)}

// SHEETS HELPERS
// ─────────────────────────────────────────────────────────────────────────────
// Columns: A=ProjectID B=WSCode C=InitID D=InitName E=WSLead F=InitOwner
//          G=ProjName H=ProjOwner I=Start J=End K=% L=RAG M=Risk

async function loadFromSheets() {
  const {SHEET_ID,API_KEY,SHEET_TAB} = CONFIG;
  if(SHEET_ID==="YOUR_SHEET_ID_HERE"||API_KEY==="YOUR_API_KEY_HERE") return null;
  const range = encodeURIComponent(`${SHEET_TAB}!A2:M500`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Read error: ${res.status} ${res.statusText}`);
  const json = await res.json();
  return parseRows(json.values||[]);
}

function parseRows(rows){
  const wsMap={};
  Object.values(WS_META).forEach(m=>{wsMap[m.code]={...m,lead:"—",initiatives:[]};});
  rows.forEach(row=>{
    const [projId,wsCode,initId,initName,wsLead,initOwner,projName,projOwner,start,end,progressRaw,ragRaw,risk]=row;
    const code=wsCode?.trim(); if(!code||!wsMap[code]) return;
    const ws=wsMap[code];
    if(wsLead?.trim()&&ws.lead==="—") ws.lead=wsLead.trim();
    const iid=initId?.trim();
    let init=ws.initiatives.find(i=>i.id===iid);
    if(!init){init={id:iid,name:initName?.trim()||"",owner:initOwner?.trim()||"—",projects:[]};ws.initiatives.push(init);}
    if(initOwner?.trim()&&init.owner==="—") init.owner=initOwner.trim();
    const rag=["G","A","R"].includes(ragRaw?.trim().toUpperCase())?ragRaw.trim().toUpperCase():"G";
    init.projects.push({
      id:projId?.trim()||`${iid}.${init.projects.length+1}`,
      name:projName?.trim()||"",owner:projOwner?.trim()||"—",
      progress:Math.min(100,Math.max(0,parseInt(progressRaw)||0)),
      rag,risk:risk?.trim()||null,
      start:start?.trim()||"2026-01-01",end:end?.trim()||"2026-12-31",
    });
  });
  return Object.values(wsMap).filter(ws=>ws.initiatives.length>0);
}

  const rows=[];
  wsList.forEach(ws=>{
    ws.initiatives.forEach(init=>{
      init.projects.forEach(pr=>{
        rows.push([
          pr.id, ws.code, init.id, init.name,
          ws.lead||"—", init.owner||"—",
          pr.name, pr.owner||"—",
          pr.start, pr.end,
          String(pr.progress), pr.rag, pr.risk||"",
        ]);
      });
    });
  });
  return rows;
}

async function writeToSheets(wsList, accessToken){
  const {SHEET_ID,SHEET_TAB} = CONFIG;
  const rows = flattenToRows(wsList);
  // 1. Clear existing data (keep header row)
  const clearUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB+"!A2:M500")}:clear`;
  await fetch(clearUrl,{method:"POST",headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"}});
  // 2. Write all rows
  const writeUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB+"!A2")}?valueInputOption=RAW`;
  const res=await fetch(writeUrl,{
    method:"PUT",
    headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({range:`${SHEET_TAB}!A2`,majorDimension:"ROWS",values:rows}),
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Write error ${res.status}`);}
  return rows.length;
}


// ─────────────────────────────────────────────────────────────────────────────
// PROPOSALS — load pending, approve, reject
// Proposals columns:
// A=Timestamp B=SubmittedBy C=LeadEmail D=WSCode E=ProjectID F=ProjectName
// G=Old% H=New% I=OldRAG J=NewRAG K=OldRisk L=NewRisk M=Status
// ─────────────────────────────────────────────────────────────────────────────
async function loadProposals(){
  const {SHEET_ID,API_KEY,PROPOSALS_TAB}=CONFIG;
  if(SHEET_ID==="YOUR_SHEET_ID_HERE"||API_KEY==="YOUR_API_KEY_HERE") return [];
  const range=encodeURIComponent(`${PROPOSALS_TAB}!A2:M500`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`Proposals read error: ${res.status}`);
  const json=await res.json();
  const rows=json.values||[];
  return rows.map((row,i)=>({
    rowIndex:i+2, // 1-based, row 1 is header
    timestamp:row[0]||"",
    submittedBy:row[1]||"",
    leadEmail:row[2]||"",
    wsCode:row[3]||"",
    projectId:row[4]||"",
    projectName:row[5]||"",
    oldProgress:parseInt(row[6])||0,
    newProgress:parseInt(row[7])||0,
    oldRag:row[8]||"G",
    newRag:row[9]||"G",
    oldRisk:row[10]||"",
    newRisk:row[11]||"",
    status:row[12]||"Pending",
  })).filter(p=>p.status==="Pending");
}

async function updateProposalStatus(rowIndex, status, accessToken){
  const {SHEET_ID,PROPOSALS_TAB}=CONFIG;
  const range=encodeURIComponent(`${PROPOSALS_TAB}!M${rowIndex}`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?valueInputOption=RAW`;
  const res=await fetch(url,{
    method:"PUT",
    headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({range:`${PROPOSALS_TAB}!M${rowIndex}`,majorDimension:"ROWS",values:[[status]]}),
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Status update error ${res.status}`);}
}

function signInWithGoogle(){
  return new Promise((resolve,reject)=>{
    let attempts=0;
    const tryInit=()=>{
      if(window.google?.accounts?.oauth2){
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:CONFIG.OAUTH_CLIENT_ID,
          scope:"https://www.googleapis.com/auth/spreadsheets",
          callback:(resp)=>resp.error?reject(new Error(resp.error)):resolve(resp.access_token),
        });
        client.requestAccessToken();
      } else if(attempts<10){attempts++;setTimeout(tryInit,500);}
      else reject(new Error("Google Identity Services failed to load."));
    };
    tryInit();
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// CALC HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const TODAY=new Date();
function plannedPct(start,end){
  const s=new Date(start),e=new Date(end);
  if(TODAY<=s)return 0;if(TODAY>=e)return 100;
  return Math.round(((TODAY-s)/(e-s))*100);
}
const RAG={
  G:{label:"On Track",color:"#22c55e",bg:"rgba(34,197,94,0.11)",border:"rgba(34,197,94,0.32)"},
  A:{label:"At Risk",color:"#f59e0b",bg:"rgba(245,158,11,0.11)",border:"rgba(245,158,11,0.32)"},
  R:{label:"Off Track",color:"#ef4444",bg:"rgba(239,68,68,0.11)",border:"rgba(239,68,68,0.32)"},
};
const allProjects=ws=>ws.initiatives.flatMap(i=>i.projects);
const wsRag=ws=>allProjects(ws).reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const avgOf=arr=>arr.length?Math.round(arr.reduce((a,p)=>a+p.progress,0)/arr.length):0;
const avgNums=arr=>arr.length?Math.round(arr.reduce((a,n)=>a+n,0)/arr.length):0;
const wsActual=ws=>avgOf(allProjects(ws));
const initActual=init=>avgOf(init.projects);
const initPlanned=init=>avgNums(init.projects.map(p=>plannedPct(p.start,p.end)));
const wsPlanned=ws=>avgNums(allProjects(ws).map(p=>plannedPct(p.start,p.end)));
const initRag=init=>init.projects.reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const fmtDate=str=>{const d=new Date(str);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});};
const varianceColor=v=>v>=0?"#22c55e":v>=-15?"#f59e0b":"#ef4444";
const varianceLabel=v=>v>=0?`+${v}%`:`${v}%`;
let _uid=1000;const uid=()=>`new_${_uid++}`;

// ─────────────────────────────────────────────────────────────────────────────
// MICRO COMPONENTS
// ─────────────────────────────────────────────────────────────────────────────
function Dot({rag}){return <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:RAG[rag].color,flexShrink:0}}/>;}
function RAGBadge({rag,tiny}){
  const c=RAG[rag];
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:tiny?"2px 7px":"3px 10px",borderRadius:20,background:c.bg,border:`1px solid ${c.border}`,color:c.color,fontSize:tiny?10:11,fontFamily:"DM Mono,monospace",fontWeight:600,letterSpacing:"0.06em",whiteSpace:"nowrap"}}><Dot rag={rag}/>{c.label}</span>;
}
function Bar({pct,color,h=5}){
  const isHex=color.startsWith("#");
  const fill=pct===0?"rgba(255,255,255,0.09)":isHex?`linear-gradient(90deg,${color}77,${color})`:color;
  return <div style={{width:"100%",height:h,borderRadius:h,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,Math.max(0,pct))}%`,borderRadius:h,background:fill,transition:"width 0.4s ease"}}/></div>;
}
function VariancePill({actual,planned}){
  const v=actual-planned,col=varianceColor(v);
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:20,background:`${col}18`,border:`1px solid ${col}35`,color:col,fontSize:10,fontFamily:"DM Mono,monospace",fontWeight:700,whiteSpace:"nowrap"}}>{v>=0?"▲":"▼"} {varianceLabel(v)}</span>;
}

// EDIT MODAL — used for both Initiative and Project

function EditModal({title,fields,onSave,onDelete,onClose,deleteLabel}){
  const [form,setForm]=useState(()=>{
    const init={};
    fields.forEach(f=>{init[f.key]=f.value??""});
    return init;
  });
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,fontFamily:"Playfair Display,serif",color:"#fff"}}>{title}</div>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:"3px 10px",fontSize:13}}>✕</button>
        </div>
        {fields.map(f=>(
          <div key={f.key} className="field">
            <label>{f.label}</label>
            {f.type==="rag"?(
              <div style={{display:"flex",gap:8,marginTop:2}}>
                {["G","A","R"].map(r=>(
                  <button key={r} onClick={()=>set(f.key,r)} style={{flex:1,padding:"7px 0",borderRadius:7,cursor:"pointer",fontSize:11,fontFamily:"DM Mono,monospace",fontWeight:600,border:`2px solid ${form[f.key]===r?RAG[r].color:"rgba(255,255,255,0.12)"}`,background:form[f.key]===r?`${RAG[r].color}22`:"transparent",color:form[f.key]===r?RAG[r].color:"rgba(255,255,255,0.45)",transition:"all .15s"}}>
                    {RAG[r].label}
                  </button>
                ))}
              </div>
            ):f.type==="number"?(
              <input type="number" min="0" max="100" value={form[f.key]} onChange={e=>set(f.key,Math.min(100,Math.max(0,parseInt(e.target.value)||0)))}/>
            ):f.type==="date"?(
              <input type="date" value={form[f.key]} onChange={e=>set(f.key,e.target.value)}/>
            ):f.type==="textarea"?(
              <textarea rows={2} value={form[f.key]} onChange={e=>set(f.key,e.target.value)} style={{resize:"vertical"}}/>
            ):(
              <input type="text" value={form[f.key]} onChange={e=>set(f.key,e.target.value)}/>
            )}
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:22,gap:8}}>
          <div>{onDelete&&<button className="btn btn-danger" onClick={()=>{onDelete();onClose();}}>{deleteLabel||"Delete"}</button>}</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-gold" onClick={()=>{onSave(form);onClose();}}>Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function WSDash({ws,onUpdate,markDirty}){
  const [openInit,setOpenInit]=useState(null);
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);

  const all=allProjects(ws);
  const act=wsActual(ws),plan=wsPlanned(ws);
  const rc={G:0,A:0,R:0};all.forEach(p=>rc[p.rag]++);

  // patch helpers
  const patchWS=updates=>{onUpdate({...ws,...updates});markDirty();};
  const patchInit=(initId,updates)=>{
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,...updates})});
    markDirty();
  };
  const patchProj=(initId,projId,updates)=>{
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,projects:i.projects.map(p=>p.id!==projId?p:{...p,...updates})})});
    markDirty();
  };
  const deleteInit=initId=>{
    onUpdate({...ws,initiatives:ws.initiatives.filter(i=>i.id!==initId)});
    markDirty();setOpenInit(null);
  };
  const deleteProj=(initId,projId)=>{
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,projects:i.projects.filter(p=>p.id!==projId)})});
    markDirty();
  };
  const addInit=()=>{
    const newId=`${ws.id}.${ws.initiatives.length+1}_${uid()}`;
    const newInit={id:newId,name:"New Initiative",owner:"TBC",projects:[]};
    onUpdate({...ws,initiatives:[...ws.initiatives,newInit]});
    markDirty();
    setModal({type:"init",init:newInit,onSave:f=>patchInit(newId,f)});
  };
  const addProj=initId=>{
    const init=ws.initiatives.find(i=>i.id===initId);
    const newId=`${initId}.${init.projects.length+1}_${uid()}`;
    const newProj={id:newId,name:"New Project",owner:"TBC",progress:0,rag:"G",risk:null,start:"2026-03-01",end:"2026-06-30"};
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,projects:[...i.projects,newProj]})});
    markDirty();
    setModal({type:"proj",proj:newProj,initId,onSave:f=>patchProj(initId,newId,{...f,progress:parseInt(f.progress)||0,risk:f.risk||null})});
  };

  const initFields=init=>[
    {key:"name",label:"Initiative Name",value:init.name},
    {key:"owner",label:"Initiative Owner",value:init.owner},
  ];
  const projFields=proj=>[
    {key:"name",label:"Project Name",value:proj.name},
    {key:"owner",label:"Project Owner",value:proj.owner},
    {key:"start",label:"Start Date",type:"date",value:proj.start},
    {key:"end",label:"End Date",type:"date",value:proj.end},
    {key:"progress",label:"% Complete (0–100)",type:"number",value:proj.progress},
    {key:"rag",label:"RAG Status",type:"rag",value:proj.rag},
    {key:"risk",label:"Risk / Issue (leave blank if none)",type:"textarea",value:proj.risk||""},
  ];

  return(
    <div>
      {modal?.type==="init"&&(
        <EditModal title="Edit Initiative" fields={initFields(modal.init)}
          onSave={f=>patchInit(modal.init.id,f)}
          onDelete={()=>setConfirm({msg:`Delete initiative "${modal.init.name}" and all its projects?`,fn:()=>deleteInit(modal.init.id)})}
          deleteLabel="Delete Initiative" onClose={()=>setModal(null)}/>
      )}
      {modal?.type==="proj"&&(
        <EditModal title="Edit Project" fields={projFields(modal.proj)}
          onSave={f=>patchProj(modal.initId,modal.proj.id,{...f,progress:parseInt(f.progress)||0,risk:f.risk||null})}
          onDelete={()=>setConfirm({msg:`Delete project "${modal.proj.name}"?`,fn:()=>deleteProj(modal.initId,modal.proj.id)})}
          deleteLabel="Delete Project" onClose={()=>setModal(null)}/>
      )}
      {confirm&&<Confirm message={confirm.msg} onConfirm={confirm.fn} onClose={()=>setConfirm(null)}/>}

      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${ws.color}12 0%,transparent 55%)`,border:`1px solid ${ws.color}28`,borderRadius:12,padding:"19px 22px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{fontSize:28,color:ws.color}}>{ws.icon}</div>
          <div>
            <div style={{fontSize:9,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.12em",marginBottom:3}}>{ws.code} · {ws.subtitle}</div>
            <div style={{fontSize:18,fontFamily:"Playfair Display,serif",color:"#fff"}}>{ws.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.38)"}}>Workstream Lead:</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.75)"}}>{ws.lead}</span>

          </div>

        <div style={{textAlign:"right"}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:12,justifyContent:"flex-end",marginBottom:4}}>
            <div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",marginBottom:1}}>ACTUAL</div><div style={{fontSize:34,fontFamily:"Playfair Display,serif",color:ws.color,lineHeight:1}}>{act}%</div></div>

                        <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",lineHeight:1.7}}>{fmtDate(pr.start)}<br/>→ {fmtDate(pr.end)}</div>
                        <RAGBadge rag={pr.rag} tiny/>
                        <button className="icon-btn" style={{fontSize:10}} onClick={()=>setModal({type:"proj",proj:pr,initId:init.id})}>✎ Edit</button>
                      </div>
                    );
                  })}
                  {/* add project */}
                  <div className="add-row">
                    <button className="add-btn" onClick={()=>addProj(init.id)}>+ Add Project</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* add initiative */}
      <button className="add-btn" style={{marginBottom:24}} onClick={addInit}>+ Add Initiative</button>
    </div>
  );
}


// ─────────────────────────────────────────────────────────────────────────────
// PROPOSALS REVIEW PANEL
// ─────────────────────────────────────────────────────────────────────────────
function ProposalsPanel({wsList,onUpdate,markDirty,accessToken,onTokenRefresh}){
  const [proposals,setProposals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [acting,setActing]=useState({}); // rowIndex -> "approving"|"rejecting"
  const [error,setError]=useState(null);
  const [msg,setMsg]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);setError(null);
    try{const p=await loadProposals();setProposals(p);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{load();},[]);

  const showMsg=m=>{setMsg(m);setTimeout(()=>setMsg(null),3500);};

  // Get a valid token — use stored one or trigger sign-in if missing
  const getToken=async()=>{
    if(accessToken) return accessToken;
    const token=await signInWithGoogle();
    onTokenRefresh(token);
    return token;
  };

  const handleApprove=async(p)=>{
    setActing(prev=>({...prev,[p.rowIndex]:"approving"}));
    try{
      // 1. Apply change to in-memory wsList
      let applied=false;
      const updated=wsList.map(ws=>{
        if(ws.code!==p.wsCode) return ws;
        return{...ws,initiatives:ws.initiatives.map(init=>({
          ...init,projects:init.projects.map(pr=>{
            if(pr.id!==p.projectId) return pr;
            applied=true;
            return{...pr,progress:p.newProgress,rag:p.newRag,risk:p.newRisk||null};
          })
        }))};
      });
      if(!applied){setError(`Project ${p.projectId} not found in master data — approve after refreshing.`);return;}
      // 2. Mark row as Approved in sheet
      const token=await getToken();
      await updateProposalStatus(p.rowIndex,"Approved",token);
      // 3. Update local state
      onUpdate(updated.find(w=>w.code===p.wsCode));
      markDirty();
      setProposals(prev=>prev.filter(x=>x.rowIndex!==p.rowIndex));
      showMsg(`✓ Approved: ${p.projectName}`);
    }catch(e){setError(e.message);}
    finally{setActing(prev=>{const n={...prev};delete n[p.rowIndex];return n;});}
  };

  const handleReject=async(p)=>{
    setActing(prev=>({...prev,[p.rowIndex]:"rejecting"}));
    try{
      const token=await getToken();
      await updateProposalStatus(p.rowIndex,"Rejected",token);
      setProposals(prev=>prev.filter(x=>x.rowIndex!==p.rowIndex));
      showMsg(`✗ Rejected: ${p.projectName}`);
    }catch(e){setError(e.message);}
    finally{setActing(prev=>{const n={...prev};delete n[p.rowIndex];return n;});}
  };

  const WS=WS_META;
  const grouped={};
  proposals.forEach(p=>{if(!grouped[p.wsCode])grouped[p.wsCode]=[];grouped[p.wsCode].push(p);});

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>Workstream Lead Submissions</div>
          <div style={{fontSize:18,fontFamily:"Playfair Display,serif",color:"#fff"}}>Pending Proposals</div>
        </div>
        <button onClick={load} disabled={loading} style={{padding:"6px 14px",borderRadius:7,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.55)",fontSize:10,cursor:"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",gap:5}}>
          <span className={loading?"spin":""} style={{display:"inline-block"}}>↻</span> Refresh
        </button>
      </div>

      {msg&&<div style={{fontSize:12,color:"#22c55e",background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:7,padding:"8px 14px",marginBottom:14}}>{msg}</div>}
      {error&&<div style={{fontSize:12,color:"#ef4444",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:7,padding:"8px 14px",marginBottom:14}}>{error}</div>}

      {loading&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)",fontSize:13}}>Loading proposals…</div>}

      {!loading&&proposals.length===0&&(
        <div style={{textAlign:"center",padding:"48px 24px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12}}>
          <div style={{fontSize:28,marginBottom:12}}>✓</div>
          <div style={{fontSize:14,color:"rgba(255,255,255,0.5)"}}>No pending proposals</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.28)",marginTop:4}}>All submissions have been reviewed, or none have been made yet.</div>
        </div>
      )}

      {!loading&&Object.entries(grouped).map(([wsCode,props])=>{
        const wsMeta=WS[wsCode]||{color:"#888",name:wsCode,code:wsCode};
        return(
          <div key={wsCode} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${wsMeta.color}30`}}>
              <span style={{fontSize:11,color:wsMeta.color,fontFamily:"DM Mono,monospace",fontWeight:600}}>{wsMeta.code}</span>
              <span style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{wsMeta.name}</span>
              <span style={{fontSize:10,color:"rgba(255,255,255,0.28)",fontFamily:"DM Mono,monospace"}}>{props.length} pending</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {props.map(p=>{
                const acting_state=acting[p.rowIndex];
                const progChanged=p.oldProgress!==p.newProgress;
                const ragChanged=p.oldRag!==p.newRag;
                const riskChanged=(p.oldRisk||"")!==(p.newRisk||"");
                const ts=p.timestamp?new Date(p.timestamp).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—";
                return(
                  <div key={p.rowIndex} style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${wsMeta.color}25`,borderRadius:10,padding:"14px 16px"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:12}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:3}}>{p.projectName}</div>
                        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>Submitted by: <span style={{color:"rgba(255,255,255,0.6)"}}>{p.submittedBy}</span></span>
                          <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>{ts}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>handleReject(p)} disabled={!!acting_state} style={{padding:"6px 14px",borderRadius:7,background:"transparent",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",fontSize:11,fontWeight:600,cursor:acting_state?"wait":"pointer",fontFamily:"DM Mono,monospace",opacity:acting_state?0.6:1}}>
                          {acting_state==="rejecting"?"Rejecting…":"✗ Reject"}
                        </button>
                        <button onClick={()=>handleApprove(p)} disabled={!!acting_state} style={{padding:"6px 14px",borderRadius:7,background:acting_state?"rgba(34,197,94,0.1)":"#22c55e",border:"none",color:acting_state?"#22c55e":"#0a0d12",fontSize:11,fontWeight:700,cursor:acting_state?"wait":"pointer",fontFamily:"DM Mono,monospace",opacity:acting_state?0.7:1}}>
                          {acting_state==="approving"?"Approving…":"✓ Approve"}
                        </button>
                      </div>
                    </div>
                    {/* changes grid */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                      <div style={{background:progChanged?"rgba(245,158,11,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${progChanged?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:7,padding:"10px 12px"}}>
                        <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>% Complete</div>
                        {progChanged?(
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:18,fontFamily:"Playfair Display,serif",color:"rgba(255,255,255,0.35)",textDecoration:"line-through"}}>{p.oldProgress}%</span>
                            <span style={{color:"#f59e0b",fontSize:12}}>→</span>
                            <span style={{fontSize:22,fontFamily:"Playfair Display,serif",color:"#22c55e"}}>{p.newProgress}%</span>
                          </div>
                        ):(
                          <span style={{fontSize:18,fontFamily:"Playfair Display,serif",color:"rgba(255,255,255,0.4)"}}>{p.oldProgress}% <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>unchanged</span></span>
                        )}
                      </div>
                      <div style={{background:ragChanged?"rgba(245,158,11,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${ragChanged?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:7,padding:"10px 12px"}}>
                        <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>RAG Status</div>
                        {ragChanged?(
                          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:RAG[p.oldRag]?.color,fontFamily:"DM Mono,monospace",opacity:0.5,textDecoration:"line-through"}}>{RAG[p.oldRag]?.label}</span>
                            <span style={{color:"#f59e0b",fontSize:12}}>→</span>
                            <span style={{fontSize:11,color:RAG[p.newRag]?.color,fontFamily:"DM Mono,monospace",fontWeight:700}}>{RAG[p.newRag]?.label}</span>
                          </div>
                        ):(
                          <span style={{fontSize:11,color:RAG[p.oldRag]?.color,fontFamily:"DM Mono,monospace"}}>{RAG[p.oldRag]?.label} <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.25)"}}>unchanged</span></span>
                        )}
                      </div>
                      <div style={{background:riskChanged?"rgba(245,158,11,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${riskChanged?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:7,padding:"10px 12px"}}>
                        <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Risk / Issue</div>
                        {riskChanged?(
                          <div>
                            {p.oldRisk&&<div style={{fontSize:11,color:"rgba(255,255,255,0.35)",textDecoration:"line-through",marginBottom:3}}>{p.oldRisk}</div>}
                            <div style={{fontSize:11,color:p.newRisk?"#f59e0b":"rgba(255,255,255,0.45)"}}>{p.newRisk||"(cleared)"}</div>
                          </div>
                        ):(
                          <div style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{p.oldRisk||"None"} <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>unchanged</span></div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MASTER DASHBOARD (read-only summary, same as viewer)
// ─────────────────────────────────────────────────────────────────────────────
function Master({wsList,onSelect,lastRefresh}){
  const all=wsList.flatMap(allProjects);
  const rc={G:0,A:0,R:0};all.forEach(p=>rc[p.rag]++);
  const overallActual=avgNums(wsList.map(ws=>wsActual(ws)));
  const overallPlanned=avgNums(wsList.map(ws=>wsPlanned(ws)));
  const overallVariance=overallActual-overallPlanned;
  const risks=wsList.flatMap(ws=>allProjects(ws).filter(p=>p.risk).map(p=>({...p,wsCode:ws.code,wsColor:ws.color})));
  const totalInits=wsList.reduce((a,ws)=>a+ws.initiatives.length,0);
  return(
    <div>
      {lastRefresh&&<div style={{fontSize:9,color:"rgba(255,255,255,0.2)",fontFamily:"DM Mono,monospace",marginBottom:14,textAlign:"right"}}>Last synced from Sheets: {lastRefresh}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:20}}>
        {[
          {l:"Actual Progress",v:`${overallActual}%`,sub:"across all workstreams"},
          {l:"Planned Progress",v:`${overallPlanned}%`,sub:"as of today"},
          {l:"Variance",v:varianceLabel(overallVariance),sub:"actual vs planned",col:varianceColor(overallVariance)},
          {l:"Initiatives / Projects",v:`${totalInits} / ${all.length}`,sub:`${totalInits} initiatives · ${all.length} projects`},
          {l:"Open Risks",v:risks.length,sub:risks.length>0?"requiring attention":"none logged",col:risks.length>0?"#ef4444":null},
        ].map((k,i)=>(
          <div key={i} style={{background:k.col?`${k.col}0E`:"rgba(255,255,255,0.03)",border:`1px solid ${k.col?k.col+"25":"rgba(255,255,255,0.07)"}`,borderRadius:10,padding:"15px 16px"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.38)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>{k.l}</div>
            <div style={{fontSize:26,fontFamily:"Playfair Display,serif",color:k.col||"#fff",lineHeight:1,marginBottom:3}}>{k.v}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.28)"}}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:22}}>
        {["G","A","R"].map(r=>(
          <div key={r} style={{background:RAG[r].bg,border:`1px solid ${RAG[r].border}`,borderRadius:10,padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:RAG[r].color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#0a0d12",flexShrink:0}}>{rc[r]}</div>
            <div><div style={{fontSize:13,color:RAG[r].color,fontWeight:600}}>{RAG[r].label}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.32)"}}>projects</div></div>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>Workstream Status — click to edit</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:26}}>
        {wsList.map(ws=>{
          const act=wsActual(ws),plan=wsPlanned(ws),rag=wsRag(ws);
          return(
            <div key={ws.id} onClick={()=>onSelect(ws.id)} style={{background:"rgba(255,255,255,0.022)",border:"1px solid rgba(255,255,255,0.055)",borderLeft:`3px solid ${ws.color}`,borderRadius:10,padding:"13px 15px",cursor:"pointer",transition:"background 0.16s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.055)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.022)"}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9,gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",marginBottom:2}}>{ws.code}</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#fff",lineHeight:1.3}}>{ws.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.32)",marginTop:3}}>Lead: <span style={{color:"rgba(255,255,255,0.6)"}}>{ws.lead}</span></div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}><RAGBadge rag={rag} tiny/><VariancePill actual={act} planned={plan}/></div>
              </div>
              <div style={{marginBottom:5}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>ACTUAL</span><span style={{fontSize:9,color:ws.color,fontFamily:"DM Mono,monospace"}}>{act}%</span></div>
                <Bar pct={act} color={ws.color}/>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>PLANNED</span><span style={{fontSize:9,color:"rgba(255,255,255,0.45)",fontFamily:"DM Mono,monospace"}}>{plan}%</span></div>
                <Bar pct={plan} color="#666e7a"/>
              </div>
              <div style={{display:"flex",gap:12,marginTop:8}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.28)"}}>{ws.initiatives.length} initiatives</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.28)"}}>{allProjects(ws).length} projects</span>
              </div>
            </div>
          );
        })}
      </div>
      {risks.length>0&&(
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>Consolidated Risk Register</div>
          <div style={{border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 70px 80px",padding:"7px 16px",background:"rgba(255,255,255,0.025)",borderBottom:"1px solid rgba(255,255,255,0.055)"}}>
              {["Risk / Issue","WS","Status"].map((h,i)=><span key={i} style={{fontSize:9,color:"rgba(255,255,255,0.28)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase"}}>{h}</span>)}
            </div>
            {risks.map((r,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px 80px",padding:"10px 16px",alignItems:"center",borderBottom:i<risks.length-1?"1px solid rgba(255,255,255,0.04)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.012)"}}>
                <div><div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginBottom:2}}>{r.name}</div><div style={{fontSize:11,color:"#f59e0b"}}>⚠ {r.risk}</div></div>
                <div style={{fontSize:11,color:r.wsColor,fontFamily:"DM Mono,monospace"}}>{r.wsCode}</div>
                <RAGBadge rag={r.rag} tiny/>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// APP SHELL
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [active,setActive]=useState(0);
  const [adminView,setAdminView]=useState('dashboard'); // 'dashboard'|'proposals'
  const [accessToken,setAccessToken]=useState(null);
  const [wsList,setWsList]=useState(FALLBACK_DATA);
  const [dirty,setDirty]=useState(false);
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [error,setError]=useState(null);
  const [successMsg,setSuccessMsg]=useState(null);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [usingSheets,setUsingSheets]=useState(false);

  const isConfigured = CONFIG.SHEET_ID!=="YOUR_SHEET_ID_HERE" && CONFIG.API_KEY!=="YOUR_API_KEY_HERE";
  const oauthReady   = CONFIG.OAUTH_CLIENT_ID!=="YOUR_OAUTH_CLIENT_ID_HERE";

  const showSuccess=msg=>{setSuccessMsg(msg);setTimeout(()=>setSuccessMsg(null),4000);};

  const refresh=useCallback(async()=>{
    if(!isConfigured)return;
    setLoading(true);setError(null);
    try{
      const data=await loadFromSheets();
      if(data){setWsList(data);setUsingSheets(true);setLastRefresh(new Date().toLocaleTimeString());setDirty(false);showSuccess("Refreshed from Google Sheets");}
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[isConfigured]);

  useEffect(()=>{refresh();},[]);

  const saveToSheets=async()=>{
    if(!oauthReady){setError("OAuth Client ID not configured. See setup guide.");return;}
    setSaving(true);setError(null);
    try{
      const token=await signInWithGoogle();
      setAccessToken(token);
      const count=await writeToSheets(wsList,token);
      setDirty(false);
      showSuccess(`Saved — ${count} project rows written to Google Sheets`);
      setLastRefresh(new Date().toLocaleTimeString());
    }catch(e){setError(e.message);}
    finally{setSaving(false);}
  };

  const update=updated=>setWsList(prev=>prev.map(w=>w.id===updated.id?updated:w));
  const markDirty=()=>setDirty(true);

  const currentWS=wsList.find(w=>w.id===active);
  const navItems=[{id:0,code:"CMD",icon:"◈",color:"#C9A84C",name:"Integration Command",lead:null},...wsList];

  return(
    <>
      <div style={{minHeight:"100vh",background:"#0a0d12",fontFamily:"DM Sans,sans-serif",color:"#fff"}}>
        <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>

          {/* ── Sidebar ── */}
          <div style={{width:262,flexShrink:0,background:"rgba(255,255,255,0.014)",borderRight:"1px solid rgba(255,255,255,0.055)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.048)"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.26)",fontFamily:"DM Mono,monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}>Post-Acquisition Integration</div>
              <div style={{fontSize:19,fontFamily:"Playfair Display,serif",color:"#fff"}}>Hightekers</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",marginTop:3}}>Serviap · EOS · Rivermate</div>
              <div style={{marginTop:9,height:1,background:"linear-gradient(90deg,#C9A84C50,transparent)"}}/>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
                <div style={{fontSize:9,color:"#C9A84C",fontFamily:"DM Mono,monospace",letterSpacing:"0.05em"}}>ADMIN MODE</div>
                <div style={{fontSize:8,background:"#C9A84C22",border:"1px solid #C9A84C44",borderRadius:4,padding:"1px 6px",color:"#C9A84C",fontFamily:"DM Mono,monospace"}}>✎</div>
                {dirty&&<div className="dirty-dot" title="Unsaved changes"/>}
              </div>
              {usingSheets&&<div style={{marginTop:4,fontSize:8,color:"rgba(34,197,94,0.7)",fontFamily:"DM Mono,monospace",letterSpacing:"0.05em"}}>● LIVE FROM GOOGLE SHEETS</div>}
            </div>
            <nav style={{flex:1,overflowY:"auto",padding:"7px"}}>
              {navItems.map(ws=>{
                const isActive=active===ws.id;
                const liveWS=wsList.find(w=>w.id===ws.id);
                const rag=liveWS?wsRag(liveWS):null;
                return(
                  <div key={ws.id} onClick={()=>setActive(ws.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,cursor:"pointer",marginBottom:1,background:isActive?`${ws.color}15`:"transparent",border:`1px solid ${isActive?ws.color+"35":"transparent"}`,transition:"all 0.13s"}}
                    onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background="rgba(255,255,255,0.032)";}}
                    onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background="transparent";}}>
                    <span style={{fontSize:12,color:isActive?ws.color:"rgba(255,255,255,0.22)",flexShrink:0}}>{ws.icon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      {ws.id===0?(
                        <div style={{fontSize:12,fontWeight:isActive?600:400,color:isActive?"#fff":"rgba(255,255,255,0.46)"}}>Integration Command</div>
                      ):(
                        <>
                          <div style={{fontSize:8,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",marginBottom:1}}>{ws.code}</div>
                          <div style={{fontSize:11,fontWeight:isActive?600:400,color:isActive?"#fff":"rgba(255,255,255,0.46)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ws.name}</div>
                          {ws.lead&&ws.lead!=="—"&&<div style={{fontSize:9,color:"rgba(255,255,255,0.22)",marginTop:1}}>{ws.lead}</div>}
                        </>
                      )}
                    </div>
                    {rag&&<Dot rag={rag}/>}
                  </div>
                );
              })}
            </nav>

            {/* Sidebar footer — action buttons */}
            <div style={{padding:"10px 11px",borderTop:"1px solid rgba(255,255,255,0.048)",display:"flex",flexDirection:"column",gap:7}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:3}}>
                {Object.entries(RAG).map(([k,v])=>(
                  <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:v.color}}/>
                    <span style={{fontSize:9,color:"rgba(255,255,255,0.28)",fontFamily:"DM Mono,monospace"}}>{v.label}</span>
                  </div>
                ))}
              </div>
              {isConfigured&&(
                <button onClick={refresh} disabled={loading} style={{width:"100%",padding:"7px",borderRadius:7,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.6)",fontSize:10,cursor:loading?"wait":"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  <span className={loading?"spin":""} style={{display:"inline-block"}}>↻</span>
                  {loading?"Refreshing…":"↓ Refresh from Sheets"}
                </button>
              )}
              <button onClick={saveToSheets} disabled={saving||!dirty} style={{width:"100%",padding:"8px",borderRadius:7,background:dirty?"#C9A84C":"rgba(255,255,255,0.04)",border:dirty?"none":"1px solid rgba(255,255,255,0.08)",color:dirty?"#0a0d12":"rgba(255,255,255,0.25)",fontSize:11,fontWeight:700,cursor:dirty&&!saving?"pointer":"not-allowed",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .2s"}}>
                <span className={saving?"spin":""} style={{display:"inline-block"}}>↑</span>
                {saving?"Saving…":dirty?"↑ Save to Sheets":"No Unsaved Changes"}
              </button>
              {!oauthReady&&<div style={{fontSize:9,color:"rgba(245,158,11,0.6)",fontFamily:"DM Mono,monospace",textAlign:"center"}}>Add OAuth Client ID to enable write-back</div>}
            </div>
          </div>

          {/* ── Main ── */}
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {/* Topbar */}
            <div style={{padding:"11px 22px",borderBottom:"1px solid rgba(255,255,255,0.048)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.006)",flexShrink:0}}>
              <div>
                <div style={{fontSize:9,color:active===0?"#C9A84C":currentWS?.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:2}}>{active===0?"Integration Command Centre":`${currentWS?.code} — Admin`}</div>
                <div style={{fontSize:15,fontFamily:"Playfair Display,serif",color:"#fff"}}>{active===0?"Master Integration Dashboard":currentWS?.name}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {successMsg&&<div style={{fontSize:10,color:"#22c55e",fontFamily:"DM Mono,monospace",background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:6,padding:"4px 10px"}}>✓ {successMsg}</div>}
                {error&&<div style={{fontSize:10,color:"#ef4444",fontFamily:"DM Mono,monospace",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:6,padding:"4px 10px",maxWidth:260}}>⚠ {error}</div>}
                <div style={{padding:"5px 12px",borderRadius:20,background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.3)",fontSize:10,color:"#C9A84C",fontFamily:"DM Mono,monospace",fontWeight:600}}>ADMIN</div>
              </div>
            </div>

            {/* Content */}
            <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
              {adminView==="proposals"
                ?<ProposalsPanel wsList={wsList} onUpdate={update} markDirty={markDirty} accessToken={accessToken} onTokenRefresh={setAccessToken}/>
                :active===0
                  ?<Master wsList={wsList} onSelect={setActive} lastRefresh={lastRefresh}/>
                  :currentWS&&<WSDash ws={currentWS} onUpdate={update} markDirty={markDirty}/>
              }
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
