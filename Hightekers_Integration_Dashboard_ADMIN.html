            {/* Proposals button */}
            <div style={{padding:"6px 7px",borderTop:"1px solid rgba(64,72,93,0.4)"}}>
              <div onClick={()=>setAdminView(adminView==="proposals"?"dashboard":"proposals")} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:7,cursor:"pointer",background:adminView==="proposals"?"rgba(201,168,76,0.15)":"transparent",border:`1px solid ${adminView==="proposals"?"rgba(201,168,76,0.35)":"transparent"}`,transition:"all 0.13s"}}
                onMouseEnter={e=>{if(adminView!=="proposals")e.currentTarget.style.background="rgba(255,255,255,0.05)";}}
                onMouseLeave={e=>{if(adminView!=="proposals")e.currentTarget.style.background="transparent";}}>
                <span style={{fontSize:14,flexShrink:0}}>📬</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:13,fontWeight:adminView==="proposals"?600:400,color:adminView==="proposals"?"#fff":"#dee5ff"}}>Review Proposals</span>
                    {pendingCount>0&&<span style={{fontSize:11,fontWeight:700,color:"#060e20",background:"#ef4444",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"DM Mono,monospace",flexShrink:0}}>{pendingCount}</span>}
                  </div>
                  <div style={{fontSize:13,color:"#a3aac4",fontFamily:"DM Mono,monospace"}}>Lead submissions</div>
                </div>
                {adminView==="proposals"&&<span style={{fontSize:13,color:"#C9A84C",fontFamily:"DM Mono,monospace"}}>●</span>}
              </div>
            </div>

            {/* Sidebar footer — action buttons */}
            <div style={{padding:"10px 11px",borderTop:"1px solid rgba(64,72,93,0.4)",display:"flex",flexDirection:"column",gap:7}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:3}}>
                {Object.entries(RAG).map(([k,v])=>(
                  <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:v.color}}/>
                    <span style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif"}}>{v.label}</span>
                  </div>
                ))}
              </div>
              {isConfigured&&(
                <button onClick={refresh} disabled={loading} style={{width:"100%",padding:"7px",borderRadius:12,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(64,72,93,0.4)",color:"#dee5ff",fontSize:12,cursor:loading?"wait":"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all 0.15s"}}>
                  <span className={loading?"spin":""} style={{display:"inline-block"}}>↻</span>
                  {loading?"Refreshing…":"↓ Refresh from Sheets"}
                </button>
              )}
              <button onClick={saveToSheets} disabled={saving||!dirty} style={{width:"100%",padding:"8px",borderRadius:12,background:dirty?"#C9A84C":"rgba(255,255,255,0.04)",border:dirty?"none":"1px solid rgba(64,72,93,0.4)",color:dirty?"#060e20":"#a3aac4",fontSize:13,fontWeight:700,cursor:dirty&&!saving?"pointer":"not-allowed",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .2s"}}>
                <span className={saving?"spin":""} style={{display:"inline-block"}}>↑</span>
                {saving?"Saving…":dirty?"↑ Save to Sheets":"No Unsaved Changes"}
              </button>
              {riskDirty&&(
                <button onClick={saveRiskRegister} disabled={savingRisk} style={{width:"100%",padding:"8px",borderRadius:12,background:"#f59e0b",border:"none",color:"#060e20",fontSize:13,fontWeight:700,cursor:savingRisk?"wait":"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .2s"}}>
                  <span className={savingRisk?"spin":""} style={{display:"inline-block"}}>↑</span>
                  {savingRisk?"Saving…":"↑ Save Risk Register"}
                </button>
              )}

              <button onClick={()=>{
                fetch(CONFIG.APPS_SCRIPT_URL+"?action=report",{mode:"no-cors"}).then(()=>{}).catch(()=>{});
                showSuccess("Report triggered — check your email in ~1 min");
              }} style={{width:"100%",padding:"7px",borderRadius:12,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(64,72,93,0.4)",color:"#dee5ff",fontSize:12,cursor:"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all 0.15s"}}>
                &#128196; Generate Status Report
              </button>
              {!oauthReady&&<div style={{fontSize:13,color:"rgba(245,158,11,0.6)",fontFamily:"DM Mono,monospace",textAlign:"center"}}>Add OAuth Client ID to enable write-back</div>}
            </div>
          </div>

          {/* ── Main ── */}
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {/* Topbar */}
            <div style={{padding:"16px 22px",borderBottom:`1px solid ${active===0?"rgba(64,72,93,0.4)":currentWS?.color+"40"}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:active===0?`linear-gradient(135deg,rgba(201,168,76,0.06) 0%,#0f1930 60%)`:`linear-gradient(135deg,${currentWS?.color}10 0%,#0f1930 60%)`,flexShrink:0,boxShadow:active===0?"none":`0 1px 0 0 ${currentWS?.color}20`}}>
              <div>
                <div style={{fontSize:13,color:active===0?"#C9A84C":currentWS?.color,fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:4}}>{active===0?"Integration Command Centre":`${currentWS?.code} — Admin`}</div>
                <div style={{fontSize:22,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#dee5ff",lineHeight:1.2}}>{active===0?"Master Integration Dashboard":currentWS?.name}</div>
                {active!==0&&currentWS?.lead&&<div style={{fontSize:13,color:"#6d758c",fontFamily:"Manrope,sans-serif",marginTop:4}}>Workstream Lead: <span style={{color:"#a3aac4",fontWeight:500}}>{currentWS.lead}</span></div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {successMsg&&<div style={{fontSize:12,color:"#22c55e",fontFamily:"DM Mono,monospace",background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:6,padding:"4px 10px"}}>✓ {successMsg}</div>}
                {error&&<div style={{fontSize:12,color:"#ef4444",fontFamily:"DM Mono,monospace",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:6,padding:"4px 10px",maxWidth:260}}>⚠ {error}</div>}
                <div style={{padding:"5px 12px",borderRadius:20,background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.3)",fontSize:12,color:"#C9A84C",fontFamily:"DM Mono,monospace",fontWeight:600}}>ADMIN</div>
              </div>
            </div>

            {/* Content */}
            <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
              {adminView==="risks"
                ?<RiskRegisterView riskData={riskData} onUpdateRisk={rd=>{setRiskData(rd);setRiskDirty(true);}} riskDirty={riskDirty} onSaveRisk={saveRiskRegister} savingRisk={savingRisk}/>
                :adminView==="proposals"
                  ?<ProposalsPanel wsList={wsList} onUpdate={update} markDirty={markDirty} accessToken={accessToken} onTokenRefresh={setAccessToken}/>
                  :active===0
                    ?<Master wsList={wsList} onSelect={setActive} lastRefresh={lastRefresh} history={history} riskData={riskData}/>
                    :currentWS&&<WSDash ws={currentWS} onUpdate={update} markDirty={markDirty} cardData={cardData} onCardOpen={setActiveCard} riskData={riskData}/>
              }
            </div>
          </div>
        </div>
      </div>
      {activeCard&&<ProjectCardModal key={activeCard.project.id} project={activeCard.project} card={cardData.cards[activeCard.project.id]} milestones={cardData.milestones[activeCard.project.id]} wsColor={activeCard.wsColor} onClose={()=>setActiveCard(null)} onSave={handleSaveCard}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate><App/></AuthGate>);
</script>
</body>
</html>
