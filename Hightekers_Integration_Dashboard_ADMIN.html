*{box-sizing:border-box;margin:0;padding:0;font-family:inherit}
body{background:#060e20;color:#fff;font-family:"Manrope",sans-serif}
button,input,select,textarea{font-family:"Manrope",sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#0f1930;border:1px solid rgba(64,72,93,0.4);border-radius:14px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
/* form fields */
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:rgba(255,255,255,0.72);font-family:"DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:#141f38;border:1px solid rgba(64,72,93,0.4);border-radius:6px;color:#fff;font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;font-family:"Manrope",sans-serif}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3bbffa}
.field select option{background:#0f1930;color:#fff}
/* buttons */
.btn{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:"Manrope",sans-serif}
.btn-gold{background:#C9A84C;color:#060e20}.btn-gold:hover{background:#d4b660}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6)}.btn-ghost:hover{border-color:#a3aac4;color:#fff}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,0.35);color:#ef4444}.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-green{background:#22c55e;color:#060e20}.btn-green:hover{background:#16a34a}
/* dirty indicator */
.dirty-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f59e0b;margin-left:5px;flex-shrink:0}
/* inline admin controls */
.admin-row{display:flex;align-items:center;gap:6px}
.icon-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(64,72,93,0.4);border-radius:6px;color:#a3aac4;font-size:11px;padding:3px 7px;cursor:pointer;transition:all .15s;font-family:"DM Mono",monospace;white-space:nowrap}
.icon-btn:hover{border-color:#dee5ff;color:#dee5ff}
.icon-btn.danger:hover{border-color:#ef4444;color:#ef4444}
.add-row{display:flex;align-items:center;gap:6px;padding:7px 15px;border-top:1px solid rgba(255,255,255,0.08)}
.add-btn{background:transparent;border:1px dashed rgba(255,255,255,0.15);border-radius:6px;color:rgba(255,255,255,0.72);font-size:11px;padding:4px 12px;cursor:pointer;transition:all .15s;font-family:"DM Mono",monospace}
.add-btn:hover{border-color:rgba(255,255,255,0.72);color:rgba(255,255,255,0.75)}

// ─────────────────────────────────────────────────────────────────────────────
// Columns: A=ProjectID B=WSCode C=InitID D=InitName E=WSLead F=InitOwner
//          G=ProjName H=ProjOwner I=Start J=End K=% L=RAG M=Risk

async function loadFromSheets() {
  const {SHEET_ID,API_KEY,SHEET_TAB} = CONFIG;
  if(SHEET_ID==="YOUR_SHEET_ID_HERE"||API_KEY==="YOUR_API_KEY_HERE") return null;
  const range = encodeURIComponent(`${SHEET_TAB}!A2:N500`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Read error: ${res.status} ${res.statusText}`);
  const json = await res.json();
  return parseRows(json.values||[]);
}

function parseRows(rows){
  const wsMap={};
  Object.values(WS_META).forEach(m=>{wsMap[m.code]={...m,lead:"—",initiatives:[]};});
  rows.forEach(row=>{
    const [projId,wsCode,initId,initName,wsLead,initOwner,projName,projOwner,start,end,progressRaw,ragRaw,risk]=row;
    const code=wsCode?.trim(); if(!code||!wsMap[code]) return;
    const ws=wsMap[code];
    if(wsLead?.trim()&&ws.lead==="—") ws.lead=wsLead.trim();
    const iid=initId?.trim();
    let init=ws.initiatives.find(i=>i.id===iid);
    if(!init){init={id:iid,name:initName?.trim()||"",owner:initOwner?.trim()||"—",projects:[]};ws.initiatives.push(init);}
    if(initOwner?.trim()&&init.owner==="—") init.owner=initOwner.trim();
    const rag=["G","A","R"].includes(ragRaw?.trim().toUpperCase())?ragRaw.trim().toUpperCase():"G";
    init.projects.push({
      id:projId?.trim()||`${iid}.${init.projects.length+1}`,
      name:projName?.trim()||"",owner:projOwner?.trim()||"—",
      progress:Math.min(100,Math.max(0,parseInt(progressRaw)||0)),
      rag,risk:risk?.trim()||null,
      start:start?.trim()||"2026-01-01",end:end?.trim()||"2026-12-31",
      notes:row[13]?.trim()||"",
    });
  });
  return Object.values(wsMap).filter(ws=>ws.initiatives.length>0);
}

// Flatten workstreams → sheet rows
function flattenToRows(wsList){
  const rows=[];
  wsList.forEach(ws=>{
    ws.initiatives.forEach(init=>{
      init.projects.forEach(pr=>{
        rows.push([
          pr.id, ws.code, init.id, init.name,
          ws.lead||"—", init.owner||"—",
          pr.name, pr.owner||"—",
          pr.start, pr.end,
          String(pr.progress), pr.rag, pr.risk||"",
          pr.notes||"",
        ]);
      });
    });
  });
  return rows;
}

async function writeToSheets(wsList, accessToken){
  const {SHEET_ID,SHEET_TAB} = CONFIG;
  const rows = flattenToRows(wsList);
  // 1. Clear existing data (keep header row)
  const clearUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB+"!A2:N500")}:clear`;
  await fetch(clearUrl,{method:"POST",headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"}});
  // 2. Write all rows
  const writeUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_TAB+"!A2")}?valueInputOption=RAW`;
  const res=await fetch(writeUrl,{
    method:"PUT",
    headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({range:`${SHEET_TAB}!A2`,majorDimension:"ROWS",values:rows}),
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Write error ${res.status}`);}
  return rows.length;
}

// Milestone rows: H=MilestoneName L=OldStatus M=NewStatus N=Status O=Comment
// ─────────────────────────────────────────────────────────────────────────────
async function loadProposals(){
  const {SHEET_ID,API_KEY,PROPOSALS_TAB}=CONFIG;
  if(SHEET_ID==="YOUR_SHEET_ID_HERE"||API_KEY==="YOUR_API_KEY_HERE") return [];
  const range=encodeURIComponent(`${PROPOSALS_TAB}!A2:P500`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`Proposals read error: ${res.status}`);
  const json=await res.json();
  const rows=json.values||[];
  return rows.map((row,i)=>{
    const rowType=row[0]||"project";
    const base={
      rowIndex:i+2,
      rowType,
      timestamp:row[1]||"",
      submittedBy:row[2]||"",
      leadEmail:row[3]||"",
      wsCode:row[4]||"",
      projectId:row[5]||"",
      projectName:row[6]||"",
      status:row[13]||"Pending",
      comment:row[14]||"",
    };
    if(rowType==="milestone"){
      return{...base,
        milestoneName:row[7]||"",
        oldStatus:row[11]||"",
        newStatus:row[12]||"",
      };
    }
    // project row
    return{...base,
      oldProgress:parseInt(row[7])||0,
      newProgress:parseInt(row[8])||0,
      oldRag:row[9]||"G",
      newRag:row[10]||"G",
      oldRisk:row[11]||"",
      newRisk:row[12]||"",
    };
  }).filter(p=>p.status==="Pending");
}

async function updateProposalStatus(rowIndex, status, accessToken, rejectionReason){
  const {SHEET_ID,PROPOSALS_TAB}=CONFIG;
  const putRange=async(ref,vals)=>{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(ref)}?valueInputOption=RAW`;
    const res=await fetch(url,{
      method:"PUT",
      headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"},
      body:JSON.stringify({range:ref,majorDimension:"ROWS",values:vals}),
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Status update error ${res.status}`);}
  };
  // Write status to col N (index 14, shifted by RowType col) — never touch col O (comment)
  await putRange(`${PROPOSALS_TAB}!N${rowIndex}`,[[status]]);
  // If rejecting, write rejection reason to col P separately
  if(rejectionReason&&rejectionReason.trim()){
    await putRange(`${PROPOSALS_TAB}!P${rowIndex}`,[[rejectionReason.trim()]]);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
async function loadProjectCards(){
  const {SHEET_ID,API_KEY,PROJECT_CARDS_TAB,MILESTONES_TAB}=CONFIG;
  if(!SHEET_ID||SHEET_ID==="YOUR_SHEET_ID_HERE") return {cards:{},milestones:{}};
  try{
    const [cr2,mr2]=await Promise.all([
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(PROJECT_CARDS_TAB+"!A2:F500")}?key=${API_KEY}`).then(r=>r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(MILESTONES_TAB+"!A2:D500")}?key=${API_KEY}`).then(r=>r.json()),
    ]);
    const cards={};
    (cr2.values||[]).forEach(row=>{
      const [id,desc,scope,outputs,kpis,deps]=row;
      if(id?.trim()) cards[id.trim()]={description:desc||"",scope:scope||"",outputs:outputs||"",kpis:kpis||"",dependencies:deps||""};
    });
    const milestones={};
    (mr2.values||[]).forEach(row=>{
      const [pid,name,date,status]=row;
      if(!pid?.trim()) return;
      if(!milestones[pid.trim()]) milestones[pid.trim()]=[];
      milestones[pid.trim()].push({name:name||"",date:date||"",status:status||"Not Started"});
    });
    return {cards,milestones};
  }catch(e){console.warn("Cards load failed:",e.message);return {cards:{},milestones:{}};}
}

async function saveProjectCard(projectId,cardFields,milestoneRows,accessToken){
  const {SHEET_ID,PROJECT_CARDS_TAB,MILESTONES_TAB}=CONFIG;
  const hdr={"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"};

  // ── 1. Save card fields (ProjectCards tab) ────────────────────────────────
  const pcReadRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(PROJECT_CARDS_TAB+"!A2:A500")}?key=${CONFIG.API_KEY}`);
  const pcData=await pcReadRes.json();
  const pcRows=pcData.values||[];
  const pcRowIdx=pcRows.findIndex(r=>r[0]?.trim()===projectId);
  const sheetRow=[projectId,cardFields.description||"",cardFields.scope||"",cardFields.outputs||"",cardFields.kpis||"",cardFields.dependencies||""];
  if(pcRowIdx>=0){
    // Update existing row
    const r=`${PROJECT_CARDS_TAB}!A${pcRowIdx+2}:F${pcRowIdx+2}`;
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(r)}?valueInputOption=RAW`,{
      method:"PUT",headers:hdr,
      body:JSON.stringify({range:r,majorDimension:"ROWS",values:[sheetRow]}),
    });
  } else {
    // Append new row
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(PROJECT_CARDS_TAB+"!A1")}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{
      method:"POST",headers:hdr,
      body:JSON.stringify({majorDimension:"ROWS",values:[sheetRow]}),
    });
  }

  // ── 2. Save milestones — read full sheet, rebuild without this project, rewrite ─
  const validMS=milestoneRows.filter(m=>m.name?.trim());
  const mAllRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(MILESTONES_TAB+"!A2:D500")}?key=${CONFIG.API_KEY}`);
  const mAllData=await mAllRes.json();
  const mAllRows=mAllData.values||[];
  // Keep rows that belong to OTHER projects
  const otherRows=mAllRows.filter(r=>r[0]?.trim()!==projectId);
  // Add this project's new milestones
  const newMsRows=validMS.map(m=>[projectId,m.name,m.date||"",m.status||"Not Started"]);
  const allNewRows=[...otherRows,...newMsRows];
  // Clear the data range then rewrite everything
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(MILESTONES_TAB+"!A2:D500")}:clear`,{
    method:"POST",headers:hdr,
  });
  if(allNewRows.length>0){
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(MILESTONES_TAB+"!A2")}?valueInputOption=RAW`,{
      method:"PUT",headers:hdr,
      body:JSON.stringify({range:`${MILESTONES_TAB}!A2`,majorDimension:"ROWS",values:allNewRows}),
    });
  }
}

// HISTORY — load weekly snapshots for trend sparklines
// ─────────────────────────────────────────────────────────────────────────────
async function loadHistory(){
  const {SHEET_ID,API_KEY,HISTORY_TAB}=CONFIG;
  if(!SHEET_ID||SHEET_ID==="YOUR_SHEET_ID_HERE") return {};
  try{
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(HISTORY_TAB+"!A2:F2000")}?key=${API_KEY}`);
    const json=await res.json();
    const rows=json.values||[];
    const byWS={};
    rows.forEach(row=>{
      const [date,projId,wsCode,actual,planned,rag]=row;
      if(!wsCode) return;
      if(!byWS[wsCode]) byWS[wsCode]=[];
      byWS[wsCode].push({date:date||"",actual:parseInt(actual)||0,planned:parseInt(planned)||0,rag:rag||"G"});
    });
    const wsTrends={};
    Object.entries(byWS).forEach(([ws,rows])=>{
      const byDate={};
      rows.forEach(r=>{
        if(!byDate[r.date]) byDate[r.date]={actuals:[],planneds:[]};
        byDate[r.date].actuals.push(r.actual);
        byDate[r.date].planneds.push(r.planned);
      });
      wsTrends[ws]=Object.entries(byDate).sort((a,b)=>a[0]<b[0]?-1:1).map(([date,d])=>({
        date,
        actual:Math.round(d.actuals.reduce((a,b)=>a+b,0)/d.actuals.length),
        planned:Math.round(d.planneds.reduce((a,b)=>a+b,0)/d.planneds.length),
      }));
    });
    return wsTrends;
  }catch(e){console.warn("History load failed:",e.message);return {};}
}

function signInWithGoogle(){
  return new Promise((resolve,reject)=>{
    let attempts=0;
    const tryInit=()=>{
      if(window.google?.accounts?.oauth2){
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:CONFIG.OAUTH_CLIENT_ID,
          scope:"https://www.googleapis.com/auth/spreadsheets",
          callback:(resp)=>resp.error?reject(new Error(resp.error)):resolve(resp.access_token),
        });
        client.requestAccessToken();
      } else if(attempts<10){attempts++;setTimeout(tryInit,500);}
      else reject(new Error("Google Identity Services failed to load."));
    };
    tryInit();
  });
}

const TODAY=new Date();
function plannedPct(start,end){
  const s=new Date(start),e=new Date(end);
  if(TODAY<=s)return 0;if(TODAY>=e)return 100;
  return Math.round(((TODAY-s)/(e-s))*100);
}
const RAG={
  G:{label:"On Track",color:"#22c55e",bg:"rgba(34,197,94,0.11)",border:"rgba(34,197,94,0.32)"},
  A:{label:"At Risk",color:"#f59e0b",bg:"rgba(245,158,11,0.11)",border:"rgba(245,158,11,0.32)"},
  R:{label:"Off Track",color:"#ef4444",bg:"rgba(239,68,68,0.11)",border:"rgba(239,68,68,0.32)"},
};
const allProjects=ws=>ws.initiatives.flatMap(i=>i.projects);
const wsRag=ws=>allProjects(ws).reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const avgOf=arr=>arr.length?Math.round(arr.reduce((a,p)=>a+p.progress,0)/arr.length):0;
const avgNums=arr=>arr.length?Math.round(arr.reduce((a,n)=>a+n,0)/arr.length):0;
const wsActual=ws=>avgOf(allProjects(ws));
const initActual=init=>avgOf(init.projects);
const initPlanned=init=>avgNums(init.projects.map(p=>plannedPct(p.start,p.end)));
const wsPlanned=ws=>avgNums(allProjects(ws).map(p=>plannedPct(p.start,p.end)));
const initRag=init=>init.projects.reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const fmtDate=str=>{const d=new Date(str);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});};
const varianceColor=v=>v>=0?"#3bbffa":v>=-15?"#f59e0b":"#ef4444";
const varianceLabel=v=>v>=0?`+${v}%`:`${v}%`;
let _uid=1000;const uid=()=>`new_${_uid++}`;
function openRisksForProject(riskData,projectId){
  return riskData.filter(r=>r.projectId===projectId&&r.status==="Open").length;
}

function Bar({pct,color,h=6}){

// EDIT MODAL — used for both Initiative and Project
// ─────────────────────────────────────────────────────────────────────────────
function EditModal({title,fields,onSave,onDelete,onClose,deleteLabel}){
  const [form,setForm]=useState(()=>{
    const init={};
    fields.forEach(f=>{init[f.key]=f.value??""});
    return init;
  });
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#fff"}}>{title}</div>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:"3px 10px",fontSize:13}}>✕</button>
        </div>
        {fields.map(f=>(
          <div key={f.key} className="field">
            <label>{f.label}</label>
            {f.type==="rag"?(
              <div style={{display:"flex",gap:8,marginTop:2}}>
                {["G","A","R"].map(r=>(
                  <button key={r} onClick={()=>set(f.key,r)} style={{flex:1,padding:"7px 0",borderRadius:7,cursor:"pointer",fontSize:13,fontFamily:"DM Mono,monospace",fontWeight:600,border:`2px solid ${form[f.key]===r?RAG[r].color:"rgba(255,255,255,0.15)"}`,background:form[f.key]===r?`${RAG[r].color}22`:"transparent",color:form[f.key]===r?RAG[r].color:"rgba(255,255,255,0.72)",transition:"all .15s"}}>
                    {RAG[r].label}
                  </button>
                ))}
              </div>
            ):f.type==="number"?(
              <input type="number" min="0" max="100" value={form[f.key]} onChange={e=>set(f.key,Math.min(100,Math.max(0,parseInt(e.target.value)||0)))}/>
            ):f.type==="date"?(
              <input type="date" value={form[f.key]} onChange={e=>set(f.key,e.target.value)}/>
            ):f.type==="textarea"?(
              <textarea rows={2} value={form[f.key]} onChange={e=>set(f.key,e.target.value)} style={{resize:"vertical"}}/>
            ):(
              <input type="text" value={form[f.key]} onChange={e=>set(f.key,e.target.value)}/>
            )}
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:22,gap:8}}>
          <div>{onDelete&&<button className="btn btn-danger" onClick={()=>{onDelete();onClose();}}>{deleteLabel||"Delete"}</button>}</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-gold" onClick={()=>{onSave(form);onClose();}}>Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Gantt
const GANTT_START=new Date("2026-01-01"),GANTT_END=new Date("2026-12-31"),GANTT_SPAN=GANTT_END-GANTT_START;
function ganttPct(d){return Math.max(0,Math.min(100,((new Date(d)-GANTT_START)/GANTT_SPAN)*100));}
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function GanttHeader(){
  return(
    <div style={{display:"grid",gridTemplateColumns:"240px 1fr 80px 70px",gap:10,marginBottom:4,alignItems:"center"}}>
      <div/>
      <div style={{position:"relative",height:18}}>
        {MONTHS.map((m,i)=>(
          <div key={m} style={{position:"absolute",left:`${(i/12)*100}%`,
            fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",
            transform:"translateX(-50%)",whiteSpace:"nowrap"}}>{m}</div>
        ))}
      </div>
      <div/><div/>
    </div>
  );
}
function GanttRow({project,color}){
  const startPct=ganttPct(project.start),endPct=ganttPct(project.end);
  const barWidth=endPct-startPct;
  const fillWidth=barWidth*(project.progress/100);
  const ragGlowMap={G:"0 0 10px rgba(34,197,94,0.5),0 0 20px rgba(34,197,94,0.2)",A:"0 0 10px rgba(245,158,11,0.5),0 0 20px rgba(245,158,11,0.2)",R:"0 0 10px rgba(239,68,68,0.5),0 0 20px rgba(239,68,68,0.2)"};
  const ragColorMap={G:"#22c55e",A:"#f59e0b",R:"#ef4444"};
  const bc=ragColorMap[project.rag]||color;
  const todayPct=ganttPct(TODAY.toISOString().slice(0,10));
  return(
    <div style={{position:"relative",height:28,marginBottom:2}}>
      <div style={{position:"absolute",top:10,left:0,right:0,height:8,borderRadius:9999,background:"rgba(255,255,255,0.04)"}}/>
      <div style={{position:"absolute",top:10,left:`${startPct}%`,width:`${barWidth}%`,height:8,borderRadius:9999,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",boxShadow:"inset 0 1px 0 rgba(255,255,255,0.1)"}}/>
      <div style={{position:"absolute",top:10,left:`${startPct}%`,width:`${fillWidth}%`,height:8,borderRadius:9999,background:`linear-gradient(90deg,${bc}99,${bc})`,boxShadow:ragGlowMap[project.rag],transition:"width 0.4s"}}/>
      <div style={{position:"absolute",top:0,left:`${todayPct}%`,width:2,height:28,background:"#3bbffa",borderRadius:1,boxShadow:"0 0 6px rgba(59,191,250,0.6)"}}/>
    </div>
  );
}


// ─────────────────────────────────────────────────────────────────────────────
// SPARKLINE — trend chart for workstream progress
// ─────────────────────────────────────────────────────────────────────────────
function WSDash({ws,onUpdate,markDirty,cardData,onCardOpen,riskData}){
  const [openInit,setOpenInit]=useState(null);
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [view,setView]=useState("table");

  const all=allProjects(ws);
  const act=wsActual(ws),plan=wsPlanned(ws);
  const rc={G:0,A:0,R:0};all.forEach(p=>rc[p.rag]++);

  // patch helpers
  const patchWS=updates=>{onUpdate({...ws,...updates});markDirty();};
  const patchInit=(initId,updates)=>{
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,...updates})});
    markDirty();
  };
  const patchProj=(initId,projId,updates)=>{
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,projects:i.projects.map(p=>p.id!==projId?p:{...p,...updates})})});
    markDirty();
  };
  const deleteInit=initId=>{
    onUpdate({...ws,initiatives:ws.initiatives.filter(i=>i.id!==initId)});
    markDirty();setOpenInit(null);
  };
  const deleteProj=(initId,projId)=>{
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,projects:i.projects.filter(p=>p.id!==projId)})});
    markDirty();
  };
  const addInit=()=>{
    const newId=`${ws.id}.${ws.initiatives.length+1}_${uid()}`;
    const newInit={id:newId,name:"New Initiative",owner:"TBC",projects:[]};
    onUpdate({...ws,initiatives:[...ws.initiatives,newInit]});
    markDirty();
    setModal({type:"init",init:newInit,onSave:f=>patchInit(newId,f)});
  };
  const addProj=initId=>{
    const init=ws.initiatives.find(i=>i.id===initId);
    const newId=`${initId}.${init.projects.length+1}_${uid()}`;
    const newProj={id:newId,name:"New Project",owner:"TBC",progress:0,rag:"G",risk:null,start:"2026-03-01",end:"2026-06-30"};
    onUpdate({...ws,initiatives:ws.initiatives.map(i=>i.id!==initId?i:{...i,projects:[...i.projects,newProj]})});
    markDirty();
    setModal({type:"proj",proj:newProj,initId,onSave:f=>patchProj(initId,newId,{...f,progress:parseInt(f.progress)||0,risk:f.risk||null})});
  };

  const initFields=init=>[
    {key:"name",label:"Initiative Name",value:init.name},
    {key:"owner",label:"Initiative Owner",value:init.owner},
  ];
  const projFields=proj=>[
    {key:"name",label:"Project Name",value:proj.name},
    {key:"owner",label:"Project Owner",value:proj.owner},
    {key:"start",label:"Start Date",type:"date",value:proj.start},
    {key:"end",label:"End Date",type:"date",value:proj.end},
    {key:"progress",label:"% Complete (0–100)",type:"number",value:proj.progress},
    {key:"rag",label:"RAG Status",type:"rag",value:proj.rag},
    {key:"risk",label:"Risk / Issue (leave blank if none)",type:"textarea",value:proj.risk||""},
  ];

  const tabBtn=(label,val)=>(
    <button onClick={()=>setView(val)} style={{padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"DM Mono,monospace",border:`1px solid ${view===val?ws.color+"60":"rgba(255,255,255,0.1)"}`,background:view===val?`${ws.color}18`:"transparent",color:view===val?ws.color:"rgba(255,255,255,0.72)",transition:"all 0.15s"}}>{label}</button>
  );
  return(
    <div>
      {modal?.type==="init"&&(
        <EditModal title="Edit Initiative" fields={initFields(modal.init)}
          onSave={f=>patchInit(modal.init.id,f)}
          onDelete={()=>setConfirm({msg:`Delete initiative "${modal.init.name}" and all its projects?`,fn:()=>deleteInit(modal.init.id)})}
          deleteLabel="Delete Initiative" onClose={()=>setModal(null)}/>
      )}
      {modal?.type==="proj"&&(
        <EditModal title="Edit Project" fields={projFields(modal.proj)}
          onSave={f=>patchProj(modal.initId,modal.proj.id,{...f,progress:parseInt(f.progress)||0,risk:f.risk||null})}
          onDelete={()=>setConfirm({msg:`Delete project "${modal.proj.name}"?`,fn:()=>deleteProj(modal.initId,modal.proj.id)})}
          deleteLabel="Delete Project" onClose={()=>setModal(null)}/>
      )}
      {confirm&&<Confirm message={confirm.msg} onConfirm={confirm.fn} onClose={()=>setConfirm(null)}/>}

      <SummaryPanels
        actual={act}
        planned={plan}
        initiatives={ws.initiatives.length}
        projects={all.length}
        rc={rc}
        color={ws.color}
        variance={act-plan}
      />

      {/* Initiatives */}
      <div style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:9}}>Initiatives &amp; Projects</div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>{tabBtn("📋 Table","table")}{tabBtn("📅 Gantt","gantt")}{tabBtn("⬛ Cards","cards")}</div>

      {/* CARD VIEW */}
      {view==="cards"&&(
        <div>
          {ws.initiatives.map(init=>{
            const ir=initRag(init),ip=initActual(init),iplan=initPlanned(init);
            const irColor={G:"#22c55e",A:"#f59e0b",R:"#ef4444"}[ir]||"#22c55e";
            const irGlow={G:"0 0 12px rgba(34,197,94,0.12)",A:"0 0 12px rgba(245,158,11,0.12)",R:"0 0 12px rgba(239,68,68,0.12)"}[ir]||"none";
            return(
              <div key={init.id} style={{marginBottom:22}}>
                {/* Initiative header — styled as a card */}
                <div style={{background:`linear-gradient(145deg,${ws.color}0C 0%,#0f1930 65%)`,border:`1px solid ${ws.color}35`,borderTop:`2px solid ${irColor}`,borderRadius:12,padding:"14px 16px",marginBottom:10,boxShadow:`inset 0 1px 0 0 rgba(64,72,93,0.4),${irGlow}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{fontSize:12,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",fontWeight:700}}>{init.id}</span>
                    <span style={{fontSize:15,fontWeight:700,color:"#dee5ff",flex:1,fontFamily:"Manrope,sans-serif"}}>{init.name}</span>
                    <RAGBadge rag={ir} tiny/>
                    <VariancePill actual={ip} planned={iplan}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em"}}>{ip}% actual · {iplan}% planned</span>
                    <span style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>{init.projects.length} projects</span>
                  </div>
                  <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.06)",borderRadius:9999,overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,left:0,height:"100%",background:"rgba(255,255,255,0.15)",width:`${iplan}%`,borderRadius:9999}}/>
                    <div style={{position:"absolute",top:0,left:0,height:"100%",background:irColor,width:`${ip}%`,borderRadius:9999,boxShadow:`0 0 6px ${irColor}80`,transition:"width 0.4s"}}/>
                  </div>
                </div>
                {/* Project cards - 3 per row */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                  {init.projects.map(pr=>{
                    const pplan=plannedPct(pr.start,pr.end);
                    const ragColor={G:"#22c55e",A:"#f59e0b",R:"#ef4444"}[pr.rag]||"#22c55e";
                    const ragGlow={G:"0 0 12px rgba(34,197,94,0.15)",A:"0 0 12px rgba(245,158,11,0.15)",R:"0 0 12px rgba(239,68,68,0.15)"}[pr.rag]||"none";
                    const riskCount=openRisksForProject(riskData||[],pr.id);

// ─────────────────────────────────────────────────────────────────────────────
// SPARKLINE — trend chart for workstream progress
// ─────────────────────────────────────────────────────────────────────────────
function Sparkline({data,color,width=80,height=28}){
  if(!data||data.length<1) return null;
  const vals=data.map(d=>d.actual);
  const min=0,max=100;
  // Single point — show a dot with the current value
  if(vals.length===1){
    const y=height-((vals[0]-min)/(max-min))*(height-4)-2;
    return(
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <svg width={width} height={height} style={{overflow:"visible"}}>
          <circle cx={width/2} cy={y} r={3} fill={color} opacity="0.8"/>
        </svg>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:"DM Mono,monospace"}}>—</span>
      </div>
    );
  }
  // If all values identical, draw flat line at correct Y position
  const allSame=vals.every(v=>v===vals[0]);
  const flatY=allSame?height-((vals[0]-min)/(max-min))*(height-4)-2:0;
  const pts=allSame
    ?`0,${flatY} ${width},${flatY}`
    :vals.map((v,i)=>{
        const x=(i/(vals.length-1))*width;
        const y=height-((v-min)/(max-min))*(height-4)-2;
        return `${x},${y}`;
      }).join(' ');
  const last=vals[vals.length-1];
  const prev=vals.length>=2?vals[vals.length-2]:vals[0];
  const trend=last-prev;
  const trendColor=trend>0?"#22c55e":trend<0?"#ef4444":"rgba(255,255,255,0.4)";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <svg width={width} height={height} style={{overflow:"visible"}}>
        <polyline points={pts} fill="none" stroke="#3bbffa" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.7"/>
        {vals.map((v,i)=>{
          const x=(i/(vals.length-1))*width;
          const y=height-((v-min)/(max-min))*(height-4)-2;
          return i===vals.length-1?<circle key={i} cx={x} cy={y} r={2.5} fill="#3bbffa" filter="url(#sparkGlow)"/>:null;
        })}
        <defs><filter id="sparkGlow"><feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      </svg>
      <span style={{fontSize:11,color:trendColor,fontFamily:"DM Mono,monospace",fontWeight:700,whiteSpace:"nowrap"}}>
        {trend>0?"+":""}{trend}%
      </span>
    </div>
  );
}

// CROSS-WORKSTREAM GANTT

function CrossGantt({wsList}){
  const [expandedWS,setExpandedWS]=useState(null);
  const GANTT_S=new Date("2026-01-01"),GANTT_E=new Date("2026-12-31");
  const SPAN=GANTT_E-GANTT_S;
  const pct=d=>Math.max(0,Math.min(100,((new Date(d)-GANTT_S)/SPAN)*100));
  const todayPct=pct(new Date());
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return(
    <div>
      <div style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:12}}>Cross-Workstream Gantt — 2026</div>
      {/* Month headers */}
      <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,marginBottom:4}}>
        <div/>
        <div style={{position:"relative",height:18}}>
          {MONTHS.map((m,i)=>(
            <div key={m} style={{position:"absolute",left:`${(i/12)*100}%`,fontSize:13,color:"#6d758c",fontFamily:"DM Mono,monospace",transform:"translateX(-50%)"}}>{m}</div>
          ))}
        </div>
      </div>
      {/* Workstream rows */}
      {wsList.map(ws=>{
        const allProj=ws.initiatives.flatMap(i=>i.projects);
        const isExpanded=expandedWS===ws.code;
        const wsActPct=allProj.length?Math.round(allProj.reduce((a,p)=>a+p.progress,0)/allProj.length):0;
        const wsRagColor={"G":"#22c55e","A":"#f59e0b","R":"#ef4444"}[ws.initiatives.flatMap(i=>i.projects).reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G")]||"#22c55e";
        return(
          <div key={ws.code} style={{marginBottom:2}}>
            {/* WS summary row */}
            <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,alignItems:"center",cursor:"pointer",padding:"3px 0"}}
              onClick={()=>setExpandedWS(isExpanded?null:ws.code)}>
              <div style={{display:"flex",alignItems:"center",gap:6,paddingRight:8}}>
                <span className="material-symbols-outlined" style={{fontSize:16,color:ws.color,verticalAlign:"middle",marginRight:4}}>{wsIcon(ws.code)}</span>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.9)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ws.code}</span>
                <span style={{fontSize:13,color:wsRagColor,marginLeft:"auto"}}>●</span>
                <span className="material-symbols-outlined" style={{fontSize:16,color:"#a3aac4"}}>{isExpanded?"expand_less":"expand_more"}</span>
              </div>
              <div style={{position:"relative",height:14,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden"}}>
                {/* WS extent bar */}
                {(()=>{
                  const starts=allProj.map(p=>new Date(p.start)).filter(d=>!isNaN(d));
                  const ends=allProj.map(p=>new Date(p.end)).filter(d=>!isNaN(d));
                  if(!starts.length) return null;
                  const wsStart=new Date(Math.min(...starts));
                  const wsEnd=new Date(Math.max(...ends));
                  const left=pct(wsStart);
                  const right=100-pct(wsEnd);
                  const fillWidth=(pct(wsEnd)-pct(wsStart))*(wsActPct/100);
                  return(
                    <>
                      <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,right:`${right}%`,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:9999}}/>
                      <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${fillWidth}%`,background:ws.color,borderRadius:9999,opacity:0.8}}/>
                    </>
                  );
                })()}
                {/* Today line */}
                <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:2,background:"#3bbffa"}}/>
              </div>
            </div>
            {/* Expanded project rows */}
            {isExpanded&&allProj.map((pr,pi)=>{
              const left=pct(pr.start),right=100-pct(pr.end);
              const planPct=plannedPct(pr.start,pr.end);
              const fillW=(pct(pr.end)-pct(pr.start))*(pr.progress/100);
              const ragC={"G":"#22c55e","A":"#f59e0b","R":"#ef4444"}[pr.rag]||"#22c55e";
              return(
                <div key={pr.id} style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,alignItems:"center",padding:"2px 0",background:pi%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                  <div style={{paddingLeft:16,paddingRight:8,overflow:"hidden"}}>
                    <div style={{fontSize:13,color:"#dee5ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Manrope,sans-serif"}} title={pr.name}>{pr.name}</div>
                    <div style={{fontSize:12,color:"#6d758c",fontFamily:"DM Mono,monospace"}}>{pr.progress}% <span style={{color:ragC}}>●</span></div>
                  </div>
                  <div style={{position:"relative",height:10,background:"rgba(255,255,255,0.05)",borderRadius:9999,overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,right:`${right}%`,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:9999}}/>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${fillW}%`,background:ragC,borderRadius:9999,opacity:0.85}}/>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:2,background:"#3bbffa"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {/* Legend */}
      <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
        {[["rgba(255,255,255,0.04)","1px solid rgba(255,255,255,0.12)","Planned duration"],["#4C9AC9","none","Actual progress"],["#3bbffa","none","Today"]].map(([bg,border,label],i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
            {i<2?<div style={{width:20,height:6,borderRadius:2,background:bg,border}}/>:<div style={{width:2,height:12,borderRadius:1,background:bg}}/>}
            <span style={{fontSize:13,color:"#6d758c",fontFamily:"DM Mono,monospace"}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
// ─────────────────────────────────────────────────────────────────────────────
// PROPOSALS REVIEW PANEL
// ─────────────────────────────────────────────────────────────────────────────
function ProposalsPanel({wsList,onUpdate,markDirty,accessToken,onTokenRefresh}){
  const [proposals,setProposals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [acting,setActing]=useState({}); // rowIndex -> "approving"|"rejecting"
  const [error,setError]=useState(null);
  const [msg,setMsg]=useState(null);
  const [rejectModal,setRejectModal]=useState(null); // {proposal} when open
  const [rejectReason,setRejectReason]=useState("");

  const load=useCallback(async()=>{
    setLoading(true);setError(null);
    try{const p=await loadProposals();setProposals(p);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{load();},[]);

  const showMsg=m=>{setMsg(m);setTimeout(()=>setMsg(null),3500);};

  // Get a valid token — use stored one or trigger sign-in if missing
  const getToken=async()=>{
    if(accessToken) return accessToken;
    const token=await signInWithGoogle();
    onTokenRefresh(token);
    return token;
  };

  const sendDecisionEmail=async(p,decision,reason)=>{
    if(!CONFIG.APPS_SCRIPT_URL||!p.leadEmail) return;
    const params=new URLSearchParams({
      action:"decision",
      rowType:p.rowType||"project",
      leadEmail:p.leadEmail,
      submittedBy:p.submittedBy,
      projectId:p.projectId,
      projectName:p.projectName,
      wsCode:p.wsCode,
      decision,
      reason:reason||"",
      comment:p.comment||"",
      // Project-specific
      newProgress:String(p.newProgress||""),
      newRag:p.newRag||"",
      newRisk:p.newRisk||"",
      oldRisk:p.oldRisk||"",
      // Milestone-specific
      milestoneName:p.milestoneName||"",
      newMsStatus:p.newStatus||"",
    });
    try{
      await fetch(`${CONFIG.APPS_SCRIPT_URL}?${params.toString()}`,{mode:"no-cors"});
    }catch(_){}
  };

  const handleApprove=async(p)=>{
    setActing(prev=>({...prev,[p.rowIndex]:"approving"}));
    try{
      const token=await getToken();
      if(p.rowType==="milestone"){
        // Milestone approval: Apps Script writes status back to Milestones tab
        // No wsList update needed — milestone data lives in Milestones tab, not wsList
        await updateProposalStatus(p.rowIndex,"Approved",token);
        await sendDecisionEmail(p,"Approved","");
        setProposals(prev=>prev.filter(x=>x.rowIndex!==p.rowIndex));
        showMsg(`✓ Approved: "${p.milestoneName}" milestone update — lead notified`);
      } else {
        // Project approval: apply change to in-memory wsList + save to Sheets
        let applied=false;
        const updated=wsList.map(ws=>{
          if(ws.code!==p.wsCode) return ws;
          return{...ws,initiatives:ws.initiatives.map(init=>({
            ...init,projects:init.projects.map(pr=>{
              if(pr.id!==p.projectId) return pr;
              applied=true;
              return{...pr,progress:p.newProgress,rag:p.newRag,risk:p.newRisk||null};
            })
          }))};
        });
        if(!applied){setError(`Project ${p.projectId} not found in master data — approve after refreshing.`);return;}
        await updateProposalStatus(p.rowIndex,"Approved",token);
        await sendDecisionEmail(p,"Approved","");
        onUpdate(updated.find(w=>w.code===p.wsCode));
        markDirty();
        setProposals(prev=>prev.filter(x=>x.rowIndex!==p.rowIndex));
        showMsg(`✓ Approved: ${p.projectName} — lead notified`);
      }
    }catch(e){setError(e.message);}
    finally{setActing(prev=>{const n={...prev};delete n[p.rowIndex];return n;});}
  };

  const handleRejectClick=(p)=>{
    setRejectReason("");
    setRejectModal(p);
  };

  const handleRejectConfirm=async()=>{
    const p=rejectModal;
    if(!p) return;
    setRejectModal(null);
    setActing(prev=>({...prev,[p.rowIndex]:"rejecting"}));
    try{
      const token=await getToken();
      await updateProposalStatus(p.rowIndex,"Rejected",token,rejectReason);
      await sendDecisionEmail(p,"Rejected",rejectReason);
      setProposals(prev=>prev.filter(x=>x.rowIndex!==p.rowIndex));
      showMsg(`✗ Rejected: ${p.projectName} — lead notified`);
    }catch(e){setError(e.message);}
    finally{setActing(prev=>{const n={...prev};delete n[p.rowIndex];return n;});}
  };

  const WS=WS_META;
  const grouped={};
  proposals.forEach(p=>{if(!grouped[p.wsCode])grouped[p.wsCode]=[];grouped[p.wsCode].push(p);});

  return(
    <div>
      {/* Rejection reason modal */}
      {rejectModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#13171f",border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,width:"100%",maxWidth:480,padding:"24px 26px"}}>
            <div style={{fontSize:16,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#fff",marginBottom:4}}>Reject Proposal</div>
            <div style={{fontSize:13,color:"#a3aac4",marginBottom:16}}>{rejectModal.projectName} — submitted by {rejectModal.submittedBy}</div>
            <div style={{fontSize:12,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Reason for rejection <span style={{color:"rgba(255,255,255,0.35)"}}>(optional — sent to lead)</span></div>
            <textarea
              rows={3}
              value={rejectReason}
              onChange={e=>setRejectReason(e.target.value)}
              placeholder="e.g. Please resubmit with updated risk details, or clarify the % complete calculation..."
              style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:7,color:"#fff",fontSize:13,padding:"9px 12px",outline:"none",fontFamily:"Manrope,sans-serif",resize:"vertical",lineHeight:1.5,boxSizing:"border-box"}}
            />
            <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
              <button onClick={()=>setRejectModal(null)} style={{padding:"7px 16px",borderRadius:7,background:"transparent",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.6)",fontSize:13,cursor:"pointer",fontFamily:"DM Mono,monospace"}}>Cancel</button>
              <button onClick={handleRejectConfirm} style={{padding:"7px 16px",borderRadius:7,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",color:"#ef4444",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"DM Mono,monospace"}}>✗ Confirm Rejection</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <div>
          <div style={{fontSize:12,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:3}}>Workstream Lead Submissions</div>
          <div style={{fontSize:18,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#fff"}}>Pending Proposals</div>
        </div>
        <button onClick={load} disabled={loading} style={{padding:"6px 14px",borderRadius:7,background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",color:"#dee5ff",fontSize:12,cursor:"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",gap:5}}>
          <span className={loading?"spin":""} style={{display:"inline-block"}}>↻</span> Refresh
        </button>
      </div>

      {msg&&<div style={{fontSize:12,color:"#22c55e",background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:7,padding:"8px 14px",marginBottom:14}}>{msg}</div>}
      {error&&<div style={{fontSize:12,color:"#ef4444",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:7,padding:"8px 14px",marginBottom:14}}>{error}</div>}

      {loading&&<div style={{textAlign:"center",padding:40,color:"#a3aac4",fontSize:13}}>Loading proposals…</div>}

      {!loading&&proposals.length===0&&(
        <div style={{textAlign:"center",padding:"48px 24px",background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",borderRadius:12}}>
          <div style={{fontSize:28,marginBottom:12}}>✓</div>
          <div style={{fontSize:14,color:"#dee5ff"}}>No pending proposals</div>
          <div style={{fontSize:12,color:"#a3aac4",marginTop:4}}>All submissions have been reviewed, or none have been made yet.</div>
        </div>
      )}

      {!loading&&Object.entries(grouped).map(([wsCode,props])=>{
        const wsMeta=WS[wsCode]||{color:"#888",name:wsCode,code:wsCode};
        return(
          <div key={wsCode} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${wsMeta.color}30`}}>
              <span style={{fontSize:13,color:wsMeta.color,fontFamily:"DM Mono,monospace",fontWeight:600}}>{wsMeta.code}</span>
              <span style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>{wsMeta.name}</span>
              <span style={{fontSize:12,color:"#a3aac4",fontFamily:"DM Mono,monospace"}}>{props.length} pending</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {props.map(p=>{
                const acting_state=acting[p.rowIndex];
                const isMilestone=p.rowType==="milestone";
                const progChanged=!isMilestone&&p.oldProgress!==p.newProgress;
                const ragChanged=!isMilestone&&p.oldRag!==p.newRag;
                const riskChanged=!isMilestone&&(p.oldRisk||"")!==(p.newRisk||"");
                const msStatusChanged=isMilestone&&p.oldStatus!==p.newStatus;
                const MS_COLORS={"Complete":"#22c55e","In Progress":"#f59e0b","Not Started":"#a3aac4"};
                const ts=p.timestamp?new Date(p.timestamp).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—";
                return(
                  <div key={p.rowIndex} style={{background:"#0f1930",border:`1px solid ${isMilestone?"rgba(59,191,250,0.25)":wsMeta.color+"25"}`,borderLeft:`3px solid ${isMilestone?"#3bbffa":wsMeta.color}`,borderRadius:12,padding:"14px 16px"}}>
                    {/* Card header */}
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:12}}>
                      <div>
                        {/* Type badge */}
                        <div style={{display:"inline-flex",alignItems:"center",gap:5,marginBottom:6,padding:"2px 8px",borderRadius:9999,background:isMilestone?"rgba(59,191,250,0.1)":"rgba(255,255,255,0.05)",border:`1px solid ${isMilestone?"rgba(59,191,250,0.3)":"rgba(255,255,255,0.1)"}`}}>
                          <span style={{fontSize:11,fontFamily:"DM Mono,monospace",fontWeight:700,letterSpacing:"0.08em",color:isMilestone?"#3bbffa":"#a3aac4",textTransform:"uppercase"}}>{isMilestone?"Milestone Update":"Project Update"}</span>
                        </div>
                        <div style={{fontSize:13,fontWeight:600,color:"#dee5ff",marginBottom:2}}>{p.projectName}</div>
                        {isMilestone&&<div style={{fontSize:12,color:"#3bbffa",fontFamily:"DM Mono,monospace",marginBottom:3}}>🏁 {p.milestoneName}</div>}
                        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,color:"#a3aac4",fontFamily:"DM Mono,monospace"}}>Submitted by: <span style={{color:"rgba(255,255,255,0.6)"}}>{p.submittedBy}</span></span>
                          <span style={{fontSize:12,color:"#a3aac4",fontFamily:"DM Mono,monospace"}}>{ts}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={()=>handleRejectClick(p)} disabled={!!acting_state} style={{padding:"6px 14px",borderRadius:7,background:"transparent",border:"1px solid rgba(239,68,68,0.3)",color:"#ef4444",fontSize:13,fontWeight:600,cursor:acting_state?"wait":"pointer",fontFamily:"DM Mono,monospace",opacity:acting_state?0.6:1}}>
                          {acting_state==="rejecting"?"Rejecting…":"✗ Reject"}
                        </button>
                        <button onClick={()=>handleApprove(p)} disabled={!!acting_state} style={{padding:"6px 14px",borderRadius:7,background:acting_state?"rgba(34,197,94,0.1)":"#22c55e",border:"none",color:acting_state?"#22c55e":"#060e20",fontSize:13,fontWeight:700,cursor:acting_state?"wait":"pointer",fontFamily:"DM Mono,monospace",opacity:acting_state?0.7:1}}>
                          {acting_state==="approving"?"Approving…":"✓ Approve"}
                        </button>
                      </div>
                    </div>

                    {/* MILESTONE layout */}
                    {isMilestone&&(
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        <div style={{background:msStatusChanged?"rgba(59,191,250,0.06)":"#141f38",border:`1px solid ${msStatusChanged?"rgba(59,191,250,0.25)":"rgba(255,255,255,0.07)"}`,borderRadius:7,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Milestone Status</div>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <div style={{width:8,height:8,borderRadius:"50%",background:MS_COLORS[p.oldStatus]||"#a3aac4",flexShrink:0}}/>
                              <span style={{fontSize:13,fontFamily:"Manrope,sans-serif",color:"rgba(255,255,255,0.4)",textDecoration:"line-through"}}>{p.oldStatus}</span>
                            </div>
                            <span style={{color:"#f59e0b",fontSize:14,fontWeight:700}}>→</span>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <div style={{width:10,height:10,borderRadius:"50%",background:MS_COLORS[p.newStatus]||"#a3aac4",flexShrink:0,boxShadow:`0 0 6px ${MS_COLORS[p.newStatus]||"#a3aac4"}80`}}/>
                              <span style={{fontSize:15,fontWeight:700,fontFamily:"Manrope,sans-serif",color:MS_COLORS[p.newStatus]||"#a3aac4"}}>{p.newStatus}</span>
                            </div>
                          </div>
                        </div>
                        <div style={{background:"#141f38",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Comment</div>
                          {p.comment?<div style={{fontSize:13,color:"rgba(255,255,255,0.72)",lineHeight:1.5}}>{p.comment}</div>:<div style={{fontSize:13,color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>No comment</div>}
                        </div>
                      </div>
                    )}

                    {/* PROJECT layout */}
                    {!isMilestone&&(
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                        <div style={{background:progChanged?"rgba(245,158,11,0.06)":"#141f38",border:`1px solid ${progChanged?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.07)"}`,borderRadius:7,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>% Complete</div>
                          {progChanged?(
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:18,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#a3aac4",textDecoration:"line-through"}}>{p.oldProgress}%</span>
                              <span style={{color:"#f59e0b",fontSize:12}}>→</span>
                              <span style={{fontSize:22,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#22c55e"}}>{p.newProgress}%</span>
                            </div>
                          ):(
                            <span style={{fontSize:18,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"rgba(255,255,255,0.72)"}}>{p.oldProgress}% <span style={{fontSize:12,color:"#a3aac4"}}>unchanged</span></span>
                          )}
                        </div>
                        <div style={{background:ragChanged?"rgba(245,158,11,0.06)":"#141f38",border:`1px solid ${ragChanged?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.07)"}`,borderRadius:7,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>RAG Status</div>
                          {ragChanged?(
                            <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                              <span style={{fontSize:13,color:RAG[p.oldRag]?.color,fontFamily:"DM Mono,monospace",opacity:0.5,textDecoration:"line-through"}}>{RAG[p.oldRag]?.label}</span>
                              <span style={{color:"#f59e0b",fontSize:12}}>→</span>
                              <span style={{fontSize:13,color:RAG[p.newRag]?.color,fontFamily:"DM Mono,monospace",fontWeight:700}}>{RAG[p.newRag]?.label}</span>
                            </div>
                          ):(
                            <span style={{fontSize:13,color:RAG[p.oldRag]?.color,fontFamily:"DM Mono,monospace"}}>{RAG[p.oldRag]?.label} <span style={{fontSize:12,color:"#a3aac4"}}>unchanged</span></span>
                          )}
                        </div>
                        <div style={{background:riskChanged?"rgba(245,158,11,0.06)":"#141f38",border:`1px solid ${riskChanged?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.07)"}`,borderRadius:7,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Risk / Issue</div>
                          {riskChanged?(
                            <div>
                              {p.oldRisk&&<div style={{fontSize:13,color:"#a3aac4",textDecoration:"line-through",marginBottom:3}}>{p.oldRisk}</div>}
                              <div style={{fontSize:13,color:p.newRisk?"#f59e0b":"rgba(255,255,255,0.72)"}}>{p.newRisk||"(cleared)"}</div>
                            </div>
                          ):(
                            <div style={{fontSize:13,color:"#a3aac4"}}>{p.oldRisk||"None"} <span style={{fontSize:12,color:"#a3aac4"}}>unchanged</span></div>
                          )}
                        </div>
                        <div style={{background:"#141f38",border:"1px solid rgba(255,255,255,0.07)",borderRadius:7,padding:"10px 12px"}}>
                          <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Comment</div>
                          {p.comment?<div style={{fontSize:13,color:"rgba(255,255,255,0.72)",lineHeight:1.4}}>{p.comment}</div>:<div style={{fontSize:13,color:"rgba(255,255,255,0.35)",fontStyle:"italic"}}>No comment</div>}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY PANELS — 3-panel header used by both Master and WSDash
// ─────────────────────────────────────────────────────────────────────────────
function SummaryPanels({actual,planned,initiatives,projects,rc,color,variance}){
  const varColor=variance>0?"#22c55e":variance<0?"#ef4444":"#a3aac4";
  const varLabel=(variance>0?"+":"")+variance+"%";
  function progressArc(cx,cy,r,pct,thick){
    if(pct<=0) return null;
    const capped=Math.min(pct,99.99);
    const toRad=a=>((a-90)*Math.PI/180);
    const end=capped/100*360;
    const x1=cx+r*Math.cos(toRad(0)),y1=cy+r*Math.sin(toRad(0));
    const x2=cx+r*Math.cos(toRad(end)),y2=cy+r*Math.sin(toRad(end));
    const large=end>180?1:0;
    const ir=r-thick;
    const ix1=cx+ir*Math.cos(toRad(0)),iy1=cy+ir*Math.sin(toRad(0));
    const ix2=cx+ir*Math.cos(toRad(end)),iy2=cy+ir*Math.sin(toRad(end));
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z`;
  }
  const cx=54,cy=54,outerR=47,innerR=35,thick=11;
  const actualPath=progressArc(cx,cy,outerR,actual,thick);
  const plannedPath=progressArc(cx,cy,innerR,planned,thick-4);
  const panelStyle={background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,padding:"11px 14px",boxShadow:"inset 0 1px 0 0 rgba(64,72,93,0.4)"};
  const titleStyle={fontSize:13,color:"#dee5ff",fontFamily:"Manrope,sans-serif",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8};
  const numStyle={fontSize:26,fontWeight:800,fontFamily:"Manrope,sans-serif",lineHeight:1};
  const subStyle={fontSize:11,fontFamily:"Manrope,sans-serif",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2};
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
      {/* Panel 1 — Ring left, stats right */}
      <div style={{...panelStyle,display:"flex",flexDirection:"column"}}>
        <div style={titleStyle}>Overall Progress</div>
        <div style={{display:"flex",alignItems:"center",gap:14,flex:1}}>
          {/* Ring */}
          <div style={{flexShrink:0}}>
            <svg width="108" height="108" viewBox="0 0 108 108">
              <circle cx={cx} cy={cy} r={outerR-thick/2} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={thick}/>
              <circle cx={cx} cy={cy} r={innerR-(thick-4)/2} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={thick-4}/>
              {plannedPath&&<path d={plannedPath} fill={color} opacity="0.22"/>}
              {actualPath&&<path d={actualPath} fill={color} opacity="1" style={{filter:`drop-shadow(0 0 5px ${color}80)`}}/>}
            </svg>
          </div>
          {/* Stats */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:4,background:variance>=0?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${variance>=0?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:9999,padding:"2px 8px",marginBottom:6}}>
              <span className="material-symbols-outlined" style={{fontSize:12,color:varColor}}>{variance>=0?"arrow_drop_up":"arrow_drop_down"}</span>
              <span style={{fontSize:12,fontWeight:700,color:varColor,fontFamily:"DM Mono,monospace"}}>{varLabel}</span>
              <span style={{fontSize:11,color:varColor,fontFamily:"Manrope,sans-serif",opacity:0.7}}>VAR</span>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{...subStyle,color:"#6d758c"}}>Actual</div>
              <div style={{...numStyle,color:color}}>{actual}%</div>
            </div>
            <div>
              <div style={{...subStyle,color:"#6d758c"}}>Planned</div>
              <div style={{...numStyle,color:"rgba(255,255,255,0.35)"}}>{planned}%</div>
            </div>
          </div>
        </div>
      </div>
      {/* Panel 2 — Programme Inventory */}
      <div style={{...panelStyle,display:"flex",flexDirection:"column"}}>
        <div style={titleStyle}>Programme Inventory</div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",flex:1,gap:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(64,72,93,0.4)"}}>
            <div style={{width:34,height:34,borderRadius:8,background:"rgba(59,191,250,0.12)",border:"1px solid rgba(59,191,250,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span className="material-symbols-outlined" style={{fontSize:17,color:"#3bbffa"}}>account_tree</span>
            </div>
            <div>
              <div style={{...numStyle,color:"#3bbffa"}}>{initiatives}</div>
              <div style={{...subStyle,color:"#a3aac4"}}>Initiatives</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:34,height:34,borderRadius:8,background:"rgba(59,191,250,0.08)",border:"1px solid rgba(59,191,250,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span className="material-symbols-outlined" style={{fontSize:17,color:"#3bbffa",opacity:0.7}}>task_alt</span>
            </div>
            <div>
              <div style={{...numStyle,color:"#3bbffa"}}>{projects}</div>
              <div style={{...subStyle,color:"#a3aac4"}}>Active Projects</div>
            </div>
          </div>
        </div>
      </div>
      {/* Panel 3 — Health Distribution */}
      <div style={{...panelStyle,display:"flex",flexDirection:"column"}}>
        <div style={titleStyle}>Health Distribution</div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",flex:1,gap:5}}>
          {[{r:"G",label:"On Track", color:"#22c55e",bg:"rgba(34,197,94,0.08)", border:"rgba(34,197,94,0.25)", icon:"check_circle"},
            {r:"A",label:"At Risk",  color:"#f59e0b",bg:"rgba(245,158,11,0.08)",border:"rgba(245,158,11,0.25)",icon:"warning"},
            {r:"R",label:"Off Track",color:"#ef4444",bg:"rgba(239,68,68,0.08)", border:"rgba(239,68,68,0.25)", icon:"error"}
          ].map(({r,label,color:c,bg,border,icon})=>(
            <div key={r} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 10px",borderRadius:7,background:bg,border:`1px solid ${border}`}}>
              <div style={{...numStyle,color:c,minWidth:32,textAlign:"center"}}>{rc[r]||0}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:c,fontWeight:700,fontFamily:"Manrope,sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
                <div style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>projects</div>
              </div>
              <span className="material-symbols-outlined" style={{fontSize:16,color:c,opacity:0.5}}>{icon}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// MASTER DASHBOARD (read-only summary, same as viewer)

function Master({wsList,onSelect,lastRefresh,history,riskData}){
  const [masterView,setMasterView]=useState('overview');
  const all=wsList.flatMap(allProjects);
  const rc={G:0,A:0,R:0};all.forEach(p=>rc[p.rag]++);
  const overallActual=avgNums(wsList.map(ws=>wsActual(ws)));
  const overallPlanned=avgNums(wsList.map(ws=>wsPlanned(ws)));
  const overallVariance=overallActual-overallPlanned;
  const totalInits=wsList.reduce((a,ws)=>a+ws.initiatives.length,0);
  const openRiskCount=(riskData||[]).filter(r=>r.status==="Open").length;
  return(
    <div>
      {lastRefresh&&<div style={{fontSize:13,color:"#6d758c",fontFamily:"DM Mono,monospace",marginBottom:14,textAlign:"right"}}>Last synced from Sheets: {lastRefresh}</div>}
      <SummaryPanels
        actual={overallActual}
        planned={overallPlanned}
        initiatives={totalInits}
        projects={all.length}
        rc={rc}
        color="#3bbffa"
        variance={overallVariance}

      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["overview","Overview"],["gantt","Cross-Workstream Gantt"]].map(([v,label])=>(
          <button key={v} onClick={()=>setMasterView(v)} style={{padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"DM Mono,monospace",border:`1px solid ${masterView===v?"rgba(201,168,76,0.6)":"rgba(255,255,255,0.15)"}`,background:masterView===v?"rgba(201,168,76,0.15)":"transparent",color:masterView===v?"#C9A84C":"rgba(255,255,255,0.6)",transition:"all 0.15s"}}>{label}</button>

      </div>
      {masterView==="gantt"&&<CrossGantt wsList={wsList}/>}
      {masterView==="overview"&&<div style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:9}}>Workstream Status — click to edit</div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:26}}>
        {wsList.map(ws=>{
          const act=wsActual(ws),plan=wsPlanned(ws),rag=wsRag(ws);

          return(
            <div key={ws.id} onClick={()=>onSelect(ws.id)}

              onMouseEnter={e=>{e.currentTarget.style.background=`linear-gradient(145deg,${ws.color}16 0%,#141f38 65%)`;e.currentTarget.style.boxShadow=`inset 0 1px 0 0 rgba(64,72,93,0.4),${ragGlow},0 4px 24px rgba(0,0,0,0.3)`;}}
              onMouseLeave={e=>{e.currentTarget.style.background=`linear-gradient(145deg,${ws.color}0A 0%,#0f1930 65%)`;e.currentTarget.style.boxShadow=`inset 0 1px 0 0 rgba(64,72,93,0.4),${ragGlow}`;}}>

              {history[ws.code]&&history[ws.code].length>=1&&<div style={{marginTop:8}}><Sparkline data={history[ws.code]} color={ws.color} width={60} height={18}/></div>}
            </div>
          );
        })}
      </div>
      }
    </div>
  );
}

function RiskRegisterView({riskData,onUpdateRisk,riskDirty,onSaveRisk,savingRisk}){
  const [filterWS,setFilterWS]=useState("All");
  const [filterStatus,setFilterStatus]=useState("All");
  const [filterRAG,setFilterRAG]=useState("All");
  const [showModal,setShowModal]=useState(false);
  const [editRisk,setEditRisk]=useState(null);

  const today=new Date();
  const nextWeek=new Date(today.getTime()+7*24*60*60*1000);
  const openCount=riskData.filter(r=>r.status==="Open").length;
  const highProbCount=riskData.filter(r=>r.probability==="High"&&r.status==="Open").length;
  const dueThisWeek=riskData.filter(r=>{
    if(r.status!=="Open"||!r.dueDate) return false;
    const d=new Date(r.dueDate);
    return !isNaN(d)&&d>=today&&d<=nextWeek;
  }).length;
  const mitigatedCount=riskData.filter(r=>r.status==="Mitigated").length;

  const filtered=riskData.filter(r=>{
    if(filterWS!=="All"&&r.wsCode!==filterWS) return false;
    if(filterStatus!=="All"&&r.status!==filterStatus) return false;
    if(filterRAG!=="All"&&r.rag!==filterRAG) return false;
    return true;
  });

  const getNextId=()=>{
    if(!riskData.length) return "R001";
    const nums=riskData.map(r=>parseInt((r.riskId||"").replace(/\D/g,""))||0);
    return "R"+String(Math.max(...nums)+1).padStart(3,"0");
  };

  const handleSave=fields=>{
    if(fields.riskId){
      onUpdateRisk(riskData.map(r=>r.riskId===fields.riskId?{...r,...fields}:r));
    } else {
      onUpdateRisk([...riskData,{...fields,riskId:getNextId()}]);
    }
    setShowModal(false);setEditRisk(null);
  };

  const wsCol=wsCode=>(WS_META[wsCode]||{}).color||"#6d758c";
  const ragBorderColor=rag=>({"R":"#ef4444","A":"#f59e0b","G":"#22c55e"}[rag]||"rgba(255,255,255,0.1)");
  const probColor=p=>p==="High"?"#ef4444":p==="Medium"?"#f59e0b":"#22c55e";

  const statCards=[
    {l:"Total Open",       v:openCount,       col:"#ef4444",sub:"risks requiring attention"},
    {l:"High Probability", v:highProbCount,   col:"#f59e0b",sub:"open, high probability"},
    {l:"Due This Week",    v:dueThisWeek,     col:"#f59e0b",sub:"open, due within 7 days"},
    {l:"Mitigated",        v:mitigatedCount,  col:"#22c55e",sub:"actions in place"},
  ];

  return(
    <div>
      {showModal&&<RiskModal risk={editRisk} isNew={!editRisk?.riskId} onSave={handleSave} onClose={()=>{setShowModal(false);setEditRisk(null);}}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,0.08) 0%,transparent 55%)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:12,padding:"19px 22px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:13,color:"#f59e0b",fontFamily:"Manrope,sans-serif",fontWeight:700,marginBottom:3}}>PROGRAMME RISK REGISTER</div>
          <div style={{fontSize:18,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#fff"}}>Risk Register</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.72)",marginTop:3}}>Programme-wide open risks and mitigations</div>
        </div>
        {riskDirty&&(
          <button onClick={onSaveRisk} disabled={savingRisk} style={{padding:"8px 18px",borderRadius:7,background:"#C9A84C",border:"none",color:"#060e20",fontSize:13,fontWeight:700,cursor:savingRisk?"wait":"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",gap:6}}>
            <span className={savingRisk?"spin":""} style={{display:"inline-block"}}>↑</span>
            {savingRisk?"Saving…":"Save Risk Register"}
          </button>
        )}
      </div>

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {statCards.map((k,i)=>(
          <div key={i} style={{background:`${k.col}0E`,border:`1px solid ${k.col}25`,borderRadius:12,padding:"15px 16px",boxShadow:"inset 0 1px 0 0 rgba(64,72,93,0.4)"}}>
            <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{k.l}</div>
            <div style={{fontSize:26,fontFamily:"Manrope,sans-serif",fontWeight:800,color:k.col,lineHeight:1,marginBottom:3}}>{k.v}</div>
            <div style={{fontSize:12,color:"#a3aac4",fontFamily:"Manrope,sans-serif"}}>{k.sub}</div>
          </div>
        ))}
      </div>

function signIn(){
  return new Promise((resolve,reject)=>{
    let attempts=0;
    const tryInit=()=>{
      if(window.google?.accounts?.oauth2){
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:OAUTH_CLIENT_ID,
          scope:"openid email profile",
          callback:(resp)=>{
            if(resp.error) return reject(new Error(resp.error));
            fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:`Bearer ${resp.access_token}`}})
              .then(r=>r.json())
              .then(info=>resolve({token:resp.access_token,email:info.email,name:info.name}))
              .catch(()=>resolve({token:resp.access_token,email:"unknown",name:"Unknown"}));
          },
        });
        client.requestAccessToken();
      } else if(attempts<10){attempts++;setTimeout(tryInit,500);}
      else reject(new Error("Google sign-in failed to load. Check your internet connection."));
    };
    tryInit();
  });
}

function AuthGate({children}){
  const [phase,setPhase]=useState("signin");
  const [user,setUser]=useState(null);
  const [error,setError]=useState(null);

  const handleSignIn=async()=>{
    setError(null);setPhase("loading");
    try{
      const u=await signIn();
      const allowed=u.email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
      if(!allowed){setUser(u);setPhase("unauth");return;}
      setUser(u);setPhase("app");
    }catch(e){setError(e.message);setPhase("signin");}
  };

  const handleSignOut=()=>{setUser(null);setPhase("signin");};

  if(phase==="signin"||phase==="loading") return <SignInScreen onSignIn={handleSignIn} loading={phase==="loading"} error={error}/>;
  if(phase==="unauth") return <UnauthorisedScreen email={user.email} onSignOut={handleSignOut}/>;
  return children;
}
