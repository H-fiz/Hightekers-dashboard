// ─────────────────────────────────────────────────────────────────────────────
// GOOGLE SHEETS DATA LOADER
//
// Expected sheet columns (row 1 = headers, data from row 2):
//   A  Project ID
//   B  Workstream Code       (WS1 – WS8)
//   C  Initiative ID         (e.g. 1.1)
//   D  Initiative Name
//   E  Workstream Lead       (person accountable for the whole workstream)
//   F  Initiative Owner      (person accountable for this initiative)
//   G  Project Name
//   H  Project Owner         (person accountable for this specific project)
//   I  Start Date            (YYYY-MM-DD)
//   J  End Date              (YYYY-MM-DD)
//   K  % Complete            (0–100, no % sign)
//   L  RAG                   (G, A, or R)
//   M  Risk / Issue          (free text, leave blank if none)
// ─────────────────────────────────────────────────────────────────────────────
async function loadFromSheets() {
  const { SHEET_ID, API_KEY, SHEET_TAB } = CONFIG;
  if (SHEET_ID === "YOUR_SHEET_ID_HERE" || API_KEY === "YOUR_API_KEY_HERE") {
    return null;
  }
  const range = encodeURIComponent(`${SHEET_TAB}!A2:N500`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheets API error: ${res.status} ${res.statusText}`);
  const json = await res.json();
  const rows = json.values || [];

  // Seed workstream map from visual metadata (no lead yet — comes from sheet)
  const wsMap = {};
  Object.values(WS_META).forEach(m => {
    wsMap[m.code] = { ...m, lead: "—", initiatives: [] };
  });

  rows.forEach(row => {
    const [
      projId,       // A
      wsCode,       // B
      initId,       // C
      initName,     // D
      wsLead,       // E  ← workstream lead
      initOwner,    // F  ← initiative owner
      projName,     // G
      projOwner,    // H  ← project owner
      start,        // I
      end,          // J
      progressRaw,  // K
      ragRaw,       // L
      risk,         // M
    ] = row;

    const code = wsCode?.trim();
    if (!code || !wsMap[code]) return;
    const ws = wsMap[code];

    // Set workstream lead from the first row that has one
    if (wsLead?.trim() && ws.lead === "—") ws.lead = wsLead.trim();

    // Find or create initiative
    const iid = initId?.trim();
    let init = ws.initiatives.find(i => i.id === iid);
    if (!init) {
      init = {
        id:    iid,
        name:  initName?.trim() || "",
        owner: initOwner?.trim() || "—",   // initiative owner
        projects: [],
      };
      ws.initiatives.push(init);
    }
    // Update initiative owner if a later row provides it
    if (initOwner?.trim() && init.owner === "—") init.owner = initOwner.trim();

    // Add project
    const rag = ["G","A","R"].includes(ragRaw?.trim().toUpperCase())
      ? ragRaw.trim().toUpperCase() : "G";

    init.projects.push({
      id:       projId?.trim() || `${iid}.${init.projects.length+1}`,
      name:     projName?.trim() || "",
      owner:    projOwner?.trim() || "—",   // project owner
      progress: Math.min(100, Math.max(0, parseInt(progressRaw) || 0)),
      rag,
      risk:     risk?.trim() || null,
      start:    start?.trim() || "2026-01-01",
      end:      end?.trim()   || "2026-12-31",
      notes:    row[13]?.trim() || "",
    });
  });

  return Object.values(wsMap).filter(ws => ws.initiatives.length > 0);
}


// ─────────────────────────────────────────────────────────────────────────────
// PROJECT CARDS — load from ProjectCards and Milestones tabs
// ─────────────────────────────────────────────────────────────────────────────
async function loadProjectCards(){
  const {SHEET_ID,API_KEY,PROJECT_CARDS_TAB,MILESTONES_TAB}=CONFIG;
  if(!SHEET_ID||SHEET_ID==="YOUR_SHEET_ID_HERE") return {cards:{},milestones:{}};
  try{
    const cr=encodeURIComponent(`${PROJECT_CARDS_TAB}!A2:F500`);
    const mr=encodeURIComponent(`${MILESTONES_TAB}!A2:D500`);
    const [cr2,mr2]=await Promise.all([
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${cr}?key=${API_KEY}`).then(r=>r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${mr}?key=${API_KEY}`).then(r=>r.json()),
    ]);
    const cards={};
    (cr2.values||[]).forEach(row=>{
      const [id,desc,scope,outputs,kpis,deps]=row;
      if(id?.trim()) cards[id.trim()]={description:desc||"",scope:scope||"",outputs:outputs||"",kpis:kpis||"",dependencies:deps||""};
    });
    const milestones={};
    (mr2.values||[]).forEach(row=>{
      const [pid,name,date,status]=row;
      if(!pid?.trim()) return;
      if(!milestones[pid.trim()]) milestones[pid.trim()]=[];
      milestones[pid.trim()].push({name:name||"",date:date||"",status:status||"Not Started"});
    });
    return {cards,milestones};
  }catch(e){
    console.warn("Project cards load failed:",e.message);
    return {cards:{},milestones:{}};
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// HISTORY — load weekly snapshots for trend sparklines
// History tab: A=Date B=ProjectID C=WSCode D=Actual% E=PlannedPct F=RAG
// ─────────────────────────────────────────────────────────────────────────────
async function loadHistory(){
  const {SHEET_ID,API_KEY,HISTORY_TAB}=CONFIG;
  if(!SHEET_ID||SHEET_ID==="YOUR_SHEET_ID_HERE") return {};
  try{
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(HISTORY_TAB+"!A2:F2000")}?key=${API_KEY}`);
    const json=await res.json();
    const rows=json.values||[];
    // Group by WSCode -> array of {date,actual,planned,rag} sorted by date
    const byWS={};
    rows.forEach(row=>{
      const [date,projId,wsCode,actual,planned,rag]=row;
      if(!wsCode) return;
      if(!byWS[wsCode]) byWS[wsCode]=[];
      byWS[wsCode].push({date:date||"",actual:parseInt(actual)||0,planned:parseInt(planned)||0,rag:rag||"G"});
    });
    // Average per WS per date
    const wsTrends={};
    Object.entries(byWS).forEach(([ws,rows])=>{
      const byDate={};
      rows.forEach(r=>{
        if(!byDate[r.date]) byDate[r.date]={actuals:[],planneds:[],rags:[]};
        byDate[r.date].actuals.push(r.actual);
        byDate[r.date].planneds.push(r.planned);
        byDate[r.date].rags.push(r.rag);
      });
      wsTrends[ws]=Object.entries(byDate).sort((a,b)=>a[0]<b[0]?-1:1).map(([date,d])=>({
        date,
        actual:Math.round(d.actuals.reduce((a,b)=>a+b,0)/d.actuals.length),
        planned:Math.round(d.planneds.reduce((a,b)=>a+b,0)/d.planneds.length),
      }));
    });
    return wsTrends;
  }catch(e){console.warn("History load failed:",e.message);return {};}
}

// ─────────────────────────────────────────────────────────────────────────────
const TODAY = new Date();
function plannedPct(start,end){
  const s=new Date(start),e=new Date(end);
  if(TODAY<=s)return 0; if(TODAY>=e)return 100;
  return Math.round(((TODAY-s)/(e-s))*100);
}
const RAG={
  G:{label:"On Track",color:"#22c55e",bg:"rgba(34,197,94,0.11)",border:"rgba(34,197,94,0.32)"},
  A:{label:"At Risk",color:"#f59e0b",bg:"rgba(245,158,11,0.11)",border:"rgba(245,158,11,0.32)"},
  R:{label:"Off Track",color:"#ef4444",bg:"rgba(239,68,68,0.11)",border:"rgba(239,68,68,0.32)"},
};
const allProjects=ws=>ws.initiatives.flatMap(i=>i.projects);
const wsRag=ws=>allProjects(ws).reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const avgOf=arr=>arr.length?Math.round(arr.reduce((a,p)=>a+p.progress,0)/arr.length):0;
const avgNums=arr=>arr.length?Math.round(arr.reduce((a,n)=>a+n,0)/arr.length):0;
const wsActual=ws=>avgOf(allProjects(ws));
const initActual=init=>avgOf(init.projects);
const initPlanned=init=>avgNums(init.projects.map(p=>plannedPct(p.start,p.end)));
const wsPlanned=ws=>avgNums(allProjects(ws).map(p=>plannedPct(p.start,p.end)));
const initRag=init=>init.projects.reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const fmtDate=str=>{const d=new Date(str);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});};
const varianceColor=v=>v>=0?"#22c55e":v>=-15?"#f59e0b":"#ef4444";
const varianceLabel=v=>v>=0?`+${v}%`:`${v}%`;

// ─────────────────────────────────────────────────────────────────────────────
// SPARKLINE — trend chart for workstream progress
// ─────────────────────────────────────────────────────────────────────────────
function Sparkline({data,color,width=80,height=28}){
  if(!data||data.length<1) return null;
  const vals=data.map(d=>d.actual);
  const min=0,max=100;
  // Single point — show a dot with the current value
  if(vals.length===1){
    const y=height-((vals[0]-min)/(max-min))*(height-4)-2;
    return(
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <svg width={width} height={height} style={{overflow:"visible"}}>
          <circle cx={width/2} cy={y} r={3} fill={color} opacity="0.8"/>
        </svg>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:"DM Mono,monospace"}}>—</span>
      </div>
    );
  }
  // If all values identical, draw flat line at correct Y position
  const allSame=vals.every(v=>v===vals[0]);
  const flatY=allSame?height-((vals[0]-min)/(max-min))*(height-4)-2:0;
  const pts=allSame
    ?`0,${flatY} ${width},${flatY}`
    :vals.map((v,i)=>{
        const x=(i/(vals.length-1))*width;
        const y=height-((v-min)/(max-min))*(height-4)-2;
        return `${x},${y}`;
      }).join(' ');
  const last=vals[vals.length-1];
  const prev=vals.length>=2?vals[vals.length-2]:vals[0];
  const trend=last-prev;
  const trendColor=trend>0?"#22c55e":trend<0?"#ef4444":"rgba(255,255,255,0.4)";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <svg width={width} height={height} style={{overflow:"visible"}}>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.7"/>
        {vals.map((v,i)=>{
          const x=(i/(vals.length-1))*width;
          const y=height-((v-min)/(max-min))*(height-4)-2;
          return i===vals.length-1?<circle key={i} cx={x} cy={y} r={2.5} fill={color}/>:null;
        })}
      </svg>
      <span style={{fontSize:11,color:trendColor,fontFamily:"DM Mono,monospace",fontWeight:700,whiteSpace:"nowrap"}}>
        {trend>0?"+":""}{trend}%
      </span>
    </div>
  );
}

// CROSS-WORKSTREAM GANTT
// ─────────────────────────────────────────────────────────────────────────────
function CrossGantt({wsList}){
  const [expandedWS,setExpandedWS]=useState(null);
  const GANTT_S=new Date("2026-01-01"),GANTT_E=new Date("2026-12-31");
  const SPAN=GANTT_E-GANTT_S;
  const pct=d=>Math.max(0,Math.min(100,((new Date(d)-GANTT_S)/SPAN)*100));
  const todayPct=pct(new Date());
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return(
    <div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>Cross-Workstream Gantt — 2026</div>
      {/* Month headers */}
      <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,marginBottom:4}}>
        <div/>
        <div style={{position:"relative",height:18}}>
          {MONTHS.map((m,i)=>(
            <div key={m} style={{position:"absolute",left:`${(i/12)*100}%`,fontSize:13,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace",transform:"translateX(-50%)"}}>{m}</div>
          ))}
        </div>
      </div>
      {/* Workstream rows */}
      {wsList.map(ws=>{
        const allProj=ws.initiatives.flatMap(i=>i.projects);
        const isExpanded=expandedWS===ws.code;
        const wsActPct=allProj.length?Math.round(allProj.reduce((a,p)=>a+p.progress,0)/allProj.length):0;
        const wsRagColor={"G":"#22c55e","A":"#f59e0b","R":"#ef4444"}[ws.initiatives.flatMap(i=>i.projects).reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G")]||"#22c55e";
        return(
          <div key={ws.code} style={{marginBottom:2}}>
            {/* WS summary row */}
            <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,alignItems:"center",cursor:"pointer",padding:"3px 0"}}
              onClick={()=>setExpandedWS(isExpanded?null:ws.code)}>
              <div style={{display:"flex",alignItems:"center",gap:6,paddingRight:8}}>
                <span style={{fontSize:13,color:ws.color}}>{ws.icon}</span>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.9)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ws.code}</span>
                <span style={{fontSize:13,color:wsRagColor,marginLeft:"auto"}}>●</span>
                <span style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace"}}>{isExpanded?"▲":"▼"}</span>
              </div>
              <div style={{position:"relative",height:14,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden"}}>
                {/* WS extent bar */}
                {(()=>{
                  const starts=allProj.map(p=>new Date(p.start)).filter(d=>!isNaN(d));
                  const ends=allProj.map(p=>new Date(p.end)).filter(d=>!isNaN(d));
                  if(!starts.length) return null;
                  const wsStart=new Date(Math.min(...starts));
                  const wsEnd=new Date(Math.max(...ends));
                  const left=pct(wsStart);
                  const right=100-pct(wsEnd);
                  const fillWidth=(pct(wsEnd)-pct(wsStart))*(wsActPct/100);
                  return(
                    <>
                      <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,right:`${right}%`,background:`${ws.color}25`,borderRadius:2}}/>
                      <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${fillWidth}%`,background:ws.color,borderRadius:2,opacity:0.8}}/>
                    </>
                  );
                })()}
                {/* Today line */}
                <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:2,background:"rgba(255,255,255,0.9)"}}/>
              </div>
            </div>
            {/* Expanded project rows */}
            {isExpanded&&allProj.map((pr,pi)=>{
              const left=pct(pr.start),right=100-pct(pr.end);
              const planPct=plannedPct(pr.start,pr.end);
              const fillW=(pct(pr.end)-pct(pr.start))*(pr.progress/100);
              const ragC={"G":"#22c55e","A":"#f59e0b","R":"#ef4444"}[pr.rag]||"#22c55e";
              return(
                <div key={pr.id} style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,alignItems:"center",padding:"2px 0",background:pi%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                  <div style={{paddingLeft:16,paddingRight:8,overflow:"hidden"}}>

                    <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace"}}>{pr.progress}% <span style={{color:ragC}}>●</span></div>
                  </div>
                  <div style={{position:"relative",height:10,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,right:`${right}%`,background:`${ws.color}20`,border:`1px dashed ${ws.color}50`,borderRadius:2}}/>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${fillW}%`,background:ws.color,borderRadius:2,opacity:0.85}}/>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:2,background:"rgba(255,255,255,0.9)"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {/* Legend */}
      <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
        {[["rgba(255,255,255,0.25)","1px dashed rgba(255,255,255,0.4)","Planned duration"],["#4C9AC9","none","Actual progress"],["rgba(255,255,255,0.7)","none","Today"]].map(([bg,border,label],i)=>(

            {i<2?<div style={{width:20,height:6,borderRadius:2,background:bg,border}}/>:<div style={{width:2,height:12,borderRadius:1,background:bg}}/>}
            <span style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace"}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

  const rc={G:0,A:0,R:0};all.forEach(p=>rc[p.rag]++);
  const overallActual=avgNums(wsList.map(ws=>wsActual(ws)));
  const overallPlanned=avgNums(wsList.map(ws=>wsPlanned(ws)));
  const overallVariance=overallActual-overallPlanned;
  const risks=wsList.flatMap(ws=>allProjects(ws).filter(p=>p.risk).map(p=>({...p,wsCode:ws.code,wsColor:ws.color})));
  const totalInitiatives=wsList.reduce((a,ws)=>a+ws.initiatives.length,0);
  const totalProjects=all.length;
  return(
    <div>
      {lastRefresh&&<div style={{fontSize:13,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace",marginBottom:14,textAlign:"right"}}>Last refreshed: {lastRefresh}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:20}}>
        {[
          {l:"Actual Progress",v:`${overallActual}%`,sub:"across all workstreams"},
          {l:"Planned Progress",v:`${overallPlanned}%`,sub:"as of today"},
          {l:"Variance",v:varianceLabel(overallVariance),sub:"actual vs planned",col:varianceColor(overallVariance)},
          {l:"Initiatives / Projects",v:`${totalInitiatives} / ${totalProjects}`,sub:`${totalInitiatives} initiatives · ${totalProjects} projects`},
          {l:"Open Risks",v:risks.length,sub:risks.length>0?"requiring attention":"none logged",col:risks.length>0?"#ef4444":null},
        ].map((k,i)=>(
          <div key={i} style={{background:k.col?`${k.col}0E`:"rgba(255,255,255,0.04)",border:`1px solid ${k.col?k.col+"25":"rgba(255,255,255,0.07)"}`,borderRadius:10,padding:"15px 16px"}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>{k.l}</div>
            <div style={{fontSize:26,fontFamily:"Playfair Display,serif",color:k.col||"#fff",lineHeight:1,marginBottom:3}}>{k.v}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.62)"}}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:22}}>
        {["G","A","R"].map(r=>(
          <div key={r} style={{background:RAG[r].bg,border:`1px solid ${RAG[r].border}`,borderRadius:10,padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:RAG[r].color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#0a0d12",flexShrink:0}}>{rc[r]}</div>
            <div><div style={{fontSize:13,color:RAG[r].color,fontWeight:600}}>{RAG[r].label}</div><div style={{fontSize:13,color:"rgba(255,255,255,0.62)"}}>projects</div></div>
          </div>
        ))}
      </div>
      {/* Tab buttons */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["overview","Overview"],["gantt","Cross-Workstream Gantt"]].map(([v,label])=>(
          <button key={v} onClick={()=>setMasterView(v)} style={{padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"DM Mono,monospace",border:`1px solid ${masterView===v?"rgba(201,168,76,0.6)":"rgba(255,255,255,0.15)"}`,background:masterView===v?"rgba(201,168,76,0.15)":"transparent",color:masterView===v?"#C9A84C":"rgba(255,255,255,0.6)",transition:"all 0.15s"}}>{label}</button>
        ))}
      </div>
      {masterView==="gantt"&&<CrossGantt wsList={wsList}/>}
      {masterView==="overview"&&<div style={{fontSize:12,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>Workstream Status — click to drill in</div>}
      {masterView==="overview"&&
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:26}}>
        {wsList.map(ws=>{
          const act=wsActual(ws),plan=wsPlanned(ws),rag=wsRag(ws);
          return(
            <div key={ws.id} onClick={()=>onSelect(ws.id)} style={{background:"rgba(255,255,255,0.022)",border:"1px solid rgba(255,255,255,0.055)",borderLeft:`3px solid ${ws.color}`,borderRadius:10,padding:"13px 15px",cursor:"pointer",transition:"background 0.16s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9,gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",marginBottom:2}}>{ws.code}</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#fff",lineHeight:1.3}}>{ws.name}</div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",marginTop:3}}>Lead: <span style={{color:"rgba(255,255,255,0.6)"}}>{ws.lead}</span></div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}><RAGBadge rag={rag} tiny/><VariancePill actual={act} planned={plan}/></div>
              </div>
              <div style={{marginBottom:5}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace"}}>ACTUAL</span><span style={{fontSize:13,color:ws.color,fontFamily:"DM Mono,monospace"}}>{act}%</span></div>
                <Bar pct={act} color={ws.color}/>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace"}}>PLANNED</span><span style={{fontSize:13,color:"rgba(255,255,255,0.72)",fontFamily:"DM Mono,monospace"}}>{plan}%</span></div>
                <Bar pct={plan} color="#666e7a"/>
              </div>
              <div style={{display:"flex",gap:12,marginTop:8}}>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.62)"}}>{ws.initiatives.length} initiatives</span>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.62)"}}>{allProjects(ws).length} projects</span>
              </div>
              {history[ws.code]&&history[ws.code].length>=1&&<div style={{marginTop:6}}><Sparkline data={history[ws.code]} color={ws.color} width={70} height={22}/></div>}
            </div>
          );
        })}
      </div>
      }
      <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>Consolidated Risk Register</div>
      {risks.length>0?(
        <div style={{border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 70px 80px",padding:"7px 16px",background:"rgba(255,255,255,0.022)",borderBottom:"1px solid rgba(255,255,255,0.055)"}}>
            {["Risk / Issue","WS","Status"].map((h,i)=><span key={i} style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase"}}>{h}</span>)}
          </div>
          {risks.map((r,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px 80px",padding:"10px 16px",alignItems:"center",borderBottom:i<risks.length-1?"1px solid rgba(255,255,255,0.07)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
              <div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginBottom:1}}>{r.name}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",marginBottom:3,fontFamily:"DM Mono,monospace"}}>Project owner: {r.owner}</div>
                <div style={{fontSize:13,color:"#f59e0b"}}>⚠ {r.risk}</div>
              </div>
              <div style={{fontSize:13,color:r.wsColor,fontFamily:"DM Mono,monospace"}}>{r.wsCode}</div>
              <RAGBadge rag={r.rag} tiny/>
            </div>
          ))}
        </div>
      ):(
        <div style={{border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,padding:18,textAlign:"center"}}>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>No risks logged.</div>
        </div>
      )}
    </div>
  );
}

      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:9,marginBottom:18}}>
        {[{l:"Initiatives",v:ws.initiatives.length},{l:"Projects",v:all.length},{l:"Variance",v:varianceLabel(v),col:varianceColor(v)},{l:"On Track",v:rc.G,col:RAG.G.color},{l:"At Risk",v:rc.A,col:RAG.A.color},{l:"Off Track",v:rc.R,col:RAG.R.color}].map((k,i)=>(
          <div key={i} style={{background:k.col?`${k.col}0C`:"rgba(255,255,255,0.04)",border:`1px solid ${k.col?k.col+"20":"rgba(255,255,255,0.07)"}`,borderRadius:8,padding:"11px 12px"}}>

          {ws.initiatives.map(init=>{
            const open=openInit===init.id,ip=initActual(init),iplan=initPlanned(init),ir=initRag(init);

              <div key={init.id} style={{border:`1px solid ${open?ws.color+"40":"rgba(255,255,255,0.07)"}`,borderRadius:9,overflow:"hidden",transition:"border-color 0.18s"}}>

                  <div style={{flex:1,minWidth:0}}>

                          <div style={{fontSize:13,color:ws.color,fontFamily:"DM Mono,monospace",fontWeight:600}}>{pr.progress}%</div>

                          <VariancePill actual={pr.progress} planned={pplan}/>
                          <div style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",lineHeight:1.7}}>{fmtDate(pr.start)}<br/>→ {fmtDate(pr.end)}</div>

                        </div>
                      {/* Notes — full width below grid row */}
                      {pr.notes&&(
                        <div style={{padding:"5px 15px 8px",borderBottom:"1px solid rgba(255,255,255,0.055)",background:pi%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                          <span style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace",textTransform:"uppercase",letterSpacing:"0.06em",marginRight:8}}>Notes</span>
                          <span style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontStyle:"italic",lineHeight:1.5}}>{pr.notes}</span>
                        </div>
                      )}
                        </>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* GANTT VIEW */}
      {view==="gantt"&&(
        <div style={{background:"rgba(255,255,255,0.022)",border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,padding:"16px 18px",marginBottom:22}}>
          <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
            {[["rgba(255,255,255,0.62)","1px dashed rgba(255,255,255,0.72)","Planned duration"],["#4C9AC9","none","Actual progress"],["rgba(255,255,255,0.9)","none","Today"]].map(([bg,border,label],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                {i<2?<div style={{width:24,height:7,borderRadius:3,background:bg,border}}/>:<div style={{width:2,height:14,borderRadius:2,background:bg}}/>}

                    <div>

                      </div>
                      <OwnerTag label="Owner" name={pr.owner}/>
                    </div>
                    <GanttRow project={pr} color={ws.color}/>
                    <VariancePill actual={pr.progress} planned={pplan}/>
                    <RAGBadge rag={pr.rag} tiny/>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {/* Risk register */}
      <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>Workstream Risk Register</div>
      {risks.length>0?(
        <div style={{border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,overflow:"hidden"}}>
          {risks.map((r,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 84px",padding:"10px 15px",alignItems:"center",borderBottom:i<risks.length-1?"1px solid rgba(255,255,255,0.07)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
              <div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginBottom:1}}>{r.name}</div>
                <OwnerTag label="Project Owner" name={r.owner}/>
                <div style={{fontSize:13,color:"#f59e0b",marginTop:4}}>⚠ {r.risk}</div>
              </div>
              <RAGBadge rag={r.rag} tiny/>
            </div>
          ))}
        </div>
      ):(
        <div style={{border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,padding:16,textAlign:"center"}}>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>No risks logged for this workstream.</div>
        </div>
      )}
    </div>
  );
}

function SearchResults({results,query,onSelect,onCardOpen}){
  if(!results.length) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:260,gap:10}}>
      <div style={{fontSize:28,opacity:0.25}}>🔍</div>
      <div style={{fontSize:14,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace"}}>No matches for <span style={{color:"rgba(255,255,255,0.8)"}}>&ldquo;{query}&rdquo;</span></div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.35)"}}>Try project name, owner, workstream code, or risk keyword</div>
    </div>
  );
  function Highlight({text}){
    if(!text) return null;
    const q=query.toLowerCase();
    const idx=text.toLowerCase().indexOf(q);
    if(idx<0) return <span>{text}</span>;
    return <span>{text.slice(0,idx)}<mark style={{background:"rgba(201,168,76,0.35)",color:"#C9A84C",borderRadius:2,padding:"0 1px"}}>{text.slice(idx,idx+q.length)}</mark>{text.slice(idx+q.length)}</span>;
  }
  return(
    <div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>
        Search Results — {results.length} project{results.length!==1?"s":""} matching &ldquo;{query}&rdquo;
      </div>
      <div style={{border:"1px solid rgba(255,255,255,0.055)",borderRadius:10,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"160px 1fr 140px 70px 90px 80px",padding:"7px 16px",background:"rgba(255,255,255,0.022)",borderBottom:"1px solid rgba(255,255,255,0.055)"}}>
          {["Workstream","Project / Initiative","Owner","Actual","Variance","RAG"].map((h,i)=>(
            <span key={i} style={{fontSize:11,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase"}}>{h}</span>
          ))}
        </div>
        {results.map((pr,i)=>{
          const pplan=plannedPct(pr.start,pr.end);
          return(
            <div key={pr.id} style={{display:"grid",gridTemplateColumns:"160px 1fr 140px 70px 90px 80px",padding:"10px 16px",alignItems:"center",borderBottom:i<results.length-1?"1px solid rgba(255,255,255,0.055)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",cursor:"pointer",transition:"background 0.13s"}}
              onClick={()=>onSelect(pr.wsId)}
              onMouseEnter={e=>e.currentTarget.style.background=`${pr.wsColor}12`}
              onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"transparent":"rgba(255,255,255,0.02)"}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,color:pr.wsColor}}>{pr.wsIcon}</span>
                <div>
                  <div style={{fontSize:11,color:pr.wsColor,fontFamily:"DM Mono,monospace",letterSpacing:"0.08em"}}><Highlight text={pr.wsCode}/></div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}} title={pr.wsName}>{pr.wsName}</div>
                </div>
              </div>
              <div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.9)",marginBottom:2}}><Highlight text={pr.name}/></div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontFamily:"DM Mono,monospace"}}>{pr.id} · <Highlight text={pr.initName}/></div>
                {pr.risk&&<div style={{fontSize:11,color:"#f59e0b",marginTop:2}}>⚠ <Highlight text={pr.risk}/></div>}
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontFamily:"DM Mono,monospace"}}><Highlight text={pr.owner}/></div>
              <div style={{fontSize:13,color:pr.wsColor,fontFamily:"DM Mono,monospace",fontWeight:600}}>{pr.progress}%</div>
              <VariancePill actual={pr.progress} planned={pplan}/>
              <RAGBadge rag={pr.rag} tiny/>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:10,fontSize:12,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>Click a row to navigate to that workstream</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP SHELL
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [active,setActive]=useState(0);
  const [wsList,setWsList]=useState(FALLBACK_DATA);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [usingSheets,setUsingSheets]=useState(false);
  const [history,setHistory]=useState({});
  const [cardData,setCardData]=useState({cards:{},milestones:{}});
  const [activeCard,setActiveCard]=useState(null); // {project, wsColor}
  const [searchQuery,setSearchQuery]=useState("");

  const isConfigured = CONFIG.SHEET_ID!=="YOUR_SHEET_ID_HERE" && CONFIG.API_KEY!=="YOUR_API_KEY_HERE";

  const refresh=useCallback(async()=>{
    if(!isConfigured)return;
    setLoading(true);setError(null);
    try{
      const data=await loadFromSheets();
      if(data){setWsList(data);setUsingSheets(true);setLastRefresh(new Date().toLocaleTimeString());}
      try{const h=await loadHistory();setHistory(h);}catch(_){}
      const cd=await loadProjectCards();setCardData(cd);
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[isConfigured]);

  useEffect(()=>{refresh();},[]);
  useEffect(()=>{
    if(!isConfigured||!CONFIG.REFRESH_INTERVAL)return;
    const t=setInterval(refresh,CONFIG.REFRESH_INTERVAL);
    return()=>clearInterval(t);
  },[isConfigured]);

  const currentWS=wsList.find(w=>w.id===active);
  const navItems=[{id:0,code:"CMD",icon:"◈",color:"#C9A84C",name:"Integration Command",lead:null},...wsList];

  const q=searchQuery.trim().toLowerCase();
  const searchResults=q?wsList.flatMap(ws=>ws.initiatives.flatMap(init=>init.projects
    .filter(pr=>[pr.name,pr.id,pr.owner,pr.risk||"",init.name,init.id,ws.name,ws.code,ws.lead||""].some(s=>s.toLowerCase().includes(q)))
    .map(pr=>({...pr,wsCode:ws.code,wsName:ws.name,wsColor:ws.color,wsIcon:ws.icon,wsId:ws.id,initName:init.name}))
  )):[];

  return(
    <div style={{minHeight:"100vh",background:"#0a0d12",fontFamily:"DM Sans,sans-serif",color:"#fff"}}>
      <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:260,flexShrink:0,background:"rgba(255,255,255,0.022)",borderRight:"1px solid rgba(255,255,255,0.055)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.055)"}}>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}>Post-Acquisition Integration</div>
            <div style={{fontSize:19,fontFamily:"Playfair Display,serif",color:"#fff"}}>Hightekers</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.62)",marginTop:3}}>Serviap · EOS · Rivermate</div>
            <div style={{marginTop:9,height:1,background:"linear-gradient(90deg,#C9A84C50,transparent)"}}/>
            <div style={{fontSize:13,color:"#C9A84C",fontFamily:"DM Mono,monospace",marginTop:6,letterSpacing:"0.05em"}}>8 Workstreams</div>
            {usingSheets&&<div style={{marginTop:5,fontSize:12,color:"rgba(34,197,94,0.7)",fontFamily:"DM Mono,monospace",letterSpacing:"0.05em"}}>● LIVE FROM GOOGLE SHEETS</div>}
          </div>
          <nav style={{flex:1,overflowY:"auto",padding:"7px"}}>
            {navItems.map(ws=>{
              const isActive=active===ws.id;
              const liveWS=wsList.find(w=>w.id===ws.id);
              const rag=liveWS?wsRag(liveWS):null;
              return(
                <div key={ws.id} onClick={()=>setActive(ws.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,cursor:"pointer",marginBottom:1,background:isActive?`${ws.color}15`:"transparent",border:`1px solid ${isActive?ws.color+"35":"transparent"}`,transition:"all 0.13s"}}
                  onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background="rgba(255,255,255,0.05)";}}
                  onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background="transparent";}}>
                  <span style={{fontSize:12,color:isActive?ws.color:"rgba(255,255,255,0.5)",flexShrink:0}}>{ws.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    {ws.id===0?(
                      <div style={{fontSize:12,fontWeight:isActive?600:400,color:isActive?"#fff":"rgba(255,255,255,0.82)"}}>Integration Command</div>
                    ):(
                      <>
                        <div style={{fontSize:12,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",marginBottom:1}}>{ws.code}</div>
                        <div style={{fontSize:13,fontWeight:isActive?600:400,color:isActive?"#fff":"rgba(255,255,255,0.82)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ws.name}</div>
                        {ws.lead&&ws.lead!=="—"&&<div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:1}}>{ws.lead}</div>}
                      </>
                    )}
                  </div>
                  {rag&&<Dot rag={rag}/>}
                </div>
              );
            })}
          </nav>
          <div style={{padding:"10px 13px",borderTop:"1px solid rgba(255,255,255,0.055)"}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:isConfigured?10:0}}>
              {Object.entries(RAG).map(([k,v])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:v.color}}/>
                  <span style={{fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"DM Mono,monospace"}}>{v.label}</span>
                </div>
              ))}
            </div>
            {isConfigured&&(
              <button onClick={refresh} disabled={loading} style={{width:"100%",padding:"7px",borderRadius:7,background:"rgba(255,255,255,0.022)",border:"1px solid rgba(255,255,255,0.055)",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:loading?"wait":"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <span className={loading?"spin":""} style={{display:"inline-block"}}>↻</span>
                {loading?"Refreshing…":"Refresh from Sheets"}
              </button>
            )}
          </div>
        </div>

        {/* Main content */}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"13px 24px",borderBottom:"1px solid rgba(255,255,255,0.055)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.022)",flexShrink:0}}>
            <div>
              <div style={{fontSize:13,color:active===0?"#C9A84C":currentWS?.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:2}}>{active===0?"Integration Command Centre":`${currentWS?.code} — Workstream Dashboard`}</div>
              <div style={{fontSize:15,fontFamily:"Playfair Display,serif",color:"#fff"}}>{active===0?"Master Integration Dashboard":currentWS?.name}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {error&&<div style={{fontSize:12,color:"#ef4444",fontFamily:"DM Mono,monospace",maxWidth:220}}>⚠ {error}</div>}
              <div style={{position:"relative",display:"flex",alignItems:"center"}}>
                <span style={{position:"absolute",left:9,fontSize:13,color:"rgba(255,255,255,0.4)",pointerEvents:"none"}}>🔍</span>
                <input
                  type="text"
                  placeholder="Search projects, owners, risks…"
                  value={searchQuery}
                  onChange={e=>setSearchQuery(e.target.value)}
                  style={{paddingLeft:30,paddingRight:searchQuery?28:10,paddingTop:5,paddingBottom:5,width:240,borderRadius:7,background:"rgba(255,255,255,0.055)",border:`1px solid ${searchQuery?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.1)"}`,color:"#fff",fontSize:12,fontFamily:"DM Mono,monospace",outline:"none"}}
                />
                {searchQuery&&<button onClick={()=>setSearchQuery("")} style={{position:"absolute",right:7,background:"transparent",border:"none",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>✕</button>}
              </div>
              <div style={{padding:"5px 12px",borderRadius:20,background:"rgba(255,255,255,0.022)",border:"1px solid rgba(255,255,255,0.055)",fontSize:12,color:"rgba(255,255,255,0.72)",fontFamily:"DM Mono,monospace"}}>EOR Integration · 2026</div>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
            {searchQuery.trim()
              ?<SearchResults results={searchResults} query={searchQuery.trim()} onSelect={wsId=>{setActive(wsId);setSearchQuery("");}} onCardOpen={setActiveCard}/>
              :active===0
                ?<Master wsList={wsList} onSelect={setActive} lastRefresh={lastRefresh} history={history}/>
                :currentWS&&<WSDash ws={currentWS} cardData={cardData} onCardOpen={setActiveCard}/>
            }
          </div>
        </div>
      </div>
      {activeCard&&<ProjectCardModal project={activeCard.project} card={cardData.cards[activeCard.project.id]} milestones={cardData.milestones[activeCard.project.id]} wsColor={activeCard.wsColor} onClose={()=>setActiveCard(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
