// ─────────────────────────────────────────────────────────────────────────────
// GOOGLE SHEETS DATA LOADER
//
// Expected sheet columns (row 1 = headers, data from row 2):
//   A  Project ID
//   B  Workstream Code       (WS1 – WS8)
//   C  Initiative ID         (e.g. 1.1)
//   D  Initiative Name
//   E  Workstream Lead       (person accountable for the whole workstream)
//   F  Initiative Owner      (person accountable for this initiative)
//   G  Project Name
//   H  Project Owner         (person accountable for this specific project)
//   I  Start Date            (YYYY-MM-DD)
//   J  End Date              (YYYY-MM-DD)
//   K  % Complete            (0–100, no % sign)
//   L  RAG                   (G, A, or R)
//   M  Risk / Issue          (free text, leave blank if none)
// ─────────────────────────────────────────────────────────────────────────────
async function loadFromSheets() {
  const { SHEET_ID, API_KEY, SHEET_TAB } = CONFIG;
  if (SHEET_ID === "YOUR_SHEET_ID_HERE" || API_KEY === "YOUR_API_KEY_HERE") {
    return null;
  }
  const range = encodeURIComponent(`${SHEET_TAB}!A2:N500`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheets API error: ${res.status} ${res.statusText}`);
  const json = await res.json();
  const rows = json.values || [];

  // Seed workstream map from visual metadata (no lead yet — comes from sheet)
  const wsMap = {};
  Object.values(WS_META).forEach(m => {
    wsMap[m.code] = { ...m, lead: "—", initiatives: [] };
  });

  rows.forEach(row => {
    const [
      projId,       // A
      wsCode,       // B
      initId,       // C
      initName,     // D
      wsLead,       // E  ← workstream lead
      initOwner,    // F  ← initiative owner
      projName,     // G
      projOwner,    // H  ← project owner
      start,        // I
      end,          // J
      progressRaw,  // K
      ragRaw,       // L
      risk,         // M
    ] = row;

    const code = wsCode?.trim();
    if (!code || !wsMap[code]) return;
    const ws = wsMap[code];

    // Set workstream lead from the first row that has one
    if (wsLead?.trim() && ws.lead === "—") ws.lead = wsLead.trim();

    // Find or create initiative
    const iid = initId?.trim();
    let init = ws.initiatives.find(i => i.id === iid);
    if (!init) {
      init = {
        id:    iid,
        name:  initName?.trim() || "",
        owner: initOwner?.trim() || "—",   // initiative owner
        projects: [],
      };
      ws.initiatives.push(init);
    }
    // Update initiative owner if a later row provides it
    if (initOwner?.trim() && init.owner === "—") init.owner = initOwner.trim();

    // Add project
    const rag = ["G","A","R"].includes(ragRaw?.trim().toUpperCase())
      ? ragRaw.trim().toUpperCase() : "G";

    init.projects.push({
      id:       projId?.trim() || `${iid}.${init.projects.length+1}`,
      name:     projName?.trim() || "",
      owner:    projOwner?.trim() || "—",   // project owner
      progress: Math.min(100, Math.max(0, parseInt(progressRaw) || 0)),
      rag,
      risk:     risk?.trim() || null,
      start:    start?.trim() || "2026-01-01",
      end:      end?.trim()   || "2026-12-31",
      notes:    row[13]?.trim() || "",
    });
  });

  return Object.values(wsMap).filter(ws => ws.initiatives.length > 0);
}

// PROJECT CARDS — load from ProjectCards and Milestones tabs
// ─────────────────────────────────────────────────────────────────────────────
async function loadProjectCards(){
  const {SHEET_ID,API_KEY,PROJECT_CARDS_TAB,MILESTONES_TAB}=CONFIG;
  if(!SHEET_ID||SHEET_ID==="YOUR_SHEET_ID_HERE") return {cards:{},milestones:{}};
  try{
    const cr=encodeURIComponent(`${PROJECT_CARDS_TAB}!A2:F500`);
    const mr=encodeURIComponent(`${MILESTONES_TAB}!A2:D500`);
    const [cr2,mr2]=await Promise.all([
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${cr}?key=${API_KEY}`).then(r=>r.json()),
      fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${mr}?key=${API_KEY}`).then(r=>r.json()),
    ]);
    const cards={};
    (cr2.values||[]).forEach(row=>{
      const [id,desc,scope,outputs,kpis,deps]=row;
      if(id?.trim()) cards[id.trim()]={description:desc||"",scope:scope||"",outputs:outputs||"",kpis:kpis||"",dependencies:deps||""};
    });
    const milestones={};
    (mr2.values||[]).forEach(row=>{
      const [pid,name,date,status]=row;
      if(!pid?.trim()) return;
      if(!milestones[pid.trim()]) milestones[pid.trim()]=[];
      milestones[pid.trim()].push({name:name||"",date:date||"",status:status||"Not Started"});
    });
    return {cards,milestones};
  }catch(e){
    console.warn("Project cards load failed:",e.message);

// HISTORY — load weekly snapshots for trend sparklines
// History tab: A=Date B=ProjectID C=WSCode D=Actual% E=PlannedPct F=RAG
// ─────────────────────────────────────────────────────────────────────────────
async function loadHistory(){
  const {SHEET_ID,API_KEY,HISTORY_TAB}=CONFIG;
  if(!SHEET_ID||SHEET_ID==="YOUR_SHEET_ID_HERE") return {};
  try{
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(HISTORY_TAB+"!A2:F2000")}?key=${API_KEY}`);
    const json=await res.json();
    const rows=json.values||[];
    // Group by WSCode -> array of {date,actual,planned,rag} sorted by date
    const byWS={};
    rows.forEach(row=>{
      const [date,projId,wsCode,actual,planned,rag]=row;
      if(!wsCode) return;
      if(!byWS[wsCode]) byWS[wsCode]=[];
      byWS[wsCode].push({date:date||"",actual:parseInt(actual)||0,planned:parseInt(planned)||0,rag:rag||"G"});
    });
    // Average per WS per date
    const wsTrends={};
    Object.entries(byWS).forEach(([ws,rows])=>{
      const byDate={};
      rows.forEach(r=>{
        if(!byDate[r.date]) byDate[r.date]={actuals:[],planneds:[],rags:[]};
        byDate[r.date].actuals.push(r.actual);
        byDate[r.date].planneds.push(r.planned);
        byDate[r.date].rags.push(r.rag);
      });
      wsTrends[ws]=Object.entries(byDate).sort((a,b)=>a[0]<b[0]?-1:1).map(([date,d])=>({
        date,
        actual:Math.round(d.actuals.reduce((a,b)=>a+b,0)/d.actuals.length),
        planned:Math.round(d.planneds.reduce((a,b)=>a+b,0)/d.planneds.length),
      }));
    });
    return wsTrends;
  }catch(e){console.warn("History load failed:",e.message);return {};}
}

const TODAY = new Date();
function plannedPct(start,end){
  const s=new Date(start),e=new Date(end);
  if(TODAY<=s)return 0; if(TODAY>=e)return 100;
  return Math.round(((TODAY-s)/(e-s))*100);
}

  G:{label:"On Track",color:"#22c55e",bg:"rgba(34,197,94,0.11)",border:"rgba(34,197,94,0.32)"},
  A:{label:"At Risk",color:"#f59e0b",bg:"rgba(245,158,11,0.11)",border:"rgba(245,158,11,0.32)"},
  R:{label:"Off Track",color:"#ef4444",bg:"rgba(239,68,68,0.11)",border:"rgba(239,68,68,0.32)"},

const wsRag=ws=>allProjects(ws).reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const avgOf=arr=>arr.length?Math.round(arr.reduce((a,p)=>a+p.progress,0)/arr.length):0;
const avgNums=arr=>arr.length?Math.round(arr.reduce((a,n)=>a+n,0)/arr.length):0;
const wsActual=ws=>avgOf(allProjects(ws));
const initActual=init=>avgOf(init.projects);
const initPlanned=init=>avgNums(init.projects.map(p=>plannedPct(p.start,p.end)));
const wsPlanned=ws=>avgNums(allProjects(ws).map(p=>plannedPct(p.start,p.end)));
const initRag=init=>init.projects.reduce((w,p)=>p.rag==="R"?"R":p.rag==="A"&&w!=="R"?"A":w,"G");
const fmtDate=str=>{const d=new Date(str);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});};
const varianceColor=v=>v>=0?"#3bbffa":v>=-15?"#f59e0b":"#ef4444";

// ─────────────────────────────────────────────────────────────────────────────
// SPARKLINE — trend chart for workstream progress
// ─────────────────────────────────────────────────────────────────────────────
function Sparkline({data,color,width=80,height=28}){
  if(!data||data.length<1) return null;
  const vals=data.map(d=>d.actual);
  const min=0,max=100;
  // Single point — show a dot with the current value
  if(vals.length===1){
    const y=height-((vals[0]-min)/(max-min))*(height-4)-2;
    return(
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <svg width={width} height={height} style={{overflow:"visible"}}>
          <circle cx={width/2} cy={y} r={3} fill="#3bbffa" opacity="0.8"/>
        </svg>
        <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",fontFamily:"DM Mono,monospace"}}>—</span>
      </div>
    );
  }
  // If all values identical, draw flat line at correct Y position
  const allSame=vals.every(v=>v===vals[0]);
  const flatY=allSame?height-((vals[0]-min)/(max-min))*(height-4)-2:0;
  const pts=allSame
    ?`0,${flatY} ${width},${flatY}`
    :vals.map((v,i)=>{
        const x=(i/(vals.length-1))*width;
        const y=height-((v-min)/(max-min))*(height-4)-2;
        return `${x},${y}`;
      }).join(' ');
  const last=vals[vals.length-1];
  const prev=vals.length>=2?vals[vals.length-2]:vals[0];
  const trend=last-prev;
  const trendColor=trend>0?"#22c55e":trend<0?"#ef4444":"rgba(255,255,255,0.4)";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <svg width={width} height={height} style={{overflow:"visible"}}>
        <polyline points={pts} fill="none" stroke="#3bbffa" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.7"/>
        {vals.map((v,i)=>{
          const x=(i/(vals.length-1))*width;
          const y=height-((v-min)/(max-min))*(height-4)-2;
          return i===vals.length-1?<circle key={i} cx={x} cy={y} r={2.5} fill="#3bbffa" filter="url(#sparkGlow)"/>:null;
        })}
        <defs><filter id="sparkGlow"><feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      </svg>
      <span style={{fontSize:11,color:trendColor,fontFamily:"DM Mono,monospace",fontWeight:700,whiteSpace:"nowrap"}}>
        {trend>0?"+":""}{trend}%
      </span>
    </div>
  );
}

                <span className="material-symbols-outlined" style={{fontSize:16,color:"#a3aac4"}}>{isExpanded?"expand_less":"expand_more"}</span>
              </div>
              <div style={{position:"relative",height:14,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden"}}>
                {/* WS extent bar */}
                {(()=>{
                  const starts=allProj.map(p=>new Date(p.start)).filter(d=>!isNaN(d));
                  const ends=allProj.map(p=>new Date(p.end)).filter(d=>!isNaN(d));
                  if(!starts.length) return null;
                  const wsStart=new Date(Math.min(...starts));
                  const wsEnd=new Date(Math.max(...ends));
                  const left=pct(wsStart);
                  const right=100-pct(wsEnd);
                  const fillWidth=(pct(wsEnd)-pct(wsStart))*(wsActPct/100);
                  return(
                    <>
                      <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,right:`${right}%`,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:9999}}/>
                      <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${fillWidth}%`,background:wsRagColor,borderRadius:9999,opacity:0.8}}/>
                    </>
                  );
                })()}
                {/* Today line */}
                <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:2,background:"#3bbffa"}}/>
              </div>
            </div>
            {/* Expanded project rows */}
            {isExpanded&&allProj.map((pr,pi)=>{
              const left=pct(pr.start),right=100-pct(pr.end);
              const planPct=plannedPct(pr.start,pr.end);
              const fillW=(pct(pr.end)-pct(pr.start))*(pr.progress/100);
              const ragC={"G":"#22c55e","A":"#f59e0b","R":"#ef4444"}[pr.rag]||"#22c55e";
              const ragGlow={"G":"0 0 10px rgba(34,197,94,0.5),0 0 20px rgba(34,197,94,0.2)","A":"0 0 10px rgba(245,158,11,0.5),0 0 20px rgba(245,158,11,0.2)","R":"0 0 10px rgba(239,68,68,0.5),0 0 20px rgba(239,68,68,0.2)"}[pr.rag]||"none";
              return(
                <div key={pr.id} style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:0,alignItems:"center",padding:"2px 0",background:pi%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                  <div style={{paddingLeft:16,paddingRight:8,overflow:"hidden"}}>
                    <div style={{fontSize:13,color:"#dee5ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Manrope,sans-serif"}} title={pr.name}>{pr.name}</div>
                    <div style={{fontSize:12,color:"#6d758c",fontFamily:"DM Mono,monospace"}}>{pr.progress}% <span style={{color:ragC}}>●</span></div>
                  </div>
                  <div style={{position:"relative",height:10,background:"rgba(255,255,255,0.04)",borderRadius:9999,overflow:"hidden"}}>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,right:`${right}%`,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:9999}}/>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${left}%`,width:`${fillW}%`,background:ragC,borderRadius:9999,opacity:0.85,boxShadow:ragGlow}}/>
                    <div style={{position:"absolute",top:0,bottom:0,left:`${todayPct}%`,width:2,background:"#3bbffa"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {/* Legend */}
      <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
        {[["rgba(255,255,255,0.04)","1px solid rgba(255,255,255,0.12)","Planned duration"],["#4C9AC9","none","Actual progress"],["#3bbffa","none","Today"]].map(([bg,border,label],i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
            {i<2?<div style={{width:20,height:6,borderRadius:2,background:bg,border}}/>:<div style={{width:2,height:12,borderRadius:1,background:bg}}/>}
            <span style={{fontSize:13,color:"#6d758c",fontFamily:"DM Mono,monospace"}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY PANELS — 3-panel header used by both Master and WSDash
// ─────────────────────────────────────────────────────────────────────────────
function SummaryPanels({actual,planned,initiatives,projects,rc,color,variance}){
  const varColor=variance>0?"#22c55e":variance<0?"#ef4444":"#a3aac4";
  const varLabel=(variance>0?"+":"")+variance+"%";
  function progressArc(cx,cy,r,pct,thick){
    if(pct<=0) return null;
    const capped=Math.min(pct,99.99);
    const toRad=a=>((a-90)*Math.PI/180);
    const end=capped/100*360;
    const x1=cx+r*Math.cos(toRad(0)),y1=cy+r*Math.sin(toRad(0));
    const x2=cx+r*Math.cos(toRad(end)),y2=cy+r*Math.sin(toRad(end));
    const large=end>180?1:0;
    const ir=r-thick;
    const ix1=cx+ir*Math.cos(toRad(0)),iy1=cy+ir*Math.sin(toRad(0));
    const ix2=cx+ir*Math.cos(toRad(end)),iy2=cy+ir*Math.sin(toRad(end));
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z`;
  }
  const cx=54,cy=54,outerR=47,innerR=35,thick=11;
  const actualPath=progressArc(cx,cy,outerR,actual,thick);
  const plannedPath=progressArc(cx,cy,innerR,planned,thick-4);
  const panelStyle={background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,padding:"11px 14px",boxShadow:"inset 0 1px 0 0 rgba(64,72,93,0.4)"};
  const titleStyle={fontSize:13,color:"#dee5ff",fontFamily:"Manrope,sans-serif",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8};
  const numStyle={fontSize:26,fontWeight:800,fontFamily:"Manrope,sans-serif",lineHeight:1};
  const subStyle={fontSize:11,fontFamily:"Manrope,sans-serif",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2};
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
      {/* Panel 1 — Ring left, stats right */}
      <div style={{...panelStyle,display:"flex",flexDirection:"column"}}>
        <div style={titleStyle}>Overall Progress</div>
        <div style={{display:"flex",alignItems:"center",gap:14,flex:1}}>
          {/* Ring */}
          <div style={{flexShrink:0}}>
            <svg width="108" height="108" viewBox="0 0 108 108">
              <circle cx={cx} cy={cy} r={outerR-thick/2} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={thick}/>
              <circle cx={cx} cy={cy} r={innerR-(thick-4)/2} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={thick-4}/>
              {plannedPath&&<path d={plannedPath} fill={color} opacity="0.22"/>}
              {actualPath&&<path d={actualPath} fill={color} opacity="1" style={{filter:`drop-shadow(0 0 5px ${color}80)`}}/>}
            </svg>
          </div>
          {/* Stats */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:4,background:variance>=0?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${variance>=0?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:9999,padding:"2px 8px",marginBottom:6}}>
              <span className="material-symbols-outlined" style={{fontSize:12,color:varColor}}>{variance>=0?"arrow_drop_up":"arrow_drop_down"}</span>
              <span style={{fontSize:12,fontWeight:700,color:varColor,fontFamily:"DM Mono,monospace"}}>{varLabel}</span>
              <span style={{fontSize:11,color:varColor,fontFamily:"Manrope,sans-serif",opacity:0.7}}>VAR</span>
            </div>
            <div style={{marginBottom:6}}>
              <div style={{...subStyle,color:"#6d758c"}}>Actual</div>
              <div style={{...numStyle,color:color}}>{actual}%</div>
            </div>
            <div>
              <div style={{...subStyle,color:"#6d758c"}}>Planned</div>
              <div style={{...numStyle,color:"rgba(255,255,255,0.35)"}}>{planned}%</div>
            </div>
          </div>
        </div>
      </div>
      {/* Panel 2 — Programme Inventory */}
      <div style={{...panelStyle,display:"flex",flexDirection:"column"}}>
        <div style={titleStyle}>Programme Inventory</div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",flex:1,gap:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(64,72,93,0.4)"}}>
            <div style={{width:34,height:34,borderRadius:8,background:"rgba(59,191,250,0.12)",border:"1px solid rgba(59,191,250,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span className="material-symbols-outlined" style={{fontSize:17,color:"#3bbffa"}}>account_tree</span>
            </div>
            <div>
              <div style={{...numStyle,color:"#3bbffa"}}>{initiatives}</div>
              <div style={{...subStyle,color:"#a3aac4"}}>Initiatives</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:34,height:34,borderRadius:8,background:"rgba(59,191,250,0.08)",border:"1px solid rgba(59,191,250,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span className="material-symbols-outlined" style={{fontSize:17,color:"#3bbffa",opacity:0.7}}>task_alt</span>
            </div>
            <div>
              <div style={{...numStyle,color:"#3bbffa"}}>{projects}</div>
              <div style={{...subStyle,color:"#a3aac4"}}>Active Projects</div>
            </div>
          </div>
        </div>
      </div>
      {/* Panel 3 — Health Distribution */}
      <div style={{...panelStyle,display:"flex",flexDirection:"column"}}>
        <div style={titleStyle}>Health Distribution</div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center",flex:1,gap:5}}>
          {[{r:"G",label:"On Track", color:"#22c55e",bg:"rgba(34,197,94,0.08)", border:"rgba(34,197,94,0.25)", icon:"check_circle"},
            {r:"A",label:"At Risk",  color:"#f59e0b",bg:"rgba(245,158,11,0.08)",border:"rgba(245,158,11,0.25)",icon:"warning"},
            {r:"R",label:"Off Track",color:"#ef4444",bg:"rgba(239,68,68,0.08)", border:"rgba(239,68,68,0.25)", icon:"error"}
          ].map(({r,label,color:c,bg,border,icon})=>(
            <div key={r} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 10px",borderRadius:7,background:bg,border:`1px solid ${border}`}}>
              <div style={{...numStyle,color:c,minWidth:32,textAlign:"center"}}>{rc[r]||0}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:c,fontWeight:700,fontFamily:"Manrope,sans-serif",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div>
                <div style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>projects</div>
              </div>
              <span className="material-symbols-outlined" style={{fontSize:16,color:c,opacity:0.5}}>{icon}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// MASTER DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
function Master({wsList,onSelect,lastRefresh,history,riskData}){
  const [masterView,setMasterView]=useState('overview');
  const all=wsList.flatMap(allProjects);
  const rc={G:0,A:0,R:0};all.forEach(p=>rc[p.rag]++);
  const overallActual=avgNums(wsList.map(ws=>wsActual(ws)));
  const overallPlanned=avgNums(wsList.map(ws=>wsPlanned(ws)));
  const overallVariance=overallActual-overallPlanned;
  const totalInitiatives=wsList.reduce((a,ws)=>a+ws.initiatives.length,0);
  const totalProjects=all.length;
  const openRiskCount=(riskData||[]).filter(r=>r.status==="Open").length;
  return(
    <div>
      {lastRefresh&&<div style={{fontSize:13,color:"#6d758c",fontFamily:"DM Mono,monospace",marginBottom:14,textAlign:"right"}}>Last refreshed: {lastRefresh}</div>}
      <SummaryPanels
        actual={overallActual}
        planned={overallPlanned}
        initiatives={totalInitiatives}
        projects={totalProjects}
        rc={rc}
        color="#3bbffa"
        variance={overallVariance}
      />
      {/* Tab buttons */}
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["overview","Overview"],["gantt","Cross-Workstream Gantt"]].map(([v,label])=>(
          <button key={v} onClick={()=>setMasterView(v)} style={{padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"DM Mono,monospace",border:`1px solid ${masterView===v?"rgba(201,168,76,0.6)":"rgba(255,255,255,0.15)"}`,background:masterView===v?"rgba(201,168,76,0.15)":"transparent",color:masterView===v?"#C9A84C":"rgba(255,255,255,0.6)",transition:"all 0.15s"}}>{label}</button>
        ))}

      {masterView==="gantt"&&<CrossGantt wsList={wsList}/>}
      {masterView==="overview"&&<div style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:9}}>Workstream Status — click to drill in</div>}
      {masterView==="overview"&&
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:26}}>
        {wsList.map(ws=>{
          const act=wsActual(ws),plan=wsPlanned(ws),rag=wsRag(ws);
          const ragColor={G:"#22c55e",A:"#f59e0b",R:"#ef4444"}[rag]||"#22c55e";
          const ragGlow={G:"0 0 14px rgba(34,197,94,0.12)",A:"0 0 14px rgba(245,158,11,0.12)",R:"0 0 14px rgba(239,68,68,0.12)"}[rag]||"none";
          return(
            <div key={ws.id} onClick={()=>onSelect(ws.id)}

              onMouseEnter={e=>{e.currentTarget.style.background=`linear-gradient(145deg,${ws.color}16 0%,#141f38 65%)`;e.currentTarget.style.boxShadow=`inset 0 1px 0 0 rgba(64,72,93,0.4),${ragGlow},0 4px 24px rgba(0,0,0,0.3)`;}}
              onMouseLeave={e=>{e.currentTarget.style.background=`linear-gradient(145deg,${ws.color}0A 0%,#0f1930 65%)`;e.currentTarget.style.boxShadow=`inset 0 1px 0 0 rgba(64,72,93,0.4),${ragGlow}`;}}>
              {/* Top row: icon + RAG */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>

                  <span style={{fontSize:12,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",fontWeight:700}}>{ws.code}</span>
                </div>

              {/* WS name + lead */}

              <div style={{fontSize:12,color:"#6d758c",marginBottom:12,fontFamily:"Manrope,sans-serif"}}>Lead: <span style={{color:"#a3aac4"}}>{ws.lead}</span></div>
              {/* Progress */}
              <div style={{marginBottom:8}}>
                <div style={{marginBottom:4}}>
                  <span style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em"}}>{act}% actual · {plan}% planned</span>

                <VariancePill actual={act} planned={plan}/>
                <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em"}}>{ws.initiatives.length} Initiatives · {allProjects(ws).length} Projects</div>

              {history[ws.code]&&history[ws.code].length>=1&&<div style={{marginTop:8}}><Sparkline data={history[ws.code]} color={ws.color} width={60} height={18}/></div>}
            </div>
          );
        })}
      </div>
      }
    </div>
  );
}

                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                          <span style={{fontSize:11,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.1em"}}>{pr.id}</span>
                          <RAGBadge rag={pr.rag} tiny/>
                        </div>
                        {/* Project name */}
                        <div style={{fontSize:13,fontWeight:700,color:"#dee5ff",lineHeight:1.35,marginBottom:8,minHeight:36,fontFamily:"Manrope,sans-serif"}}>{pr.name}</div>
                        {/* Owner */}
                        <OwnerTag label="Owner" name={pr.owner}/>
                        {/* Progress bar */}
                        <div style={{margin:"10px 0 6px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                            <span style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em"}}>{pr.progress}% actual · {pplan}% planned</span>
                          </div>
                          <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.06)",borderRadius:9999,overflow:"hidden"}}>
                            <div style={{position:"absolute",top:0,left:0,height:"100%",background:"rgba(255,255,255,0.12)",width:`${pplan}%`,borderRadius:9999}}/>
                            <div style={{position:"absolute",top:0,left:0,height:"100%",background:ragColor,width:`${pr.progress}%`,borderRadius:9999,boxShadow:`0 0 6px ${ragColor}80`,transition:"width 0.4s"}}/>
                          </div>
                        </div>
                        {/* Variance + dates */}
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                          <VariancePill actual={pr.progress} planned={pplan}/>
                          <span style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>{fmtDate(pr.start)} → {fmtDate(pr.end)}</span>
                        </div>
                        {/* Risk flag */}
                        {(pr.risk||riskCount>0)&&(
                          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(64,72,93,0.4)"}}>
                            {pr.risk&&<div style={{fontSize:11,color:"#f59e0b",fontFamily:"Manrope,sans-serif"}}>⚠ {pr.risk}</div>}
                            {riskCount>0&&<div style={{fontSize:11,color:"#ef4444",fontFamily:"DM Mono,monospace",marginTop:pr.risk?3:0}}>⚠ {riskCount} open risk{riskCount>1?"s":""}</div>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* TABLE VIEW */}
      {view==="table"&&(
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:22}}>
          {ws.initiatives.map(init=>{
            const open=openInit===init.id,ip=initActual(init),iplan=initPlanned(init),ir=initRag(init);
            return(
              <div key={init.id} style={{border:`1px solid ${open?ws.color+"40":"rgba(64,72,93,0.15)"}`,borderRadius:12,overflow:"hidden",transition:"border-color 0.18s",background:"rgba(15,25,48,0.4)",marginBottom:6}}>
                {/* initiative header */}
                <div onClick={()=>setOpenInit(open?null:init.id)} style={{padding:"12px 15px",cursor:"pointer",background:open?`${ws.color}09`:"rgba(255,255,255,0.03)",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,color:ws.color,fontFamily:"DM Mono,monospace"}}>{init.id}</span>
                      <span style={{fontSize:13,fontWeight:600,color:"#dee5ff",fontFamily:"Manrope,sans-serif"}}>{init.name}</span>
                      <RAGBadge rag={ir} tiny/>
                      <VariancePill actual={ip} planned={iplan}/>
                    </div>
                    {/* initiative owner displayed clearly */}
                    <div style={{marginBottom:6}}>
                      <OwnerTag label="Initiative Owner" name={init.owner}/>
                    </div>
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,color:"#a3aac4",fontFamily:"DM Mono,monospace"}}>ACTUAL <span style={{color:ir==="G"?"#22c55e":ir==="A"?"#f59e0b":"#ef4444",fontWeight:700}}>{ip}%</span></span>
                        <span style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontFamily:"DM Mono,monospace"}}>PLANNED {iplan}%</span>
                      </div>
                      <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.05)",borderRadius:9999,overflow:"hidden"}}>
                        <div style={{position:"absolute",top:0,left:0,height:"100%",background:"rgba(255,255,255,0.12)",width:`${iplan}%`,borderRadius:9999}}/>
                        <div style={{position:"absolute",top:0,left:0,height:"100%",background:ir==="G"?"#22c55e":ir==="A"?"#f59e0b":"#ef4444",width:`${ip}%`,borderRadius:9999}}/>
                      </div>
                    </div>
                  </div>
                  <span style={{fontSize:12,color:"#6d758c",flexShrink:0}}>{init.projects.length}p</span>
                  <span className="material-symbols-outlined" style={{fontSize:16,color:"#6d758c",flexShrink:0}}>{open?"expand_less":"expand_more"}</span>
                </div>

                {/* project rows */}
                {open&&(
                  <div style={{borderTop:"1px solid rgba(64,72,93,0.4)"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 90px 64px 64px 90px 110px 80px",gap:8,padding:"6px 15px",background:"#0f1930",borderBottom:"1px solid rgba(64,72,93,0.4)"}}>
                      {["Project / Owner","Card","Actual","Planned","Variance","Dates","RAG"].map((h,i)=>(
                        <span key={i} style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase"}}>{h}</span>
                      ))}
                    </div>
                    {init.projects.map((pr,pi)=>{
                      const pplan=plannedPct(pr.start,pr.end);
                      const riskCount=openRisksForProject(riskData||[],pr.id);
                      return(
                        <>
                        <div key={pr.id} style={{display:"grid",gridTemplateColumns:"1fr 90px 64px 64px 90px 110px 80px",gap:8,padding:"9px 15px",alignItems:"center",borderBottom:pr.notes?"none":"1px solid rgba(64,72,93,0.4)",background:pi%2===0?"transparent":"rgba(255,255,255,0.015)",borderLeft:`3px solid ${ws.color}80`,transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"} onMouseLeave={e=>e.currentTarget.style.background=pi%2===0?"transparent":"rgba(255,255,255,0.015)"}>
                          <div>
                            <div style={{fontSize:12,color:"#dee5ff",marginBottom:3,fontFamily:"Manrope,sans-serif"}}>{pr.name}</div>
                            {/* project owner displayed on its own line */}
                            <OwnerTag label="Project Owner" name={pr.owner}/>
                            {pr.risk&&<div style={{fontSize:12,color:"#f59e0b",marginTop:4}}>⚠ {pr.risk}</div>}
                            {riskCount>0&&<div style={{display:"inline-flex",fontSize:11,color:"#ef4444",background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:4,padding:"2px 7px",marginTop:4,fontFamily:"DM Mono,monospace"}}>⚠ {riskCount} open risk{riskCount>1?"s":""}</div>}
                          </div>
                          <div style={{display:"flex",alignItems:"center"}}>
                            <button onClick={()=>onCardOpen&&onCardOpen({project:pr,wsColor:ws.color})} style={{fontSize:11,padding:"3px 8px",borderRadius:5,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.18)",color:"rgba(255,255,255,0.75)",cursor:"pointer",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em"}}>&#128203; Card</button>
                          </div>
                          <div style={{fontSize:13,color:ws.color,fontFamily:"DM Mono,monospace",fontWeight:600}}>{pr.progress}%</div>
                          <div style={{fontSize:13,color:"rgba(255,255,255,0.72)",fontFamily:"DM Mono,monospace"}}>{pplan}%</div>
                          <VariancePill actual={pr.progress} planned={pplan}/>
                          <div style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",lineHeight:1.7}}>{fmtDate(pr.start)}<br/>→ {fmtDate(pr.end)}</div>
                          <RAGBadge rag={pr.rag} tiny/>
                        </div>
                      {/* Notes — full width below grid row */}
                      {pr.notes&&(
                        <div style={{padding:"5px 15px 8px",borderBottom:"1px solid rgba(64,72,93,0.4)",background:pi%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                          <span style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif",fontWeight:600,textTransform:"uppercase",marginRight:8}}>Notes</span>
                          <span style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontStyle:"italic",lineHeight:1.5}}>{pr.notes}</span>
                        </div>
                      )}
                        </>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* GANTT VIEW */}
      {view==="gantt"&&(
        <div style={{background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,padding:"16px 18px",marginBottom:22}}>
          <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
            {[["rgba(255,255,255,0.04)","1px solid rgba(255,255,255,0.12)","Planned duration"],["#4C9AC9","none","Actual progress"],["#3bbffa","none","Today"]].map(([bg,border,label],i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                {i<2?<div style={{width:24,height:7,borderRadius:3,background:bg,border}}/>:<div style={{width:2,height:14,borderRadius:2,background:bg}}/>}
                <span style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif"}}>{label}</span>
              </div>
            ))}
          </div>
          <GanttHeader/>
          {ws.initiatives.map(init=>(
            <div key={init.id} style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,paddingBottom:4,borderBottom:"1px solid rgba(64,72,93,0.4)"}}>
                <span style={{fontSize:13,color:ws.color,fontFamily:"Manrope,sans-serif",fontWeight:600}}>{init.id} {init.name}</span>
                <OwnerTag label="Owner" name={init.owner}/>
              </div>
              {init.projects.map(pr=>{
                const pplan=plannedPct(pr.start,pr.end);
                return(
                  <div key={pr.id} style={{display:"grid",gridTemplateColumns:"240px 1fr 80px 70px",alignItems:"center",gap:10,marginBottom:4}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                        <div style={{fontSize:13,color:"#dee5ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"Manrope,sans-serif"}} title={pr.name}>{pr.name}</div>
                        <button onClick={()=>onCardOpen&&onCardOpen({project:pr,wsColor:ws.color})} style={{fontSize:11,padding:"2px 7px",borderRadius:5,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.18)",color:"rgba(255,255,255,0.75)",cursor:"pointer",fontFamily:"DM Mono,monospace",letterSpacing:"0.04em",whiteSpace:"nowrap",flexShrink:0}}>&#128203; Project Card</button>
                      </div>
                      <OwnerTag label="Owner" name={pr.owner}/>
                    </div>
                    <GanttRow project={pr} color={ws.color}/>
                    <VariancePill actual={pr.progress} planned={pplan}/>
                    <RAGBadge rag={pr.rag} tiny/>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {/* Risk register */}
      {(()=>{
        const wsRisks=(riskData||[]).filter(r=>r.wsCode===ws.code);
        const openWsRisks=wsRisks.filter(r=>r.status==="Open");
        const RISK_COLORS={G:"#22c55e",A:"#f59e0b",R:"#ef4444"};
        const STATUS_STYLES={
          "Open":     {bg:"rgba(239,68,68,0.12)",border:"rgba(239,68,68,0.3)",color:"#ef4444"},
          "Mitigated":{bg:"rgba(245,158,11,0.12)",border:"rgba(245,158,11,0.3)",color:"#f59e0b"},
          "Closed":   {bg:"rgba(34,197,94,0.12)",border:"rgba(34,197,94,0.3)",color:"#22c55e"},
        };
        return(
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{fontSize:13,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase"}}>Workstream Risk Register</div>
              {wsRisks.length>0&&<span style={{fontSize:11,fontFamily:"DM Mono,monospace",fontWeight:700,color:"#060e20",background:openWsRisks.length>0?"#ef4444":"#22c55e",borderRadius:9999,padding:"1px 7px"}}>{openWsRisks.length} open</span>}
            </div>
            {wsRisks.length>0?(
              <div style={{border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,overflow:"hidden"}}>
                {wsRisks.map((r,i)=>{
                  const ragColor=RISK_COLORS[r.rag]||"#f59e0b";
                  const st=STATUS_STYLES[r.status]||STATUS_STYLES["Open"];
                  return(
                    <div key={r.riskId||i} style={{padding:"12px 15px",borderBottom:i<wsRisks.length-1?"1px solid rgba(64,72,93,0.4)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",borderLeft:`3px solid ${ragColor}`,opacity:r.status==="Closed"?0.5:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:6}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:"#6d758c",fontFamily:"DM Mono,monospace"}}>{r.riskId}</span>
                            {r.projectName&&<span style={{fontSize:11,color:"#a3aac4",fontFamily:"Manrope,sans-serif"}}>· {r.projectName}</span>}
                          </div>
                          {r.riskTitle&&<div style={{fontSize:13,fontWeight:600,color:"#dee5ff",fontFamily:"Manrope,sans-serif",marginBottom:3}}>{r.riskTitle}</div>}
                          {r.riskDesc&&<div style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontFamily:"Manrope,sans-serif",lineHeight:1.4}}>{r.riskDesc}</div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                          <span style={{fontSize:11,fontFamily:"DM Mono,monospace",fontWeight:600,padding:"2px 8px",borderRadius:9999,background:st.bg,border:`1px solid ${st.border}`,color:st.color,whiteSpace:"nowrap"}}>{r.status}</span>
                          <RAGBadge rag={r.rag} tiny/>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                        {r.owner&&<span style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>Owner: <span style={{color:"#a3aac4"}}>{r.owner}</span></span>}
                        {r.probability&&<span style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>Prob: <span style={{color:"#a3aac4"}}>{r.probability}</span></span>}
                        {r.impact&&<span style={{fontSize:11,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>Impact: <span style={{color:"#a3aac4"}}>{r.impact}</span></span>}
                      </div>
                      {r.mitigation&&<div style={{marginTop:6,fontSize:11,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontStyle:"italic",lineHeight:1.4}}>Mitigation: {r.mitigation}</div>}
                    </div>
                  );
                })}
              </div>
            ):(
              <div style={{border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,padding:16,textAlign:"center"}}>
                <div style={{fontSize:13,color:"#6d758c",fontFamily:"Manrope,sans-serif"}}>No risks logged for this workstream.</div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// RISK REGISTER VIEW — read-only for stakeholder viewers
// ─────────────────────────────────────────────────────────────────────────────
const RISK_STATUS_STYLES={
  "Open":     {bg:"rgba(239,68,68,0.12)", border:"rgba(239,68,68,0.3)",  color:"#ef4444"},
  "Mitigated":{bg:"rgba(245,158,11,0.12)",border:"rgba(245,158,11,0.3)", color:"#f59e0b"},
  "Closed":   {bg:"rgba(34,197,94,0.12)", border:"rgba(34,197,94,0.3)",  color:"#22c55e"},
};
function StatusPill({status}){
  const s=RISK_STATUS_STYLES[status]||{bg:"rgba(255,255,255,0.06)",border:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.6)"};
  return <span style={{fontSize:11,fontFamily:"DM Mono,monospace",fontWeight:600,padding:"2px 8px",borderRadius:20,background:s.bg,border:`1px solid ${s.border}`,color:s.color,whiteSpace:"nowrap"}}>{status}</span>;
}
function RiskRegisterView({riskData}){
  const [filterWS,setFilterWS]=useState("All");
  const [filterStatus,setFilterStatus]=useState("All");
  const [filterRAG,setFilterRAG]=useState("All");

  const today=new Date();
  const nextWeek=new Date(today.getTime()+7*24*60*60*1000);
  const openCount=riskData.filter(r=>r.status==="Open").length;
  const highProbCount=riskData.filter(r=>r.probability==="High"&&r.status==="Open").length;
  const dueThisWeek=riskData.filter(r=>{
    if(r.status!=="Open"||!r.dueDate) return false;
    const d=new Date(r.dueDate);
    return !isNaN(d)&&d>=today&&d<=nextWeek;
  }).length;
  const mitigatedCount=riskData.filter(r=>r.status==="Mitigated").length;

  const filtered=riskData.filter(r=>{
    if(filterWS!=="All"&&r.wsCode!==filterWS) return false;
    if(filterStatus!=="All"&&r.status!==filterStatus) return false;
    if(filterRAG!=="All"&&r.rag!==filterRAG) return false;
    return true;
  });

  const wsCol=wsCode=>(WS_META[wsCode]||{}).color||"#6d758c";
  const ragBorderColor=rag=>({"R":"#ef4444","A":"#f59e0b","G":"#22c55e"}[rag]||"rgba(255,255,255,0.1)");
  const probColor=p=>p==="High"?"#ef4444":p==="Medium"?"#f59e0b":"#22c55e";

  const statCards=[
    {l:"Total Open",       v:openCount,      col:"#ef4444",sub:"risks requiring attention"},
    {l:"High Probability", v:highProbCount,  col:"#f59e0b",sub:"open, high probability"},
    {l:"Due This Week",    v:dueThisWeek,    col:"#f59e0b",sub:"open, due within 7 days"},
    {l:"Mitigated",        v:mitigatedCount, col:"#22c55e",sub:"actions in place"},
  ];

  return(
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,rgba(245,158,11,0.08) 0%,transparent 55%)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:12,padding:"19px 22px",marginBottom:20}}>
        <div style={{fontSize:13,color:"#f59e0b",fontFamily:"Manrope,sans-serif",fontWeight:700,marginBottom:3}}>PROGRAMME RISK REGISTER</div>
        <div style={{fontSize:18,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#fff"}}>Risk Register</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.72)",marginTop:3}}>Programme-wide open risks and mitigations</div>
      </div>

      {/* Summary cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {statCards.map((k,i)=>(
          <div key={i} style={{background:`${k.col}0E`,border:`1px solid ${k.col}25`,borderRadius:12,padding:"15px 16px",boxShadow:"inset 0 1px 0 0 rgba(64,72,93,0.4)"}}>
            <div style={{fontSize:11,color:"#a3aac4",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5,fontWeight:700}}>{k.l}</div>
            <div style={{fontSize:26,fontFamily:"Manrope,sans-serif",fontWeight:800,color:k.col,lineHeight:1,marginBottom:3}}>{k.v}</div>
            <div style={{fontSize:12,color:"#a3aac4"}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:12,marginBottom:14,alignItems:"flex-end",flexWrap:"wrap"}}>
        {[
          {label:"Workstream",val:filterWS,   set:setFilterWS,    opts:["All","WS1","WS2","WS3","WS4","WS5","WS6","WS7","WS8"]},
          {label:"Status",    val:filterStatus,set:setFilterStatus,opts:["All","Open","Mitigated","Closed"]},
          {label:"Severity",  val:filterRAG,  set:setFilterRAG,   opts:["All","R","A","G"]},
        ].map(({label,val,set,opts},i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column"}}>
            <span style={{fontSize:11,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>{label}</span>
            <select value={val} onChange={e=>set(e.target.value)} style={{padding:"5px 10px",borderRadius:6,background:"rgba(64,72,93,0.4)",border:"1px solid rgba(255,255,255,0.1)",color:"#dee5ff",fontSize:12,fontFamily:"DM Mono,monospace",cursor:"pointer",outline:"none"}}>
              {opts.map(o=><option key={o} value={o} style={{background:"#060e20"}}>{o==="R"?"Red":o==="A"?"Amber":o==="G"?"Green":o}</option>)}
            </select>
          </div>
        ))}
        <span style={{fontSize:12,color:"#6d758c",fontFamily:"DM Mono,monospace",marginLeft:"auto",alignSelf:"center"}}>{filtered.length} risk{filtered.length!==1?"s":""}</span>
      </div>

      {/* Table */}
      {filtered.length===0?(
        <div style={{border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,padding:40,textAlign:"center",color:"#6d758c",fontSize:13}}>No risks match the current filters.</div>
      ):(
        <div style={{border:"1px solid rgba(64,72,93,0.4)",borderRadius:12,overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"80px 60px 160px 1fr 90px 80px 80px 110px 100px 100px",gap:16,padding:"7px 16px",background:"#0f1930",borderBottom:"1px solid rgba(64,72,93,0.4)",minWidth:1044}}>
            {["Risk ID","WS","Project","Risk Description","Probability","Impact","Severity","Owner","Due Date","Status"].map((h,i)=>(
              <span key={i} style={{fontSize:11,color:"#a3aac4",fontFamily:"Manrope,sans-serif",fontWeight:600,textTransform:"uppercase"}}>{h}</span>
            ))}
          </div>
          {filtered.map((r,i)=>(
            <div key={r.riskId||i} style={{display:"grid",gridTemplateColumns:"80px 60px 160px 1fr 90px 80px 80px 110px 100px 100px",gap:16,padding:"10px 16px",alignItems:"start",borderLeft:`3px solid ${ragBorderColor(r.rag)}`,borderBottom:i<filtered.length-1?"1px solid rgba(64,72,93,0.4)":"none",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",opacity:r.status==="Closed"?0.4:1,minWidth:1044}}>
              <div style={{fontSize:12,color:wsCol(r.wsCode)||"#f59e0b",fontFamily:"DM Mono,monospace",paddingTop:2}}>{r.riskId}</div>

function signIn(){
  return new Promise((resolve,reject)=>{
    let attempts=0;
    const tryInit=()=>{
      if(window.google?.accounts?.oauth2){
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:OAUTH_CLIENT_ID,
          scope:"openid email profile",
          callback:(resp)=>{
            if(resp.error) return reject(new Error(resp.error));
            fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:`Bearer ${resp.access_token}`}})
              .then(r=>r.json())
              .then(info=>resolve({token:resp.access_token,email:info.email,name:info.name}))
              .catch(()=>resolve({token:resp.access_token,email:"unknown",name:"Unknown"}));
          },
        });
        client.requestAccessToken();
      } else if(attempts<10){attempts++;setTimeout(tryInit,500);}
      else reject(new Error("Google sign-in failed to load. Check your internet connection."));
    };
    tryInit();
  });
}

function AuthGate({children}){
  const [phase,setPhase]=useState("signin");
  const [user,setUser]=useState(null);
  const [error,setError]=useState(null);

  const handleSignIn=async()=>{
    setError(null);setPhase("loading");
    try{
      const u=await signIn();
      const allowed=VIEWER_EMAILS.map(e=>e.toLowerCase()).includes(u.email.toLowerCase());
      if(!allowed){setUser(u);setPhase("unauth");return;}
      setUser(u);setPhase("app");
    }catch(e){setError(e.message);setPhase("signin");}
  };

  const handleSignOut=()=>{setUser(null);setPhase("signin");};

  if(phase==="signin"||phase==="loading") return <SignInScreen onSignIn={handleSignIn} loading={phase==="loading"} error={error}/>;
  if(phase==="unauth") return <UnauthorisedScreen email={user.email} onSignOut={handleSignOut}/>;
  return children;
}

              <button onClick={refresh} disabled={loading} style={{width:"100%",padding:"7px",borderRadius:7,background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:loading?"wait":"pointer",fontFamily:"DM Mono,monospace",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <span className={loading?"spin":""} style={{display:"inline-block"}}>↻</span>
                {loading?"Refreshing…":"Refresh from Sheets"}
              </button>
            )}
          </div>
        </div>

        {/* Main content */}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"16px 24px",borderBottom:`1px solid ${active===0||showRisks?"rgba(64,72,93,0.4)":currentWS?.color+"40"}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:active===0||showRisks?`linear-gradient(135deg,rgba(201,168,76,0.06) 0%,#0f1930 60%)`:`linear-gradient(135deg,${currentWS?.color}10 0%,#0f1930 60%)`,flexShrink:0,boxShadow:active===0||showRisks?"none":`0 1px 0 0 ${currentWS?.color}20`}}>
            <div>
              <div style={{fontSize:13,color:showRisks?"#C9A84C":active===0?"#C9A84C":currentWS?.color,fontFamily:"Manrope,sans-serif",fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:4}}>{showRisks?"Risk Management":"Integration Command Centre"}{!showRisks&&active!==0&&` — ${currentWS?.code} — Workstream Dashboard`}</div>
              <div style={{fontSize:22,fontFamily:"Manrope,sans-serif",fontWeight:800,color:"#dee5ff",lineHeight:1.2}}>{showRisks?"Risk Register":active===0?"Master Integration Dashboard":currentWS?.name}</div>
              {!showRisks&&active!==0&&currentWS?.lead&&<div style={{fontSize:13,color:"#6d758c",fontFamily:"Manrope,sans-serif",marginTop:4}}>Workstream Lead: <span style={{color:"#a3aac4",fontWeight:500}}>{currentWS.lead}</span></div>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {error&&<div style={{fontSize:13,color:"#ef4444",fontFamily:"Manrope,sans-serif",maxWidth:220}}>⚠ {error}</div>}
              <div style={{position:"relative",display:"flex",alignItems:"center"}}>
                <span style={{position:"absolute",left:9,fontSize:13,color:"rgba(255,255,255,0.4)",pointerEvents:"none"}}>🔍</span>
                <input
                  type="text"
                  placeholder="Search projects, owners, risks…"
                  value={searchQuery}
                  onChange={e=>setSearchQuery(e.target.value)}
                  style={{paddingLeft:30,paddingRight:searchQuery?28:10,paddingTop:5,paddingBottom:5,width:240,borderRadius:7,background:"rgba(64,72,93,0.4)",border:`1px solid ${searchQuery?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.1)"}`,color:"#fff",fontSize:12,fontFamily:"DM Mono,monospace",outline:"none"}}
                />
                {searchQuery&&<button onClick={()=>setSearchQuery("")} style={{position:"absolute",right:7,background:"transparent",border:"none",color:"#6d758c",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>✕</button>}
              </div>
              <div style={{padding:"5px 12px",borderRadius:20,background:"#0f1930",border:"1px solid rgba(64,72,93,0.4)",fontSize:12,color:"rgba(255,255,255,0.72)",fontFamily:"Manrope,sans-serif"}}>EOR Integration · 2026</div>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
            {searchQuery.trim()
              ?<SearchResults results={searchResults} query={searchQuery.trim()} onSelect={wsId=>{setActive(wsId);setSearchQuery("");}} onCardOpen={setActiveCard}/>
              :showRisks
                ?<RiskRegisterView riskData={riskData}/>
                :active===0
                  ?<Master wsList={wsList} onSelect={setActive} lastRefresh={lastRefresh} history={history} riskData={riskData}/>
                  :currentWS&&<WSDash ws={currentWS} cardData={cardData} onCardOpen={setActiveCard} riskData={riskData}/>
            }
          </div>
        </div>
      </div>
      {activeCard&&<ProjectCardModal project={activeCard.project} card={cardData.cards[activeCard.project.id]} milestones={cardData.milestones[activeCard.project.id]} wsColor={activeCard.wsColor} onClose={()=>setActiveCard(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate><App/></AuthGate>);
</script>
</body>
</html>
