async function loadDashboard(){
  const range=encodeURIComponent(`${CONFIG.SHEET_TAB}!A2:M500`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`Could not load dashboard: ${res.status}`);
  const json=await res.json();
  return json.values||[];
}

function parseRowsForWS(rows, wsCode){
  const initiatives=[];
  rows.forEach(row=>{
    const [projId,ws,initId,initName,wsLead,initOwner,projName,projOwner,start,end,progressRaw,ragRaw,risk]=row;
    if(ws?.trim()!==wsCode) return;
    let init=initiatives.find(i=>i.id===initId?.trim());
    if(!init){init={id:initId?.trim(),name:initName?.trim()||"",owner:initOwner?.trim()||"—",projects:[]};initiatives.push(init);}
    const rag=["G","A","R"].includes(ragRaw?.trim().toUpperCase())?ragRaw.trim().toUpperCase():"G";
    init.projects.push({
      id:projId?.trim(),name:projName?.trim()||"",owner:projOwner?.trim()||"—",
      progress:Math.min(100,Math.max(0,parseInt(progressRaw)||0)),
      rag,risk:risk?.trim()||"",
      start:start?.trim()||"",end:end?.trim()||"",
      wsLead:wsLead?.trim()||"—",
    });
  });
  return initiatives;
}

// Write proposals tab
// Proposals columns:
// A=Timestamp B=SubmittedBy C=LeadEmail D=WSCode E=ProjectID F=ProjectName
// G=Old% H=New% I=OldRAG J=NewRAG K=OldRisk L=NewRisk M=Status(Pending)
async function submitProposals(proposals, accessToken, submitterEmail, wsCode){
  const {SHEET_ID,PROPOSALS_TAB,WEBHOOK_URL}=CONFIG;
  const ts=new Date().toISOString();
  const rows=proposals.map(p=>[
    ts,
    p.submitterName||"—",
    submitterEmail,
    wsCode,
    p.projectId,
    p.projectName,
    String(p.oldProgress),
    String(p.newProgress),
    p.oldRag,
    p.newRag,
    p.oldRisk||"",
    p.newRisk||"",
    "Pending",
  ]);
  // If a Web App webhook URL is configured, POST to it (triggers email notification)
  if(WEBHOOK_URL&&WEBHOOK_URL!=="YOUR_WEBHOOK_URL_HERE"){
   const res=// no-cors bypasses CORS preflight — Google Apps Script does not support OPTIONS requests
    await fetch(WEBHOOK_URL,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify({rows,submitterEmail,wsCode}),
    });
    return rows.length;
  }
  // Fallback: write directly via Sheets API (no email notification)
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(PROPOSALS_TAB+"!A1")}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
  const res=await fetch(url,{
    method:"POST",
    headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({majorDimension:"ROWS",values:rows}),
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Write error ${res.status}`);}
  return rows.length;
}

function signIn(){
  return new Promise((resolve,reject)=>{
    let attempts=0;
    const tryInit=()=>{
      if(window.google?.accounts?.oauth2){
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:CONFIG.OAUTH_CLIENT_ID,
          scope:"https://www.googleapis.com/auth/spreadsheets openid email profile",
          callback:(resp)=>{
            if(resp.error) return reject(new Error(resp.error));
            // Get user info
            fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:`Bearer ${resp.access_token}`}})
              .then(r=>r.json())
              .then(info=>resolve({token:resp.access_token,email:info.email,name:info.name}))
              .catch(()=>resolve({token:resp.access_token,email:"unknown",name:"Unknown"}));
          },
        });
        client.requestAccessToken();
      } else if(attempts<10){attempts++;setTimeout(tryInit,500);}
      else reject(new Error("Google sign-in failed to load. Check internet connection."));
    };
    tryInit();
  });
}

const fmtDate=str=>{if(!str)return"—";const d=new Date(str);return isNaN(d)?str:d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});};
const TODAY=new Date();
function plannedPct(start,end){
  const s=new Date(start),e=new Date(end);
  if(TODAY<=s)return 0;if(TODAY>=e)return 100;
  return Math.round(((TODAY-s)/(e-s))*100);
}

// ─────────────────────────────────────────────────────────────────────────────
function UpdateForm({user,wsCode,wsData,onSubmitDone,onSignOut}){
  const ws=WS_META[wsCode];
  const [edits,setEdits]=useState(()=>{
    // Build initial edit state from loaded data — one entry per project
    const map={};
    wsData.forEach(init=>{
      init.projects.forEach(pr=>{
        map[pr.id]={progress:pr.progress,rag:pr.rag,risk:pr.risk||"",dirty:false};
      });
    });
    return map;
  });
  const [submitting,setSubmitting]=useState(false);
  const [error,setError]=useState(null);
  const [openInit,setOpenInit]=useState(wsData[0]?.id||null);

  const setField=(projId,field,value)=>{
    setEdits(prev=>({...prev,[projId]:{...prev[projId],[field]:value,dirty:true}}));
  };

  const dirtyCount=Object.values(edits).filter(e=>e.dirty).length;

  const handleSubmit=async()=>{
    const changed=[];
    wsData.forEach(init=>{
      init.projects.forEach(pr=>{
        const e=edits[pr.id];
        if(!e||!e.dirty)return;
        changed.push({
          projectId:pr.id,projectName:pr.name,
          oldProgress:pr.progress,newProgress:e.progress,
          oldRag:pr.rag,newRag:e.rag,
          oldRisk:pr.risk||"",newRisk:e.risk||"",
          submitterName:user.name,
        });
      });
    });
    if(!changed.length){setError("No changes to submit.");return;}
    setSubmitting(true);setError(null);
    try{
      await submitProposals(changed,user.token,user.email,wsCode);
      onSubmitDone(changed.length);
    }catch(e){setError(e.message);}
    finally{setSubmitting(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0d12",fontFamily:"DM Sans,sans-serif"}}>
      {/* Header */}
      <div style={{background:"rgba(255,255,255,0.014)",borderBottom:"1px solid rgba(255,255,255,0.055)",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:9,color:ws.color,fontFamily:"DM Mono,monospace",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:3}}>Post-Acquisition Integration · Workstream Update Portal</div>
          <div style={{fontSize:17,fontFamily:"Playfair Display,serif",color:"#fff"}}>{ws.icon} {ws.name}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>{user.name}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"DM Mono,monospace"}}>{user.email}</div>
          </div>
          <button onClick={onSignOut} style={{padding:"5px 12px",borderRadius:6,background:"transparent",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.4)",fontSize:10,cursor:"pointer",fontFamily:"DM Mono,monospace"}}>Sign out</button>
        </div>
      </div>

      {/* Instructions banner */}
      <div style={{background:`${ws.color}0D`,borderBottom:`1px solid ${ws.color}25`,padding:"10px 24px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:13}}>ℹ️</span>
        <span style={{fontSize:12,color:"rgba(255,255,255,0.55)"}}>Update <strong style={{color:"rgba(255,255,255,0.8)"}}>% Complete</strong>, <strong style={{color:"rgba(255,255,255,0.8)"}}>RAG status</strong>, and <strong style={{color:"rgba(255,255,255,0.8)"}}>risks</strong> for your projects, then click <strong style={{color:ws.color}}>Submit for Approval</strong>. Changes will be reviewed before appearing on the master dashboard.</span>
      </div>

      <div style={{padding:"20px 24px",maxWidth:900,margin:"0 auto"}}>
        {/* Submit bar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {dirtyCount>0
              ?<><div style={{width:8,height:8,borderRadius:"50%",background:"#f59e0b",flexShrink:0}}/><span style={{fontSize:13,color:"rgba(255,255,255,0.75)"}}><strong style={{color:"#f59e0b"}}>{dirtyCount}</strong> project{dirtyCount!==1?"s":""} with changes ready to submit</span></>
              :<><div style={{width:8,height:8,borderRadius:"50%",background:"rgba(255,255,255,0.15)",flexShrink:0}}/><span style={{fontSize:13,color:"rgba(255,255,255,0.35)"}}>No changes yet — edit projects below</span></>
            }
          </div>
          <button onClick={handleSubmit} disabled={submitting||dirtyCount===0} style={{padding:"9px 22px",borderRadius:8,background:dirtyCount>0?"#22c55e":"rgba(255,255,255,0.05)",border:"none",color:dirtyCount>0?"#0a0d12":"rgba(255,255,255,0.2)",fontSize:13,fontWeight:700,cursor:dirtyCount>0&&!submitting?"pointer":"not-allowed",transition:"all .2s",display:"flex",alignItems:"center",gap:7}}>
            <span className={submitting?"spin":""} style={{display:"inline-block"}}>{submitting?"↻":"↑"}</span>
            {submitting?"Submitting…":"Submit for Approval"}
          </button>
        </div>
        {error&&<div style={{fontSize:11,color:"#ef4444",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:7,padding:"8px 14px",marginBottom:14}}>{error}</div>}

        {/* Initiatives & Projects */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {wsData.map(init=>{
            const open=openInit===init.id;
            return(
              <div key={init.id} style={{border:`1px solid ${open?ws.color+"40":"rgba(255,255,255,0.07)"}`,borderRadius:10,overflow:"hidden",transition:"border-color .18s"}}>
                {/* initiative header */}
                <div onClick={()=>setOpenInit(open?null:init.id)} style={{padding:"13px 16px",cursor:"pointer",background:open?`${ws.color}08`:"rgba(255,255,255,0.015)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                      <span style={{fontSize:9,color:ws.color,fontFamily:"DM Mono,monospace"}}>{init.id}</span>
                      <span style={{fontSize:14,fontWeight:600,color:"#fff"}}>{init.name}</span>
                      {/* dirty indicator for this initiative */}
                      {init.projects.some(pr=>edits[pr.id]?.dirty)&&<div style={{width:7,height:7,borderRadius:"50%",background:"#f59e0b"}}/>}
                    </div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>Initiative Owner: <span style={{color:"rgba(255,255,255,0.55)"}}>{init.owner}</span> · {init.projects.length} projects</div>
                  </div>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{open?"▲":"▼"}</span>
                </div>

                {/* project rows */}
                {open&&(
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.055)"}}>
                    {init.projects.map((pr,pi)=>{
                      const e=edits[pr.id]||{progress:pr.progress,rag:pr.rag,risk:pr.risk||""};
                      const pplan=plannedPct(pr.start,pr.end);
                      const changed=e.dirty;
                      return(
                        <div key={pr.id} style={{padding:"14px 16px",borderBottom:pi<init.projects.length-1?"1px solid rgba(255,255,255,0.04)":"none",background:changed?"rgba(245,158,11,0.04)":"transparent",borderLeft:changed?"3px solid #f59e0b":"3px solid transparent",transition:"all .15s"}}>
                          {/* project title row */}
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,gap:12}}>
                            <div>
                              <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:2}}>{pr.name}</div>
                              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                                <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>Owner: <span style={{color:"rgba(255,255,255,0.55)"}}>{pr.owner}</span></span>
                                <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>{fmtDate(pr.start)} → {fmtDate(pr.end)}</span>
                                <span style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace"}}>Planned: <span style={{color:"rgba(255,255,255,0.55)"}}>{pplan}%</span></span>
                              </div>
                            </div>
                            {changed&&<span style={{fontSize:9,color:"#f59e0b",fontFamily:"DM Mono,monospace",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:4,padding:"2px 7px",flexShrink:0,whiteSpace:"nowrap"}}>CHANGED</span>}
                          </div>

                          {/* editable fields — 3 column grid */}
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
                            {/* % complete */}
                            <div>
                              <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>% Complete</div>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <input type="range" min="0" max="100" value={e.progress} onChange={ev=>setField(pr.id,"progress",parseInt(ev.target.value))} style={{flex:1,height:4,accentColor:ws.color}}/>
                                <input type="number" min="0" max="100" value={e.progress} onChange={ev=>setField(pr.id,"progress",Math.min(100,Math.max(0,parseInt(ev.target.value)||0)))} style={{width:52,textAlign:"center",padding:"4px 6px",fontSize:13}}/>
                              </div>
                              {pr.progress!==e.progress&&<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"DM Mono,monospace",marginTop:3}}>Was: {pr.progress}%</div>}
                            </div>

                            {/* RAG */}
                            <div>
                              <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>RAG Status</div>
                              <RAGPicker value={e.rag} onChange={v=>setField(pr.id,"rag",v)}/>
                              {pr.rag!==e.rag&&<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"DM Mono,monospace",marginTop:3}}>Was: {RAG[pr.rag]?.label}</div>}
                            </div>

                            {/* Risk */}
                            <div>
                              <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",fontFamily:"DM Mono,monospace",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Risk / Issue</div>
                              <textarea rows={2} value={e.risk} onChange={ev=>setField(pr.id,"risk",ev.target.value)} placeholder="Describe any risk or issue, or leave blank" style={{width:"100%",resize:"vertical",fontSize:12,padding:"6px 8px"}}/>
                              {(pr.risk||"")!==(e.risk||"")&&<div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontFamily:"DM Mono,monospace",marginTop:2}}>Was: {pr.risk||"(none)"}</div>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Bottom submit */}
        {dirtyCount>0&&(
          <div style={{marginTop:20,textAlign:"center"}}>
            <button onClick={handleSubmit} disabled={submitting} style={{padding:"12px 36px",borderRadius:9,background:"#22c55e",border:"none",color:"#0a0d12",fontSize:14,fontWeight:700,cursor:submitting?"wait":"pointer",display:"inline-flex",alignItems:"center",gap:8}}>
              <span className={submitting?"spin":""} style={{display:"inline-block"}}>{submitting?"↻":"↑"}</span>
              {submitting?`Submitting ${dirtyCount} update${dirtyCount!==1?"s":""}…`:`Submit ${dirtyCount} update${dirtyCount!==1?"s":""} for Approval`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("signin"); // signin | loading | unauth | form | success
  const [user,setUser]=useState(null);
  const [wsCode,setWsCode]=useState(null);
  const [wsCodes,setWsCodes]=useState([]);
  const [wsData,setWsData]=useState([]);
  const [error,setError]=useState(null);
  const [successCount,setSuccessCount]=useState(0);

  const handleSignIn=async()=>{
    setError(null);setPhase("loading");
    try{
      const u=await signIn();
      // Check which workstream this email belongs to
      const allMatched=Object.entries(LEAD_EMAILS).filter(([ws,emails])=>emails.map(e=>e.toLowerCase()).includes(u.email.toLowerCase()));
      if(!allMatched.length){setUser(u);setPhase("unauth");return;}
      setUser(u);
      if(allMatched.length===1){
        const code=allMatched[0][0];
        const rows=await loadDashboard();
        const initiatives=parseRowsForWS(rows,code);
        setWsCode(code);setWsData(initiatives);setPhase("form");
      } else {
        // Multiple workstreams — show picker
        setWsCodes(allMatched.map(([ws])=>ws));setPhase("pick");
      }
    }catch(e){setError(e.message);setPhase("signin");}
  };

  const handlePickWS=async(code)=>{
    setError(null);setPhase("loading");
    try{
      const rows=await loadDashboard();
      const initiatives=parseRowsForWS(rows,code);
      setWsCode(code);setWsData(initiatives);setPhase("form");
    }catch(e){setError(e.message);setPhase("pick");}
  };
  const handleSubmitDone=count=>{setSuccessCount(count);setPhase("success");};
  const handleBack=()=>{setPhase("form");};
  const handleSignOut=()=>{setUser(null);setWsCode(null);setWsData([]);setPhase("signin");};

  if(phase==="signin"||phase==="loading") return <SignInScreen onSignIn={handleSignIn} loading={phase==="loading"} error={error}/>;
  if(phase==="unauth") return <UnauthorisedScreen email={user.email} onSignOut={handleSignOut}/>;
  if(phase==="success") return <SuccessScreen count={successCount} wsName={WS_META[wsCode]?.name} onBack={handleBack}/>;
  if(phase==="pick") return <WSPickerScreen user={user} wsCodes={wsCodes} onPick={handlePickWS} onSignOut={handleSignOut}/>;
  if(phase==="form") return <UpdateForm user={user} wsCode={wsCode} wsData={wsData} onSubmitDone={handleSubmitDone} onSignOut={handleSignOut}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
